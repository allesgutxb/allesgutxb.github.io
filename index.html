<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>课堂巡查记录系统</title>
    <style>
        /* 基础样式 */
        body { font-family: sans-serif; margin: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .btn { padding: 10px 20px; margin: 10px; cursor: pointer; }
        form label { display: inline-block; width: 100px; margin: 5px 0; }
        form input, form select { margin: 5px 0; padding: 5px; width: 200px; }
    </style>
</head>
<body>
    <!-- 首页：两个入口 -->
    <div id="homePage" class="page active">
        <h1>课堂巡查系统</h1>
        <button class="btn" onclick="showPage('recordPage')">📝 填写巡查记录</button>
        <button class="btn" onclick="showPage('queryPage')">🔍 查询巡查记录</button>
    </div>

    <!-- 填写记录页面 -->
    <div id="recordPage" class="page">
        <button onclick="showPage('homePage')">← 返回首页</button>
        <h2>填写巡查记录</h2>
        <form id="inspectionForm">
            <label>巡查日期：</label>
            <input type="date" id="inspectionDate" required><br>
            <label>星期：</label>
            <select id="weekdaySelect" required onchange="updateSubjectTeacher()">
                <option value="">请选择</option>
                <option value="星期一">星期一</option>
                <option value="星期二">星期二</option>
                <option value="星期三">星期三</option>
                <option value="星期四">星期四</option>
                <option value="星期五">星期五</option>
            </select><br>
            <label>班级：</label>
            <select id="classSelect" required onchange="updateSubjectTeacher()">
                <option value="">请选择</option>
                <!-- 班级选项将从 classes_rows.csv 数据动态生成 -->
            </select><br>
            <label>节次：</label>
            <select id="periodSelect" required onchange="updateSubjectTeacher()">
                <option value="">请选择</option>
                <!-- 通常1-8节 -->
                <option value="1">第1节</option>
                <option value="2">第2节</option>
                <option value="3">第3节</option>
                <option value="4">第4节</option>
                <option value="5">第5节</option>
                <option value="6">第6节</option>
                <option value="7">第7节</option>
                <option value="8">第8节</option>
            </select><br>
            <!-- 以下两项将由课程表数据自动填充 -->
            <label>科目：</label>
            <input type="text" id="subjectInput" readonly><br>
            <label>任课教师：</label>
            <input type="text" id="teacherInput" readonly><br>

            <label>到岗情况：</label>
            <select id="arrivalStatus" required>
                <option value="正常">正常</option>
                <option value="迟到">迟到</option>
                <option value="缺岗">缺岗</option>
            </select><br>
            <label>学生状态：</label>
            <input type="text" id="studentStatus"><br>
            <label>教室环境：</label>
            <input type="text" id="environment"><br>
            <label>巡查人：</label>
            <select id="inspectorSelect" required>
                <option value="">请选择</option>
                <!-- 巡查人选项将从 inspectors_rows.csv 数据动态生成 -->
            </select><br>
            <label>备注：</label>
            <textarea id="remarksInput"></textarea><br>
            <button type="submit">提交记录</button>
        </form>
    </div>

    <!-- 查询页面 -->
    <div id="queryPage" class="page">
        <button onclick="showPage('homePage')">← 返回首页</button>
        <h2>查询巡查记录</h2>
        <!-- 查询条件区域 -->
        <div>
            <label>开始日期：</label><input type="date" id="filterStartDate">
            <label>结束日期：</label><input type="date" id="filterEndDate">
            <label>班级：</label>
            <select id="filterClass">
                <option value="">全部</option>
                <!-- 班级选项动态生成 -->
            </select>
            <label>巡查人：</label>
            <select id="filterInspector">
                <option value="">全部</option>
                <!-- 巡查人选项动态生成 -->
            </select>
            <button onclick="searchRecords()">查询</button>
        </div>
        <!-- 查询结果表格 -->
        <table id="resultsTable" border="1" style="width:100%; margin-top:20px;">
            <thead>
                <tr>
                    <th>日期</th><th>班级</th><th>节次</th><th>科目</th><th>教师</th>
                    <th>到岗情况</th><th>巡查人</th><th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 查询结果将动态插入此处 -->
            </tbody>
        </table>
    </div>

<script>
// 1. 模拟从CSV加载的数据 (您需要替换为真实的数据加载逻辑，例如通过Fetch API读取CSV文件)
const teachers = []; // 从 teachers_rows.csv 加载
const schedule = []; // 从 schedule_rows.csv 加载
const inspectors = []; // 从 inspectors_rows.csv 加载
const classes = []; // 从 classes_rows.csv 加载

// 示例：手动初始化 inspectors 和 classes 数据 (实际应从文件加载)
const inspectorsData = ["杨丽平", "段延普", "吴子璇", "白文娟", "赵峥峥", "郑胜楠", "古冬苹", "赵桃玲", "秦庆员"];
const classesData = ["七1班", "七2班", "七3班", "七4班", "七5班", "七6班", "八1班", "八2班", "八3班", "八4班", "八5班", "八6班", "九1班", "九2班", "九3班", "九4班", "九5班", "九6班"];

// 2. 页面切换函数
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    if (pageId === 'recordPage') {
        initRecordPage();
    } else if (pageId === 'queryPage') {
        initQueryPage();
    }
}

// 3. 初始化填写页面：动态加载班级和巡查人下拉选项
function initRecordPage() {
    const classSelect = document.getElementById('classSelect');
    const inspectorSelect = document.getElementById('inspectorSelect');
    // 填充班级
    classSelect.innerHTML = '<option value="">请选择</option>' + classesData.map(cls => `<option value="${cls}">${cls}</option>`).join('');
    // 填充巡查人
    inspectorSelect.innerHTML = '<option value="">请选择</option>' + inspectorsData.map(ins => `<option value="${ins}">${ins}</option>`).join('');
}

// 4. 核心功能：根据班级、星期、节次自动查询科目和教师
function updateSubjectTeacher() {
    const className = document.getElementById('classSelect').value;
    const weekday = document.getElementById('weekdaySelect').value;
    const period = document.getElementById('periodSelect').value;

    if (!className || !weekday || !period) {
        document.getElementById('subjectInput').value = '';
        document.getElementById('teacherInput').value = '';
        return;
    }

    // 这里需要连接您的 schedule_rows.csv 数据
    // 假设 scheduleData 是一个从CSV加载的数组，包含 class_name, week_day, period, subject, teacher_name
    // 示例：查找匹配的课程
    const matchedCourse = scheduleData.find(course => 
        course.class_name === className && 
        course.week_day === weekday && 
        course.period == period
    );

    if (matchedCourse) {
        document.getElementById('subjectInput').value = matchedCourse.subject;
        document.getElementById('teacherInput').value = matchedCourse.teacher_name;
    } else {
        document.getElementById('subjectInput').value = '未找到课程';
        document.getElementById('teacherInput').value = '未安排';
    }
}

// 5. 初始化查询页面
function initQueryPage() {
    // 同样需要为查询页面的筛选器填充班级和巡查人选项
    const filterClass = document.getElementById('filterClass');
    const filterInspector = document.getElementById('filterInspector');
    filterClass.innerHTML = '<option value="">全部</option>' + classesData.map(cls => `<option value="${cls}">${cls}</option>`).join('');
    filterInspector.innerHTML = '<option value="">全部</option>' + inspectorsData.map(ins => `<option value="${ins}">${ins}</option>`).join('');
}

// 6. 处理表单提交 (示例，需替换为实际保存逻辑，如提交到服务器)
document.getElementById('inspectionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const record = {
        date: document.getElementById('inspectionDate').value,
        weekday: document.getElementById('weekdaySelect').value,
        class: document.getElementById('classSelect').value,
        period: document.getElementById('periodSelect').value,
        subject: document.getElementById('subjectInput').value,
        teacher: document.getElementById('teacherInput').value,
        arrivalStatus: document.getElementById('arrivalStatus').value,
        studentStatus: document.getElementById('studentStatus').value,
        environment: document.getElementById('environment').value,
        inspector: document.getElementById('inspectorSelect').value,
        remarks: document.getElementById('remarksInput').value
    };
    console.log('提交的记录：', record);
    alert('记录已保存 (演示)。实际需要连接数据库。');
    // 这里应该将 record 对象通过 fetch 发送到您的后端服务器，并存入数据库
});

// 7. 模拟的课程表数据 (您必须用 schedule_rows.csv 的真实数据替换)
// 这是一个示例数组结构
const scheduleData = [
    { class_name: "七1班", week_day: "星期一", period: 1, subject: "英语", teacher_name: "王富荣" },
    { class_name: "七1班", week_day: "星期一", period: 2, subject: "语文", teacher_name: "许子雪" },
    // ... 此处应包含您 schedule_rows.csv 中的所有行
];

// 初始化
window.onload = function() {
    // 页面加载时，首页默认显示
    showPage('homePage');
};
</script>
</body>
</html>
