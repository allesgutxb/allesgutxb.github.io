<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校教务巡查系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 完整CSS样式保持不变 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* 头部 */
        .header { 
            background: white; border-radius: 15px; padding: 40px 20px; 
            margin-bottom: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header h1 { 
            color: #2c3e50; margin-bottom: 40px; display: flex; 
            align-items: center; justify-content: center; gap: 15px; 
        }
        .action-buttons { 
            display: flex; gap: 20px; justify-content: center; 
            flex-wrap: wrap; 
        }
        .action-btn {
            background: white; color: #333; border: none; padding: 20px 30px;
            border-radius: 12px; font-size: 18px; cursor: pointer; width: 280px;
            text-align: left; transition: all 0.3s; border-left: 5px solid;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .action-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .btn-fill { border-left-color: #2196F3; }
        .btn-query { border-left-color: #4CAF50; }
        .action-btn i { font-size: 24px; margin-right: 10px; color: #667eea; }
        .action-btn strong { display: block; font-size: 20px; margin-bottom: 5px; }
        .action-btn p { font-size: 14px; color: #666; }
        
        /* 主内容区 */
        .main-content { display: none; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .main-content.active { display: block; }
        .page-header { 
            display: flex; align-items: center; margin-bottom: 25px; 
            padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; 
        }
        .back-btn { 
            background: none; border: none; font-size: 20px; color: #667eea; 
            cursor: pointer; margin-right: 15px; 
        }
        .page-title { color: #2c3e50; font-size: 24px; }
        
        /* 表单样式 */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; }
        .form-group label.required::after { content: " *"; color: #f44336; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 15px; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #667eea; outline: none;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .weekday-display { font-size: 14px; color: #666; margin-top: 5px; font-style: italic; }
        .btn-submit {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%); color: white;
            border: none; padding: 15px; border-radius: 8px; font-size: 18px;
            font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px;
        }
        
        /* 查询区样式 */
        .search-box { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 10px; margin-bottom: 25px; 
        }
        .search-box input, .search-box select { padding: 10px 15px; border: 2px solid #e0e0e0; border-radius: 8px; }
        .search-btn, .export-btn {
            background: linear-gradient(135deg, #2196F3 0%, #1976D32 100%); color: white;
            border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .export-btn { background: linear-gradient(135deg, #9C27B0 0%, #673AB7 100%); }
        
        /* 表格样式 */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-weight: 600; color: #2c3e50; border-bottom: 2px solid #e0e0e0; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
        tr:hover { background: #f8f9fa; }
        .status-ok { background: #4CAF50; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-late { background: #FF9800; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-absent { background: #f44336; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .action-buttons-small { display: flex; gap: 8px; }
        .btn-edit, .btn-delete { 
            padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; 
            font-size: 12px; color: white; 
        }
        .btn-edit { background: #2196F3; }
        .btn-delete { background: #f44336; }
        
        /* 提示信息 */
        .toast {
            position: fixed; top: 20px; right: 20px; padding: 15px 25px;
            border-radius: 8px; color: white; font-weight: 500; z-index: 1001;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #f44336; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .form-row, .search-box { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; align-items: center; }
            .action-btn { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页：功能入口 -->
        <div id="homePage" class="header">
            <h1><i class="fas fa-chalkboard-teacher"></i> 学校教务巡查系统</h1>
            <div class="action-buttons">
                <button class="action-btn btn-fill" id="fillBtn">
                    <i class="fas fa-edit"></i>
                    <strong>填写巡查记录</strong>
                    <p>选择班级，填写巡查信息</p>
                </button>
                <button class="action-btn btn-query" id="queryBtn">
                    <i class="fas fa-search"></i>
                    <strong>查询巡查记录</strong>
                    <p>多条件筛选，查看历史记录</p>
                </button>
            </div>
        </div>

        <!-- 填写记录页面 -->
        <div id="fillPage" class="main-content">
            <div class="page-header">
                <button class="back-btn" id="backFromFill">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 class="page-title"><i class="fas fa-edit"></i> 填写巡查记录</h2>
            </div>
            <form id="inspectionForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="inspectionDate" class="required">巡查日期</label>
                        <input type="date" id="inspectionDate" required>
                        <div class="weekday-display" id="weekdayDisplay"></div>
                    </div>
                    <div class="form-group">
                        <label for="classSelect" class="required">班级</label>
                        <select id="classSelect" required>
                            <option value="">请选择班级</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="periodSelect" class="required">节次</label>
                        <select id="periodSelect" required>
                            <option value="">请选择节次</option>
                            <option value="1">第一节</option><option value="2">第二节</option>
                            <option value="3">第三节</option><option value="4">第四节</option>
                            <option value="5">第五节</option><option value="6">第六节</option>
                            <option value="7">第七节</option><option value="8">第八节</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inspectorSelect" class="required">巡查人</label>
                        <select id="inspectorSelect" required>
                            <option value="">请选择巡查人</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="arrivalStatus" class="required">教师到岗情况</label>
                        <select id="arrivalStatus" required>
                            <option value="">请选择到岗情况</option>
                            <option value="按时到岗">按时到岗</option>
                            <option value="迟到">迟到</option>
                            <option value="旷课">旷课</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="studentStatus">学生课前状态</label>
                        <select id="studentStatus">
                            <option value="">请选择学生状态</option>
                            <option value="准备就绪">准备就绪</option>
                            <option value="部分迟到">部分迟到</option>
                            <option value="喧哗吵闹">喧哗吵闹</option>
                            <option value="精神不振">精神不振</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="subjectInput">科目</label>
                        <input type="text" id="subjectInput" placeholder="可修改默认科目">
                    </div>
                    <div class="form-group">
                        <label for="teacherInput">任课教师</label>
                        <input type="text" id="teacherInput" placeholder="可修改默认教师">
                    </div>
                </div>
                <div class="form-group">
                    <label for="environmentInput">教室环境</label>
                    <textarea id="environmentInput" rows="2" placeholder="描述教室环境、设备、卫生等情况..."></textarea>
                </div>
                <div class="form-group">
                    <label for="remarksInput">备注说明</label>
                    <textarea id="remarksInput" rows="2" placeholder="其他需要说明的情况..."></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> 提交巡查记录
                </button>
            </form>
        </div>

        <!-- 查询记录页面 -->
        <div id="queryPage" class="main-content">
            <div class="page-header">
                <button class="back-btn" id="backFromQuery">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 class="page-title"><i class="fas fa-search"></i> 查询巡查记录</h2>
            </div>
            <div class="search-box">
                <input type="date" id="searchDate" placeholder="选择日期">
                <select id="searchClass">
                    <option value="">全部班级</option>
                </select>
                <select id="searchInspector">
                    <option value="">全部巡查人</option>
                </select>
                <button class="search-btn" id="searchBtn">
                    <i class="fas fa-search"></i> 搜索
                </button>
                <button class="export-btn" id="downloadBtn">
                    <i class="fas fa-download"></i> 下载
                </button>
            </div>
            <div class="table-container">
                <table id="inspectionsTable">
                    <thead>
                        <tr>
                            <th>日期/星期</th>
                            <th>班级</th>
                            <th>节次</th>
                            <th>巡查人</th>
                            <th>到岗情况</th>
                            <th>科目/教师</th>
                            <th>学生状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="inspectionsBody">
                        <!-- 数据行由JavaScript动态插入 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 引入 Supabase 客户端库 -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        // 修复版本：修复DOM元素未加载导致的null读取错误
        console.log('开始加载学校教务巡查系统...');
        
        // 等待DOM完全加载后再执行
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM已加载，开始初始化系统...');
            
            // 定义全局变量
            let supabaseClient = null;
            const SUPABASE_URL = 'https://dpyennxjaejstvbbjmbt.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_v3N76dVRe9uxrmlj-DwbfA_FYAcD06R';
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            
            // 初始化函数
            function initializeSystem() {
                console.log('初始化系统...');
                
                // 1. 初始化Supabase客户端
                try {
                    if (typeof supabase === 'undefined') {
                        console.error('Supabase库未加载');
                        showToast('数据库连接库加载失败，请刷新页面重试', 'error');
                        return;
                    }
                    
                    // 检查是否有已存在的supabase变量
                    if (window.supabase) {
                        console.log('使用全局Supabase客户端');
                        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    } else {
                        console.error('Supabase库加载异常');
                        showToast('系统初始化失败，请刷新页面', 'error');
                        return;
                    }
                    
                    console.log('Supabase客户端创建成功');
                } catch (error) {
                    console.error('创建Supabase客户端失败:', error);
                    showToast('数据库连接失败: ' + error.message, 'error');
                    return;
                }
                
                // 2. 设置默认日期
                const today = new Date().toISOString().split('T')[0];
                
                // 安全地设置日期输入框
                const inspectionDateEl = document.getElementById('inspectionDate');
                const searchDateEl = document.getElementById('searchDate');
                
                if (inspectionDateEl) {
                    inspectionDateEl.value = today;
                    inspectionDateEl.addEventListener('change', updateWeekday);
                }
                
                if (searchDateEl) {
                    searchDateEl.value = today;
                }
                
                // 3. 更新星期显示
                updateWeekday();
                
                // 4. 加载班级和巡查人列表
                loadClassAndInspectorList();
                
                // 5. 绑定事件监听器
                setupEventListeners();
                
                // 6. 不自动加载数据，避免null读取错误
                console.log('系统初始化完成，准备就绪');
                showToast('系统准备就绪', 'success');
                
                // 7. 确保首页可见
                showHomePage();
            }
            
            // 显示首页
            function showHomePage() {
                console.log('显示首页');
                document.getElementById('homePage').style.display = 'block';
                document.getElementById('fillPage').classList.remove('active');
                document.getElementById('queryPage').classList.remove('active');
            }
            
            // 显示指定页面
            function showPage(pageId) {
                console.log('切换到页面:', pageId);
                
                // 隐藏首页
                document.getElementById('homePage').style.display = 'none';
                
                // 隐藏所有内容页
                document.querySelectorAll('.main-content').forEach(page => {
                    page.classList.remove('active');
                });
                
                // 显示目标页面
                const targetPage = document.getElementById(pageId);
                if (targetPage) {
                    targetPage.classList.add('active');
                    
                    // 如果是查询页面，加载数据
                    if (pageId === 'queryPage') {
                        // 使用setTimeout延迟执行，确保DOM完全加载
                        setTimeout(function() {
                            searchInspections();
                        }, 100);
                    }
                } else {
                    console.error('找不到页面:', pageId);
                }
            }
            
            // 更新星期显示
            function updateWeekday() {
                const dateInput = document.getElementById('inspectionDate');
                const display = document.getElementById('weekdayDisplay');
                
                if (dateInput && dateInput.value && display) {
                    const date = new Date(dateInput.value);
                    display.textContent = weekdays[date.getDay()];
                } else if (display) {
                    display.textContent = '';
                }
            }
            
            // 加载班级和巡查人列表
            function loadClassAndInspectorList() {
                console.log('加载班级和巡查人列表...');
                
                // 班级列表
                const classGroups = [
                    { title: "九年级", classes: ["九1班", "九2班", "九3班", "九4班", "九5班", "九6班"] },
                    { title: "八年级", classes: ["八1班", "八2班", "八3班", "八4班", "八5班", "八6班"] },
                    { title: "七年级", classes: ["七1班", "七2班", "七3班", "七4班", "七5班", "七6班"] }
                ];
                const allClasses = classGroups.flatMap(g => g.classes);
                
                // 巡查人列表
                const allInspectors = ['张主任', '李老师', '王督导', '赵老师', '刘老师'];
                
                // 填充班级选择器
                allClasses.forEach(className => {
                    ['classSelect', 'searchClass'].forEach(selectId => {
                        const selectEl = document.getElementById(selectId);
                        if (selectEl) {
                            const option = document.createElement('option');
                            option.value = className;
                            option.textContent = className;
                            selectEl.appendChild(option);
                        }
                    });
                });
                
                // 填充巡查人选择器
                allInspectors.forEach(name => {
                    ['inspectorSelect', 'searchInspector'].forEach(selectId => {
                        const selectEl = document.getElementById(selectId);
                        if (selectEl) {
                            const option = document.createElement('option');
                            option.value = name;
                            option.textContent = name;
                            selectEl.appendChild(option);
                        }
                    });
                });
                
                console.log('班级和巡查人列表加载完成');
            }
            
            // 绑定事件监听器
            function setupEventListeners() {
                console.log('设置事件监听器...');
                
                // 页面切换按钮
                document.getElementById('fillBtn').addEventListener('click', function() {
                    showPage('fillPage');
                });
                
                document.getElementById('queryBtn').addEventListener('click', function() {
                    showPage('queryPage');
                });
                
                document.getElementById('backFromFill').addEventListener('click', function() {
                    showHomePage();
                });
                
                document.getElementById('backFromQuery').addEventListener('click', function() {
                    showHomePage();
                });
                
                // 搜索按钮
                document.getElementById('searchBtn').addEventListener('click', function() {
                    searchInspections();
                });
                
                // 下载按钮
                document.getElementById('downloadBtn').addEventListener('click', function() {
                    downloadData();
                });
                
                // 表单提交
                document.getElementById('inspectionForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    submitInspection();
                });
                
                console.log('事件监听器设置完成');
            }
            
            // 搜索巡查记录 - 修复null读取错误
            async function searchInspections() {
                console.log('开始搜索巡查记录...');
                
                // 检查Supabase客户端
                if (!supabaseClient) {
                    console.error('Supabase客户端未初始化');
                    showToast('数据库未连接，请刷新页面重试', 'error');
                    return;
                }
                
                // 安全地获取搜索条件 - 避免null读取错误
                let searchDate = '';
                let searchClass = '';
                let searchInspector = '';
                
                try {
                    const searchDateEl = document.getElementById('searchDate');
                    const searchClassEl = document.getElementById('searchClass');
                    const searchInspectorEl = document.getElementById('searchInspector');
                    
                    if (searchDateEl) searchDate = searchDateEl.value;
                    if (searchClassEl) searchClass = searchClassEl.value;
                    if (searchInspectorEl) searchInspector = searchInspectorEl.value;
                    
                    console.log('搜索条件:', { searchDate, searchClass, searchInspector });
                } catch (error) {
                    console.error('获取搜索条件失败:', error);
                    showToast('搜索条件获取失败', 'error');
                    return;
                }
                
                try {
                    // 构建查询
                    let query = supabaseClient
                        .from('inspections')
                        .select('*')
                        .order('inspection_date', { ascending: false });
                    
                    if (searchDate) query = query.eq('inspection_date', searchDate);
                    if (searchClass) query = query.eq('class_name', searchClass);
                    if (searchInspector) query = query.eq('inspector', searchInspector);
                    
                    const { data, error } = await query;
                    
                    if (error) {
                        console.error('搜索查询失败:', error);
                        showToast('搜索失败: ' + error.message, 'error');
                        return;
                    }
                    
                    console.log('搜索到记录数:', data ? data.length : 0);
                    displayInspections(data || []);
                    
                } catch (error) {
                    console.error('搜索过程中发生错误:', error);
                    showToast('搜索过程中发生错误: ' + error.message, 'error');
                }
            }
            
            // 显示巡查记录
            function displayInspections(records) {
                const tbody = document.getElementById('inspectionsBody');
                if (!tbody) {
                    console.error('找不到表格tbody元素');
                    return;
                }
                
                console.log('显示巡查记录，数量:', records.length);
                
                if (records.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px; color: #666;">
                                <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 15px; display: block; opacity: 0.5;"></i>
                                没有找到匹配的巡查记录
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                let html = '';
                records.forEach(record => {
                    // 确定状态显示样式
                    let statusClass = 'status-ok';
                    if (record.arrival_status === '迟到') statusClass = 'status-late';
                    if (record.arrival_status === '旷课') statusClass = 'status-absent';
                    
                    html += `
                        <tr>
                            <td>
                                <div>${record.inspection_date || '-'}</div>
                                <div style="font-size: 12px; color: #666;">
                                    ${record.inspection_date ? new Date(record.inspection_date).toLocaleDateString('zh-CN', {weekday: 'short'}) : ''}
                                </div>
                            </td>
                            <td>${record.class_name || '-'}</td>
                            <td>第${record.period || '?'}节</td>
                            <td>${record.inspector || '-'}</td>
                            <td><span class="${statusClass}">${record.arrival_status || '未知'}</span></td>
                            <td>
                                <div>${record.subject || '-'}</div>
                                <div style="font-size: 12px; color: #666;">${record.teacher_name || ''}</div>
                            </td>
                            <td>${record.student_status || '-'}</td>
                            <td>
                                <div class="action-buttons-small">
                                    <button class="btn-edit" onclick="editRecord('${record.id}')">编辑</button>
                                    <button class="btn-delete" onclick="deleteRecord('${record.id}')">删除</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                
                tbody.innerHTML = html;
            }
            
            // 提交巡查记录
            async function submitInspection() {
                console.log('提交巡查记录...');
                
                if (!supabaseClient) {
                    showToast('数据库未连接，无法提交', 'error');
                    return;
                }
                
                // 收集表单数据
                const formData = {
                    inspection_date: document.getElementById('inspectionDate').value,
                    class_name: document.getElementById('classSelect').value,
                    period: parseInt(document.getElementById('periodSelect').value) || 1,
                    inspector: document.getElementById('inspectorSelect').value,
                    arrival_status: document.getElementById('arrivalStatus').value,
                    student_status: document.getElementById('studentStatus').value || '',
                    subject: document.getElementById('subjectInput').value || '',
                    teacher_name: document.getElementById('teacherInput').value || '',
                    environment: document.getElementById('environmentInput').value || '',
                    remarks: document.getElementById('remarksInput').value || ''
                };
                
                // 验证必填字段
                if (!formData.inspection_date || !formData.class_name || 
                    !formData.period || !formData.inspector || !formData.arrival_status) {
                    showToast('请填写所有必填字段', 'error');
                    return;
                }
                
                try {
                    const { error } = await supabaseClient
                        .from('inspections')
                        .insert([formData]);
                    
                    if (error) {
                        console.error('提交失败:', error);
                        showToast('提交失败: ' + error.message, 'error');
                        return;
                    }
                    
                    showToast('巡查记录提交成功！', 'success');
                    
                    // 清空表单
                    document.getElementById('inspectionForm').reset();
                    
                    // 重置日期
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById('inspectionDate').value = today;
                    updateWeekday();
                    
                    // 跳转到查询页面
                    showPage('queryPage');
                    
                } catch (error) {
                    console.error('提交过程中发生错误:', error);
                    showToast('提交失败: ' + error.message, 'error');
                }
            }
            
            // 下载数据
            async function downloadData() {
                console.log('下载数据...');
                
                const currentInspector = document.getElementById('inspectorSelect').value;
                if (!currentInspector) {
                    showToast('请先在填写页面选择巡查人身份', 'error');
                    return;
                }
                
                try {
                    const { data, error } = await supabaseClient
                        .from('inspections')
                        .select('*')
                        .order('inspection_date', { ascending: false });
                    
                    if (error) {
                        showToast('获取数据失败: ' + error.message, 'error');
                        return;
                    }
                    
                    if (!data || data.length === 0) {
                        showToast('没有可下载的数据', 'warning');
                        return;
                    }
                    
                    // 构建CSV
                    let csv = '日期,班级,节次,巡查人,到岗情况,科目,教师,学生状态,教室环境,备注\n';
                    
                    data.forEach(record => {
                        csv += `"${record.inspection_date || ''}","${record.class_name || ''}","第${record.period || ''}节","${record.inspector || ''}","${record.arrival_status || ''}","${record.subject || ''}","${record.teacher_name || ''}","${record.student_status || ''}","${record.environment || ''}","${record.remarks || ''}"\n`;
                    });
                    
                    // 创建下载链接
                    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    
                    link.setAttribute('href', url);
                    link.setAttribute('download', `巡查记录_${new Date().toISOString().split('T')[0]}.csv`);
                    link.style.visibility = 'hidden';
                    
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    
                    showToast('数据下载开始，请检查浏览器下载列表', 'success');
                    
                } catch (error) {
                    console.error('下载失败:', error);
                    showToast('下载失败: ' + error.message, 'error');
                }
            }
            
            // 编辑记录
            window.editRecord = async function(recordId) {
                console.log('编辑记录:', recordId);
                showToast('编辑功能开发中，记录ID: ' + recordId, 'success');
            }
            
            // 删除记录
            window.deleteRecord = async function(recordId) {
                console.log('删除记录:', recordId);
                
                if (!confirm('确定要删除这条记录吗？此操作不可撤销。')) {
                    return;
                }
                
                if (!supabaseClient) {
                    showToast('数据库未连接，无法删除', 'error');
                    return;
                }
                
                try {
                    const { error } = await supabaseClient
                        .from('inspections')
                        .delete()
                        .eq('id', recordId);
                    
                    if (error) {
                        console.error('删除失败:', error);
                        showToast('删除失败: ' + error.message, 'error');
                        return;
                    }
                    
                    showToast('记录删除成功！', 'success');
                    
                    // 刷新列表
                    searchInspections();
                    
                } catch (error) {
                    console.error('删除过程中发生错误:', error);
                    showToast('删除失败: ' + error.message, 'error');
                }
            }
            
            // 显示提示
            function showToast(message, type) {
                console.log('显示提示:', message, type);
                
                // 移除现有的提示
                const existingToasts = document.querySelectorAll('.toast');
                existingToasts.forEach(toast => toast.remove());
                
                // 创建新提示
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                // 3秒后移除
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 3000);
            }
            
            // 启动系统
            initializeSystem();
            
        }); // DOMContentLoaded结束
        
        console.log('系统脚本加载完成，等待DOM加载...');
    </script>
</body>
</html>
