<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂巡查管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .home-page {
            padding: 40px 20px;
            text-align: center;
        }
        
        .login-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin: 0 auto 30px;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .login-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        select, input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
        }
        
        .home-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }
        
        .nav-btn {
            padding: 20px 50px;
            font-size: 1.2em;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .nav-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .nav-btn:disabled:hover {
            box-shadow: none;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 15px 25px;
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        .back-btn:hover {
            color: #764ba2;
        }
        
        .current-user {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        /* 班级选择页面样式 */
        .class-select-page {
            padding: 30px;
        }
        
        .page-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f2f5;
        }
        
        .grade-section {
            margin-bottom: 40px;
        }
        
        .grade-title {
            color: #4b6cb7;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid #4b6cb7;
        }
        
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        
        .class-card {
            background: white;
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #e1e5e9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .class-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #4b6cb7;
        }
        
        .class-icon {
            width: 80px;
            height: 80px;
            background: #6a11cb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .class-icon i {
            color: white;
            font-size: 36px;
        }
        
        .class-name {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        /* 查询页面样式 */
        .query-page {
            padding: 30px;
        }
        
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .filter-buttons {
            grid-column: 1 / -1;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #495057;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
        }
        
        .btn-download {
            background: #28a745;
            color: white;
        }
        
        .btn-download:hover {
            background: #218838;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #e1e5e9;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e1e5e9;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        
        .edit-btn, .delete-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .edit-btn {
            background: #3498db;
            color: white;
        }
        
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .status-on-time {
            background: #d5f4e6;
            color: #27ae60;
        }
        
        .status-late {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-absent {
            background: #f8d7da;
            color: #721c24;
        }
        
        /* 消息提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
        }
        
        .toast.show {
            display: block;
        }
        
        .toast.success {
            border-left: 4px solid #28a745;
        }
        
        .toast.error {
            border-left: 4px solid #dc3545;
        }
        
        .toast.warning {
            border-left: 4px solid #ffc107;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .classes-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .filters {
                grid-template-columns: 1fr;
            }
            
            .nav-btn {
                padding: 15px 30px;
                font-size: 1em;
            }
            
            .home-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div class="header">
                <h1><i class="fas fa-chalkboard-teacher"></i> 课堂巡查管理系统</h1>
                <p>高效记录、便捷查询、智能统计</p>
                <div class="current-user" id="currentUserDisplay" style="display: none;">
                    当前巡查人: <span id="currentUserName"></span>
                </div>
            </div>
            
            <div class="home-page">
                <div class="login-section">
                    <h2><i class="fas fa-user-circle"></i> 巡查人登录</h2>
                    <div class="form-group">
                        <label for="inspectorSelect"><i class="fas fa-user"></i> 选择巡查人</label>
                        <select id="inspectorSelect" class="form-control">
                            <option value="">请选择巡查人</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword"><i class="fas fa-lock"></i> 密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" class="form-control">
                    </div>
                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="rememberMe">
                            <label for="rememberMe" style="font-weight: normal;">记住我（下次自动登录）</label>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="loginInspector()" style="width: 100%;">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </div>
                
                <h2 style="color: #2c3e50; margin-bottom: 20px;">请选择操作</h2>
                <div class="home-buttons">
                    <button class="nav-btn" onclick="showPage('recordPage')" id="recordBtn" disabled>
                        <i class="fas fa-edit"></i>
                        填写巡查记录
                    </button>
                    <button class="nav-btn" onclick="showPage('classSelectPage')" id="queryBtn" disabled>
                        <i class="fas fa-search"></i>
                        查询巡查记录
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 班级选择页面 -->
        <div id="classSelectPage" class="page">
            <button class="back-btn" onclick="showPage('homePage')">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
            
            <div class="class-select-page">
                <h2 class="page-title">
                    <i class="fas fa-users"></i> 请选择要查询的班级
                </h2>
                
                <!-- 七年级 -->
                <div class="grade-section">
                    <h3 class="grade-title">七年级</h3>
                    <div class="classes-grid" id="grade7">
                        <!-- 七年级班级卡片会在这里动态生成 -->
                    </div>
                </div>
                
                <!-- 八年级 -->
                <div class="grade-section">
                    <h3 class="grade-title">八年级</h3>
                    <div class="classes-grid" id="grade8">
                        <!-- 八年级班级卡片会在这里动态生成 -->
                    </div>
                </div>
                
                <!-- 九年级 -->
                <div class="grade-section">
                    <h3 class="grade-title">九年级</h3>
                    <div class="classes-grid" id="grade9">
                        <!-- 九年级班级卡片会在这里动态生成 -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 查询页面 -->
        <div id="queryPage" class="page">
            <button class="back-btn" onclick="showPage('classSelectPage')">
                <i class="fas fa-arrow-left"></i>
                返回班级选择
            </button>
            
            <div class="query-page">
                <h2 id="queryPageTitle" class="page-title">
                    <i class="fas fa-search"></i> 查询巡查记录
                </h2>
                
                <!-- 筛选条件区域 -->
                <div class="filters">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> 开始日期</label>
                        <input type="date" id="filterStartDate">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> 结束日期</label>
                        <input type="date" id="filterEndDate">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-users"></i> 班级</label>
                        <select id="filterClass">
                            <option value="">全部班级</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-calendar-day"></i> 星期</label>
                        <select id="filterWeekday">
                            <option value="">全部星期</option>
                            <option value="星期一">星期一</option>
                            <option value="星期二">星期二</option>
                            <option value="星期三">星期三</option>
                            <option value="星期四">星期四</option>
                            <option value="星期五">星期五</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> 节次</label>
                        <select id="filterPeriod">
                            <option value="">全部节次</option>
                            <option value="1">第1节</option>
                            <option value="2">第2节</option>
                            <option value="3">第3节</option>
                            <option value="4">第4节</option>
                            <option value="5">第5节</option>
                            <option value="6">第6节</option>
                            <option value="7">第7节</option>
                            <option value="8">第8节</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-book"></i> 科目</label>
                        <select id="filterSubject">
                            <option value="">全部科目</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-chalkboard-teacher"></i> 任课教师</label>
                        <input type="text" id="filterTeacher" placeholder="输入教师姓名">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user-tie"></i> 巡查人</label>
                        <select id="filterInspector">
                            <option value="">全部巡查人</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user-check"></i> 到岗情况</label>
                        <select id="filterArrivalStatus">
                            <option value="">全部</option>
                            <option value="按时到岗">按时到岗</option>
                            <option value="迟到">迟到</option>
                            <option value="未到岗">未到岗</option>
                        </select>
                    </div>
                    
                    <div class="filter-buttons">
                        <button class="btn btn-primary" onclick="searchInspections()">
                            <i class="fas fa-search"></i> 查询
                        </button>
                        <button class="btn btn-secondary" onclick="resetFilters()">
                            <i class="fas fa-redo"></i> 重置筛选
                        </button>
                        <button class="btn btn-download" onclick="showPasswordModal()">
                            <i class="fas fa-download"></i> 下载数据
                        </button>
                    </div>
                </div>
                
                <!-- 表格区域 -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>星期</th>
                                <th>班级</th>
                                <th>节次</th>
                                <th>科目</th>
                                <th>教师</th>
                                <th>到岗情况</th>
                                <th>学生状态</th>
                                <th>教室环境</th>
                                <th>巡查人</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTable">
                            <!-- 数据会动态加载到这里 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 填写记录页 -->
        <div id="recordPage" class="page">
            <button class="back-btn" onclick="showPage('homePage')">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
            
            <div class="form-container" style="max-width: 800px; margin: 0 auto; padding: 20px;">
                <h2 class="page-title">
                    <i class="fas fa-file-alt"></i> 填写巡查记录
                </h2>
                
                <form id="inspectionForm" onsubmit="event.preventDefault(); submitInspection();">
                    <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="recordDate"><i class="fas fa-calendar"></i> 巡查日期</label>
                            <input type="date" id="recordDate" class="form-control" required>
                        </div>
                        
                        <div class="form-group" style="flex: 1;">
                            <label for="recordWeekday"><i class="fas fa-calendar-day"></i> 星期</label>
                            <select id="recordWeekday" class="form-control" required>
                                <option value="">请选择星期</option>
                                <option value="星期一">星期一</option>
                                <option value="星期二">星期二</option>
                                <option value="星期三">星期三</option>
                                <option value="星期四">星期四</option>
                                <option value="星期五">星期五</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="recordClass"><i class="fas fa-users"></i> 班级</label>
                            <select id="recordClass" class="form-control" required onchange="loadSchedule()">
                                <option value="">请选择班级</option>
                            </select>
                        </div>
                        
                        <div class="form-group" style="flex: 1;">
                            <label for="recordPeriod"><i class="fas fa-clock"></i> 节次</label>
                            <select id="recordPeriod" class="form-control" required onchange="loadSchedule()">
                                <option value="">请选择节次</option>
                                <option value="1">第1节</option>
                                <option value="2">第2节</option>
                                <option value="3">第3节</option>
                                <option value="4">第4节</option>
                                <option value="5">第5节</option>
                                <option value="6">第6节</option>
                                <option value="7">第7节</option>
                                <option value="8">第8节</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="recordSubject"><i class="fas fa-book"></i> 科目</label>
                            <select id="recordSubject" class="form-control" required>
                                <option value="">请选择科目</option>
                            </select>
                        </div>
                        
                        <div class="form-group" style="flex: 1;">
                            <label for="recordTeacher"><i class="fas fa-chalkboard-teacher"></i> 任课教师</label>
                            <select id="recordTeacher" class="form-control" required>
                                <option value="">请选择教师</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="recordArrivalStatus"><i class="fas fa-user-check"></i> 到岗情况</label>
                            <select id="recordArrivalStatus" class="form-control" required>
                                <option value="">请选择到岗情况</option>
                                <option value="按时到岗">按时到岗</option>
                                <option value="迟到">迟到</option>
                                <option value="未到岗">未到岗</option>
                            </select>
                        </div>
                        
                        <div class="form-group" style="flex: 1;">
                            <label for="recordInspector"><i class="fas fa-user-tie"></i> 巡查人</label>
                            <input type="text" id="recordInspector" class="form-control" readonly style="background: #f5f5f5;">
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="recordStudentStatus"><i class="fas fa-graduation-cap"></i> 学生状态</label>
                        <textarea id="recordStudentStatus" class="form-control" rows="3" placeholder="描述学生听课状态、纪律等"></textarea>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="recordEnvironment"><i class="fas fa-school"></i> 教室环境</label>
                        <textarea id="recordEnvironment" class="form-control" rows="2" placeholder="描述教室环境情况"></textarea>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="recordRemarks"><i class="fas fa-sticky-note"></i> 备注</label>
                        <textarea id="recordRemarks" class="form-control" rows="2" placeholder="其他需要记录的事项"></textarea>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="submit" class="btn btn-primary" id="submitBtn" style="flex: 1;">
                            <i class="fas fa-save"></i> 保存记录
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="resetRecordForm()" style="flex: 1;">
                            <i class="fas fa-redo"></i> 重置
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="showPage('homePage')" style="flex: 1;">
                            <i class="fas fa-times"></i> 取消
                        </button>
                    </div>
                    <input type="hidden" id="recordId">
                </form>
            </div>
        </div>
    </div>
    
    <!-- 消息提示 -->
    <div id="toast" class="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        (function() {
            'use strict';
            
            // 全局变量
            let supabaseClient = null;
            let currentInspector = null;
            let editingRecordId = null;
            let inspectorsData = [];
            let classesData = [];
            let teachersData = [];
            let scheduleData = [];
            
            // 将函数暴露给全局作用域
            window.showPage = showPage;
            window.loginInspector = loginInspector;
            window.selectClass = selectClass;
            window.searchInspections = searchInspections;
            window.submitInspection = submitInspection;
            window.editRecord = editRecord;
            window.deleteRecord = deleteRecord;
            window.resetFilters = resetFilters;
            window.showPasswordModal = showPasswordModal;
            window.loadSchedule = loadSchedule;
            window.resetRecordForm = resetRecordForm;
            
            // 初始化应用
            async function initApp() {
                try {
                    console.log('正在初始化应用...');
                    
                    // 初始化Supabase
                    await initSupabase();
                    
                    // 加载巡查人数据
                    await loadInspectors();
                    
                    // 设置默认日期
                    setDefaultDates();
                    
                    // 检查本地存储的登录状态
                    checkLoginStatus();
                    
                    // 如果已登录，启用按钮
                    if (currentInspector) {
                        enableButtons();
                    }
                    
                    console.log('系统初始化完成');
                    
                } catch (error) {
                    console.error('初始化失败:', error);
                    showToast('系统初始化失败: ' + error.message, 'error');
                }
            }
            
            // 初始化Supabase
            async function initSupabase() {
                try {
                    const SUPABASE_URL = 'https://dpyennxjaejstvbbjmbt.supabase.co';
                    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRweWVubnhqYWVqc3R2YmJqbWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjcwNTYzMzcsImV4cCI6MjA0MjYzMjMzN30.v3N76dVRe9uxrmlj-DwbfA_FYAcD06R';
                    
                    // 检查Supabase库是否已加载
                    if (typeof supabase === 'undefined') {
                        throw new Error('Supabase库加载失败，请检查网络连接');
                    }
                    
                    // 创建客户端
                    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                        auth: {
                            persistSession: false,
                            autoRefreshToken: false
                        }
                    });
                    
                    // 测试连接
                    const { data, error } = await supabaseClient
                        .from('classes')
                        .select('count', { count: 'exact', head: true })
                        .limit(1);
                    
                    if (error) {
                        throw new Error('数据库连接失败: ' + error.message);
                    }
                    
                    console.log('Supabase连接成功');
                    
                } catch (error) {
                    console.error('Supabase初始化失败:', error);
                    throw error;
                }
            }
            
            // 加载巡查人数据
            async function loadInspectors() {
                try {
                    const { data, error } = await supabaseClient
                        .from('inspectors')
                        .select('*')
                        .order('inspector_name');
                    
                    if (error) throw error;
                    
                    inspectorsData = data || [];
                    
                    // 填充巡查人下拉选择
                    const inspectorSelect = document.getElementById('inspectorSelect');
                    const filterInspector = document.getElementById('filterInspector');
                    
                    inspectorSelect.innerHTML = '<option value="">请选择巡查人</option>';
                    filterInspector.innerHTML = '<option value="">全部巡查人</option>';
                    
                    inspectorsData.forEach(inspector => {
                        const option1 = document.createElement('option');
                        option1.value = inspector.id;
                        option1.textContent = inspector.inspector_name;
                        inspectorSelect.appendChild(option1);
                        
                        const option2 = document.createElement('option');
                        option2.value = inspector.inspector_name;
                        option2.textContent = inspector.inspector_name;
                        filterInspector.appendChild(option2);
                    });
                    
                } catch (error) {
                    console.error('加载巡查人失败:', error);
                    throw error;
                }
            }
            
            // 检查登录状态
            function checkLoginStatus() {
                const savedInspector = localStorage.getItem('currentInspector');
                const rememberMe = localStorage.getItem('rememberMe') === 'true';
                
                if (savedInspector && rememberMe) {
                    try {
                        currentInspector = JSON.parse(savedInspector);
                        document.getElementById('currentUserName').textContent = currentInspector.name;
                        document.getElementById('currentUserDisplay').style.display = 'block';
                        
                        // 设置巡查人选择框的值
                        const inspectorSelect = document.getElementById('inspectorSelect');
                        for (let i = 0; i < inspectorSelect.options.length; i++) {
                            if (inspectorSelect.options[i].textContent === currentInspector.name) {
                                inspectorSelect.selectedIndex = i;
                                break;
                            }
                        }
                        
                        showToast(`已自动登录: ${currentInspector.name}`, 'success');
                        
                    } catch (error) {
                        console.error('解析登录信息失败:', error);
                        localStorage.removeItem('currentInspector');
                        localStorage.removeItem('rememberMe');
                    }
                }
            }
            
            // 页面切换函数
            function showPage(pageId) {
                console.log('切换到页面:', pageId);
                
                // 检查是否已登录
                if (!currentInspector && pageId !== 'homePage') {
                    showToast('请先登录巡查人', 'warning');
                    return;
                }
                
                // 隐藏所有页面
                document.querySelectorAll('.page').forEach(page => {
                    page.classList.remove('active');
                });
                
                // 显示目标页面
                const targetPage = document.getElementById(pageId);
                if (targetPage) {
                    targetPage.classList.add('active');
                    
                    // 如果是查询页，加载数据
                    if (pageId === 'queryPage') {
                        setTimeout(() => {
                            searchInspections();
                        }, 100);
                    }
                    
                    // 如果是班级选择页，渲染班级
                    if (pageId === 'classSelectPage') {
                        setTimeout(() => {
                            renderClassCards();
                        }, 100);
                    }
                    
                    // 如果是填写记录页，设置巡查人
                    if (pageId === 'recordPage' && currentInspector) {
                        document.getElementById('recordInspector').value = currentInspector.name;
                    }
                }
            }
            
            // 巡查人登录
            async function loginInspector() {
                const inspectorSelect = document.getElementById('inspectorSelect');
                const passwordInput = document.getElementById('loginPassword');
                const rememberMe = document.getElementById('rememberMe').checked;
                
                if (!inspectorSelect.value) {
                    showToast('请选择巡查人', 'error');
                    return;
                }
                
                if (!passwordInput.value) {
                    showToast('请输入密码', 'error');
                    return;
                }
                
                // 这里简化密码验证，实际应该从数据库验证
                const inspectorName = inspectorSelect.options[inspectorSelect.selectedIndex].textContent;
                
                // 存储当前巡查人
                currentInspector = {
                    id: inspectorSelect.value,
                    name: inspectorName
                };
                
                // 保存登录状态
                if (rememberMe) {
                    localStorage.setItem('currentInspector', JSON.stringify(currentInspector));
                    localStorage.setItem('rememberMe', 'true');
                } else {
                    sessionStorage.setItem('currentInspector', JSON.stringify(currentInspector));
                }
                
                // 更新UI
                document.getElementById('currentUserName').textContent = inspectorName;
                document.getElementById('currentUserDisplay').style.display = 'block';
                
                // 启用按钮
                enableButtons();
                
                showToast('登录成功！', 'success');
            }
            
            // 启用功能按钮
            function enableButtons() {
                document.getElementById('recordBtn').disabled = false;
                document.getElementById('queryBtn').disabled = false;
            }
            
            // 选择班级
            function selectClass(className) {
                // 跳转到查询页
                showPage('queryPage');
                
                // 设置班级筛选条件
                document.getElementById('filterClass').value = className;
                
                // 自动查询
                setTimeout(() => {
                    searchInspections();
                }, 100);
            }
            
            // 渲染班级卡片
            async function renderClassCards() {
                try {
                    // 加载班级数据
                    const { data, error } = await supabaseClient
                        .from('classes')
                        .select('*')
                        .order('class_name');
                    
                    if (error) throw error;
                    
                    classesData = data || [];
                    
                    // 清空现有内容
                    document.getElementById('grade7').innerHTML = '';
                    document.getElementById('grade8').innerHTML = '';
                    document.getElementById('grade9').innerHTML = '';
                    
                    // 按年级分组
                    const grade7 = classesData.filter(c => c.class_name.startsWith('七'));
                    const grade8 = classesData.filter(c => c.class_name.startsWith('八'));
                    const grade9 = classesData.filter(c => c.class_name.startsWith('九'));
                    
                    // 渲染七年级
                    grade7.forEach(cls => {
                        const card = createClassCard(cls);
                        document.getElementById('grade7').appendChild(card);
                    });
                    
                    // 渲染八年级
                    grade8.forEach(cls => {
                        const card = createClassCard(cls);
                        document.getElementById('grade8').appendChild(card);
                    });
                    
                    // 渲染九年级
                    grade9.forEach(cls => {
                        const card = createClassCard(cls);
                        document.getElementById('grade9').appendChild(card);
                    });
                    
                } catch (error) {
                    console.error('渲染班级卡片失败:', error);
                    showToast('加载班级列表失败', 'error');
                }
            }
            
            // 创建班级卡片
            function createClassCard(classInfo) {
                const card = document.createElement('div');
                card.className = 'class-card';
                
                card.innerHTML = `
                    <div class="class-icon">
                        <i class="fas fa-school"></i>
                    </div>
                    <div class="class-name">${classInfo.class_name}</div>
                `;
                
                card.addEventListener('click', function() {
                    selectClass(classInfo.class_name);
                });
                
                return card;
            }
            
            // 设置默认日期
            function setDefaultDates() {
                const today = new Date();
                const oneWeekAgo = new Date(today);
                oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
                
                const todayStr = today.toISOString().split('T')[0];
                const oneWeekAgoStr = oneWeekAgo.toISOString().split('T')[0];
                
                document.getElementById('recordDate').value = todayStr;
                document.getElementById('filterStartDate').value = oneWeekAgoStr;
                document.getElementById('filterEndDate').value = todayStr;
            }
            
            // 显示消息提示
            function showToast(message, type = 'info') {
                const toast = document.getElementById('toast');
                const toastMessage = document.getElementById('toastMessage');
                
                toastMessage.textContent = message;
                toast.className = 'toast ' + type;
                toast.classList.add('show');
                
                // 3秒后自动隐藏
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
            
            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApp);
            } else {
                initApp();
            }
            
        })();
    </script>
</body>
</html>
