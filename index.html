<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锦艺初中教务巡查系统（离线版）</title>
    <style>
        /* 样式保持不变 */
    </style>
    <!-- 移除 Supabase 依赖 -->
</head>
<body>
    <div class="container">
        <!-- 页面内容保持不变 -->
    </div>
    
    <script>
        // 离线数据存储
        const LOCAL_STORAGE_KEYS = {
            INSPECTIONS: 'inspections_data',
            CLASSES: 'classes_data',
            INSPECTORS: 'inspectors_data',
            TEACHERS: 'teachers_data',
            SCHEDULE: 'schedule_data'
        };
        
        // 初始化示例数据
        function initSampleData() {
            if (!localStorage.getItem(LOCAL_STORAGE_KEYS.INSPECTORS)) {
                const sampleInspectors = [
                    { id: 1, inspector_name: '管理员' },
                    { id: 2, inspector_name: '巡查员A' },
                    { id: 3, inspector_name: '巡查员B' }
                ];
                localStorage.setItem(LOCAL_STORAGE_KEYS.INSPECTORS, JSON.stringify(sampleInspectors));
            }
            
            if (!localStorage.getItem(LOCAL_STORAGE_KEYS.CLASSES)) {
                const sampleClasses = [];
                for (let grade = 7; grade <= 9; grade++) {
                    for (let i = 1; i <= 6; i++) {
                        sampleClasses.push({
                            id: (grade-7)*6 + i,
                            class_name: `${grade}0${i}班`,
                            grade: `七年级${grade===7?'上':grade===8?'下':'九'}年级`
                        });
                    }
                }
                localStorage.setItem(LOCAL_STORAGE_KEYS.CLASSES, JSON.stringify(sampleClasses));
            }
        }
        
        // 离线数据操作
        const offlineDB = {
            // 巡查记录
            inspections: {
                async select(filter = {}) {
                    const data = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEYS.INSPECTIONS)) || [];
                    return { data, error: null };
                },
                async insert(record) {
                    const data = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEYS.INSPECTIONS)) || [];
                    const newId = data.length > 0 ? Math.max(...data.map(r => r.id)) + 1 : 1;
                    const newRecord = { ...record, id: newId, created_at: new Date().toISOString() };
                    data.push(newRecord);
                    localStorage.setItem(LOCAL_STORAGE_KEYS.INSPECTIONS, JSON.stringify(data));
                    return { data: [newRecord], error: null };
                },
                async update(updates, match) {
                    const data = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEYS.INSPECTIONS)) || [];
                    const index = data.findIndex(r => r.id === match.eq);
                    if (index !== -1) {
                        data[index] = { ...data[index], ...updates };
                        localStorage.setItem(LOCAL_STORAGE_KEYS.INSPECTIONS, JSON.stringify(data));
                        return { data: [data[index]], error: null };
                    }
                    return { data: null, error: { message: '记录未找到' } };
                },
                async delete(match) {
                    const data = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEYS.INSPECTIONS)) || [];
                    const filteredData = data.filter(r => r.id !== match.eq);
                    localStorage.setItem(LOCAL_STORAGE_KEYS.INSPECTIONS, JSON.stringify(filteredData));
                    return { data: [], error: null };
                }
            },
            
            // 班级
            classes: {
                async select() {
                    const data = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEYS.CLASSES)) || [];
                    return { data, error: null };
                }
            },
            
            // 巡查人
            inspectors: {
                async select() {
                    const data = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEYS.INSPECTORS)) || [];
                    return { data, error: null };
                }
            }
        };
        
        // 修改所有数据库调用，例如：
        async function loadInspectors() {
            const { data, error } = await offlineDB.inspectors.select();
            if (error) throw error;
            
            // 更新下拉框
            const select = document.getElementById('modalInspector');
            select.innerHTML = '<option value="">请选择巡查人</option>';
            data.forEach(inspector => {
                const option = document.createElement('option');
                option.value = inspector.id;
                option.textContent = inspector.inspector_name;
                select.appendChild(option);
            });
        }
    </script>
</body>
</html>
