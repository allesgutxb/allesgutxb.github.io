<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锦艺初中教务巡查系统</title>
    <style>
        /* 全局基础样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6a89cc 0%, #4a69bd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        /* 页面通用样式 */
        .page {
            display: none;
            min-height: 600px;
        }
        .page.active { display: block; }
        .page-header {
            background: linear-gradient(to right, #2c3e50, #4a69bd);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-header h2 { font-size: 1.8rem; }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .page-content { padding: 30px; }
        /* 首页样式 */
        #homePage .page-header { justify-content: center; }
        .home-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 40px;
        }
        .home-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            color: white;
            padding: 50px 20px;
            border-radius: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }
        .home-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.4);
        }
        .home-btn i { font-size: 3.5rem; }
        /* 登录弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .login-modal {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-modal h3 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.6rem;
        }
        .login-form .form-group { margin-bottom: 20px; }
        .login-form label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
        }
        .login-form select, .login-form input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .login-form select:focus, .login-form input:focus {
            border-color: #3498db;
            outline: none;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .form-actions {
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            flex: 1;
        }
        .btn-primary {
            background: #3498db;
            color: white;
        }
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        /* 班级展示页样式 */
        .grades-container { margin-top: 20px; }
        .grade-section { margin-bottom: 30px; }
        .grade-title {
            color: #2c3e50;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 4px solid #3498db;
        }
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .class-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }
        .class-card:hover {
            border-color: #3498db;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }
        .class-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
        }
        /* 查询页样式 */
        .filters-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .filter-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #dee2e6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }
        th {
            background: #2c3e50;
            color: white;
            font-weight: 600;
        }
        tbody tr:hover { background: #f8f9fa; }
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .badge-success { background: #d5f4e6; color: #27ae60; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .action-btns { display: flex; gap: 8px; }
        /* 填写记录页样式 */
        .record-form { max-width: 800px; margin: 0 auto; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .full-width { grid-column: 1 / -1; }
        textarea { min-height: 100px; resize: vertical; }
        .inspector-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #1565c0;
        }
    </style>
    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div class="page-header">
                <h2><i class="fas fa-school"></i> 锦艺初中教务巡查系统</h2>
            </div>
            <div class="page-content">
                <div style="text-align: center; margin-bottom: 20px;">
                    <p style="color: #7f8c8d; font-size: 1.1rem;">请选择您要进行的操作</p>
                </div>
                <div class="home-buttons">
                    <button class="home-btn" id="btnQuery">
                        <i class="fas fa-search"></i>
                        <span>查询巡课记录</span>
                    </button>
                    <button class="home-btn" id="btnRecord">
                        <i class="fas fa-edit"></i>
                        <span>填写巡课记录</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 班级展示页 (查询入口) -->
        <div id="classesPage" class="page">
            <div class="page-header">
                <button class="back-btn" onclick="showPage('homePage')">
                    <i class="fas fa-arrow-left"></i> 返回首页
                </button>
                <h2><i class="fas fa-users"></i> 请选择要查询的班级</h2>
                <div id="currentUserInfo" style="color: #ecf0f1;"></div>
            </div>
            <div class="page-content">
                <div id="classesContainer" class="grades-container">
                    <!-- 班级卡片将通过JS动态生成 -->
                </div>
            </div>
        </div>

        <!-- 查询结果页 -->
        <div id="queryPage" class="page">
            <div class="page-header">
                <button class="back-btn" onclick="showPage('classesPage')">
                    <i class="fas fa-arrow-left"></i> 返回班级
                </button>
                <h2 id="queryPageTitle"><i class="fas fa-list"></i> 巡查记录查询</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-success" onclick="exportData()" id="btnExport" style="display: none;">
                        <i class="fas fa-download"></i> 导出
                    </button>
                </div>
            </div>
            <div class="page-content">
                <div class="filters-section">
                    <div class="filter-grid">
                        <div>
                            <label>开始日期</label>
                            <input type="date" id="filterStartDate" class="form-control">
                        </div>
                        <div>
                            <label>结束日期</label>
                            <input type="date" id="filterEndDate" class="form-control">
                        </div>
                        <div>
                            <label>班级</label>
                            <select id="filterClass" class="form-control">
                                <option value="">全部班级</option>
                            </select>
                        </div>
                        <div>
                            <label>星期</label>
                            <select id="filterWeekday" class="form-control">
                                <option value="">全部</option>
                                <option value="星期一">星期一</option>
                                <option value="星期二">星期二</option>
                                <option value="星期三">星期三</option>
                                <option value="星期四">星期四</option>
                                <option value="星期五">星期五</option>
                            </select>
                        </div>
                        <div>
                            <label>节次</label>
                            <select id="filterPeriod" class="form-control">
                                <option value="">全部</option>
                                <option value="1">第1节</option>
                                <option value="2">第2节</option>
                                <option value="3">第3节</option>
                                <option value="4">第4节</option>
                                <option value="5">第5节</option>
                                <option value="6">第6节</option>
                                <option value="7">第7节</option>
                                <option value="8">第8节</option>
                            </select>
                        </div>
                        <div>
                            <label>科目</label>
                            <select id="filterSubject" class="form-control">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div>
                            <label>任课教师</label>
                            <select id="filterTeacher" class="form-control">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div>
                            <label>巡查人</label>
                            <select id="filterInspector" class="form-control">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div>
                            <label>到岗情况</label>
                            <select id="filterArrivalStatus" class="form-control">
                                <option value="">全部</option>
                                <option value="按时到岗">按时到岗</option>
                                <option value="迟到">迟到</option>
                                <option value="未到岗">未到岗</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-primary" onclick="searchRecords()">
                            <i class="fas fa-search"></i> 开始查询
                        </button>
                        <button class="btn btn-secondary" onclick="resetFilters()">
                            <i class="fas fa-redo"></i> 重置条件
                        </button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>星期</th>
                                <th>班级</th>
                                <th>节次</th>
                                <th>科目</th>
                                <th>教师</th>
                                <th>到岗情况</th>
                                <th>学生状态</th>
                                <th>教室环境</th>
                                <th>巡查人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                            <!-- 查询结果将通过JS动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 填写记录页 -->
        <div id="recordPage" class="page">
            <div class="page-header">
                <button class="back-btn" onclick="showPage('homePage')">
                    <i class="fas fa-arrow-left"></i> 返回首页
                </button>
                <h2><i class="fas fa-file-alt"></i> 填写巡查记录</h2>
                <div id="recordInspectorInfo" class="inspector-info" style="display: none;">
                    巡查人：<span id="currentRecordInspector"></span>
                </div>
            </div>
            <div class="page-content">
                <form id="inspectionForm" class="record-form" onsubmit="event.preventDefault(); submitRecord();">
                    <div class="form-row">
                        <div>
                            <label>巡查日期 <span class="required">*</span></label>
                            <input type="date" id="recordDate" class="form-control" required onchange="updateWeekday()">
                        </div>
                        <div>
                            <label>星期 <span class="required">*</span></label>
                            <input type="text" id="recordWeekday" class="form-control" readonly style="background-color: #f8f9fa;">
                        </div>
                    </div>
                    <div class="form-row">
                        <div>
                            <label>班级 <span class="required">*</span></label>
                            <select id="recordClass" class="form-control" required onchange="loadSchedule()">
                                <option value="">请选择班级</option>
                            </select>
                        </div>
                        <div>
                            <label>节次 <span class="required">*</span></label>
                            <select id="recordPeriod" class="form-control" required onchange="loadSchedule()">
                                <option value="">请选择节次</option>
                                <option value="1">第1节</option>
                                <option value="2">第2节</option>
                                <option value="3">第3节</option>
                                <option value="4">第4节</option>
                                <option value="5">第5节</option>
                                <option value="6">第6节</option>
                                <option value="7">第7节</option>
                                <option value="8">第8节</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div>
                            <label>科目 <span class="required">*</span></label>
                            <select id="recordSubject" class="form-control" required>
                                <option value="">请选择科目</option>
                            </select>
                        </div>
                        <div>
                            <label>任课教师 <span class="required">*</span></label>
                            <select id="recordTeacher" class="form-control" required>
                                <option value="">请选择教师</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div>
                            <label>到岗情况 <span class="required">*</span></label>
                            <select id="recordArrivalStatus" class="form-control" required>
                                <option value="">请选择</option>
                                <option value="按时到岗">按时到岗</option>
                                <option value="迟到">迟到</option>
                                <option value="未到岗">未到岗</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row full-width">
                        <div>
                            <label>学生状态</label>
                            <textarea id="recordStudentStatus" class="form-control" placeholder="描述学生课前状态..."></textarea>
                        </div>
                    </div>
                    <div class="form-row full-width">
                        <div>
                            <label>教室环境</label>
                            <textarea id="recordEnvironment" class="form-control" placeholder="描述教室环境情况..."></textarea>
                        </div>
                    </div>
                    <div class="form-row full-width">
                        <div>
                            <label>备注</label>
                            <textarea id="recordRemarks" class="form-control" placeholder="其他需要记录的事项..."></textarea>
                        </div>
                    </div>
                    <div class="form-row" style="margin-top: 30px;">
                        <div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">
                                <i class="fas fa-save"></i> 保存记录
                            </button>
                        </div>
                        <div>
                            <button type="button" class="btn btn-secondary" onclick="resetRecordForm()" style="width: 100%;">
                                <i class="fas fa-redo"></i> 重置表单
                            </button>
                        </div>
                    </div>
                    <input type="hidden" id="editingRecordId">
                </form>
            </div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="modal-overlay">
        <div class="login-modal">
            <h3><i class="fas fa-user-circle"></i> 巡查人登录</h3>
            <form class="login-form" onsubmit="event.preventDefault(); processLogin();">
                <div class="form-group">
                    <label for="modalInspector"><i class="fas fa-user"></i> 巡查人</label>
                    <select id="modalInspector" class="form-control" required>
                        <option value="">请选择巡查人</option>
                        <!-- 巡查人列表将通过JS动态生成 -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="modalPassword"><i class="fas fa-lock"></i> 密码</label>
                    <input type="password" id="modalPassword" class="form-control" placeholder="请输入密码" required>
                </div>
                <div class="remember-me">
                    <input type="checkbox" id="modalRememberMe">
                    <label for="modalRememberMe" style="font-weight: normal;">记住登录状态</label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">登录</button>
                    <button type="button" class="btn btn-secondary" onclick="closeLoginModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 导出密码弹窗 -->
    <div id="exportModal" class="modal-overlay">
        <div class="login-modal">
            <h3><i class="fas fa-download"></i> 导出数据</h3>
            <div class="login-form">
                <div class="form-group">
                    <label for="exportPassword">管理员密码</label>
                    <input type="password" id="exportPassword" class="form-control" placeholder="请输入管理员密码">
                </div>
                <div class="form-actions">
                    <button class="btn btn-success" onclick="confirmExport()">确认导出</button>
                    <button class="btn btn-secondary" onclick="closeExportModal()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // 系统配置
            const CONFIG = {
                supabaseUrl: 'https://dpyennxjaejstvbbjmbt.supabase.co',
                supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRweWVubnhqYWVqc3R2YmJqbWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjcwNTYzMzcsImV4cCI6MjA0MjYzMjMzN30.v3N76dVRe9uxrmlj-DwbfA_FYAcD06R',
                adminPassword: 'admin123' // 默认管理员密码，可修改
            };

            // 全局变量
            let supabaseClient = null;
            let currentUser = null;
            let editingRecordId = null;
            let currentScheduleData = [];
            let currentExportData = [];
            let selectedClassForQuery = null; // 从班级页传递过来的班级

            // 星期映射
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

            // 初始化函数
            async function initApp() {
                try {
                    // 1. 初始化Supabase客户端
                    supabaseClient = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey, {
                        auth: { persistSession: false }
                    });

                    // 2. 检查登录状态
                    checkLoginStatus();

                    // 3. 绑定首页按钮事件
                    document.getElementById('btnQuery').onclick = () => handleQueryClick();
                    document.getElementById('btnRecord').onclick = () => handleRecordClick();

                    // 4. 加载基础数据
                    await loadInspectors();
                    await loadClasses();
                    await loadSubjects();
                    await loadTeachers();

                    // 5. 设置默认日期
                    setDefaultDates();

                    console.log('系统初始化完成');

                } catch (error) {
                    console.error('初始化失败:', error);
                    alert('系统初始化失败，请刷新页面重试');
                }
            }

            // 页面切换函数
            function showPage(pageId) {
                document.querySelectorAll('.page').forEach(page => {
                    page.classList.remove('active');
                });
                document.getElementById(pageId).classList.add('active');
                
                // 页面特定的初始化逻辑
                if (pageId === 'queryPage') {
                    initializeQueryPage();
                } else if (pageId === 'recordPage') {
                    initializeRecordPage();
                }
            }

            // 处理查询按钮点击
            function handleQueryClick() {
                if (currentUser) {
                    // 已登录，直接进入班级页
                    showPage('classesPage');
                } else {
                    // 未登录，显示登录弹窗
                    showLoginModal();
                }
            }

            // 处理填写按钮点击
            function handleRecordClick() {
                if (currentUser) {
                    // 已登录，直接进入填写页
                    showPage('recordPage');
                } else {
                    // 未登录，显示登录弹窗
                    showLoginModal('recordPage');
                }
            }

            // 显示登录弹窗
            function showLoginModal(targetPage = null) {
                if (targetPage) {
                    document.getElementById('loginModal').setAttribute('data-target', targetPage);
                }
                document.getElementById('loginModal').classList.add('active');
            }

            // 关闭登录弹窗
            function closeLoginModal() {
                document.getElementById('loginModal').classList.remove('active');
            }

            // 处理登录
            async function processLogin() {
                const inspectorId = document.getElementById('modalInspector').value;
                const password = document.getElementById('modalPassword').value;
                const rememberMe = document.getElementById('modalRememberMe').checked;
                const targetPage = document.getElementById('loginModal').getAttribute('data-target') || 'classesPage';

                if (!inspectorId || !password) {
                    alert('请填写完整的登录信息');
                    return;
                }

                try {
                    // 这里简化密码验证，实际应从数据库验证
                    // 从下拉选项获取巡查人姓名
                    const select = document.getElementById('modalInspector');
                    const inspectorName = select.options[select.selectedIndex].text;

                    // 保存登录状态
                    currentUser = {
                        id: inspectorId,
                        name: inspectorName
                    };

                    if (rememberMe) {
                        localStorage.setItem('currentInspector', JSON.stringify(currentUser));
                    } else {
                        sessionStorage.setItem('currentInspector', JSON.stringify(currentUser));
                    }

                    // 更新UI
                    document.getElementById('currentUserInfo').textContent = `当前用户: ${inspectorName}`;
                    document.getElementById('recordInspectorInfo').style.display = 'block';
                    document.getElementById('currentRecordInspector').textContent = inspectorName;

                    // 关闭弹窗
                    closeLoginModal();

                    // 跳转到目标页面
                    showPage(targetPage);

                    alert('登录成功！');

                } catch (error) {
                    console.error('登录失败:', error);
                    alert('登录失败，请检查账号密码');
                }
            }

            // 检查登录状态
            function checkLoginStatus() {
                const saved = localStorage.getItem('currentInspector') || 
                             sessionStorage.getItem('currentInspector');
                
                if (saved) {
                    try {
                        currentUser = JSON.parse(saved);
                        document.getElementById('currentUserInfo').textContent = `当前用户: ${currentUser.name}`;
                        document.getElementById('recordInspectorInfo').style.display = 'block';
                        document.getElementById('currentRecordInspector').textContent = currentUser.name;
                        console.log('自动登录成功:', currentUser.name);
                    } catch (e) {
                        console.error('解析登录信息失败:', e);
                    }
                }
            }

            // 加载巡查人数据
            async function loadInspectors() {
                try {
                    const { data, error } = await supabaseClient
                        .from('inspectors')
                        .select('*')
                        .order('inspector_name');

                    if (error) throw error;

                    const inspectorSelects = [
                        document.getElementById('modalInspector'),
                        document.getElementById('filterInspector')
                    ];

                    inspectorSelects.forEach(select => {
                        if (select) {
                            select.innerHTML = '<option value="">请选择巡查人</option>';
                            data.forEach(inspector => {
                                const option = document.createElement('option');
                                option.value = inspector.id;
                                option.textContent = inspector.inspector_name;
                                select.appendChild(option);
                            });
                        }
                    });

                } catch (error) {
                    console.error('加载巡查人失败:', error);
                }
            }

            // 加载班级数据
            async function loadClasses() {
                try {
                    const { data, error } = await supabaseClient
                        .from('classes')
                        .select('*')
                        .order('class_name');

                    if (error) throw error;

                    const classSelects = [
                        document.getElementById('filterClass'),
                        document.getElementById('recordClass')
                    ];

                    classSelects.forEach(select => {
                        if (select) {
                            select.innerHTML = '<option value="">请选择班级</option>';
                            data.forEach(cls => {
                                const option = document.createElement('option');
                                option.value = cls.class_name;
                                option.textContent = cls.class_name;
                                select.appendChild(option);
                            });
                        }
                    });

                } catch (error) {
                    console.error('加载班级失败:', error);
                }
            }

            // 加载科目数据
            async function loadSubjects() {
                try {
                    const { data: scheduleData, error } = await supabaseClient
                        .from('schedule')
                        .select('subject')
                        .order('subject');

                    if (error) throw error;

                    // 获取唯一科目列表
                    const uniqueSubjects = [...new Set(scheduleData.map(item => item.subject))].sort();

                    const subjectSelects = [
                        document.getElementById('filterSubject'),
                        document.getElementById('recordSubject')
                    ];

                    subjectSelects.forEach(select => {
                        if (select) {
                            select.innerHTML = '<option value="">请选择科目</option>';
                            uniqueSubjects.forEach(subject => {
                                const option = document.createElement('option');
                                option.value = subject;
                                option.textContent = subject;
                                select.appendChild(option);
                            });
                        }
                    });

                } catch (error) {
                    console.error('加载科目失败:', error);
                }
            }

            // 加载教师数据
            async function loadTeachers() {
                try {
                    const { data, error } = await supabaseClient
                        .from('teachers')
                        .select('*')
                        .order('teacher_name');

                    if (error) throw error;

                    const teacherSelects = [
                        document.getElementById('filterTeacher'),
                        document.getElementById('recordTeacher')
                    ];

                    teacherSelects.forEach(select => {
                        if (select) {
                            select.innerHTML = '<option value="">请选择教师</option>';
                            data.forEach(teacher => {
                                const option = document.createElement('option');
                                option.value = teacher.teacher_name;
                                option.textContent = teacher.teacher_name;
                                select.appendChild(option);
                            });
                        }
                    });

                } catch (error) {
                    console.error('加载教师失败:', error);
                }
            }

            // 设置默认日期
            function setDefaultDates() {
                const today = new Date().toISOString().split('T')[0];
                const oneWeekAgo = new Date();
                oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
                
                document.getElementById('recordDate').value = today;
                document.getElementById('filterStartDate').value = oneWeekAgo.toISOString().split('T')[0];
                document.getElementById('filterEndDate').value = today;
                updateWeekday();
            }

            // 根据日期更新星期
            function updateWeekday() {
                const dateInput = document.getElementById('recordDate');
                const weekdayInput = document.getElementById('recordWeekday');
                
                if (dateInput.value) {
                    const date = new Date(dateInput.value);
                    const weekday = weekdays[date.getDay()];
                    weekdayInput.value = weekday;
                }
            }

            // 渲染班级卡片
            async function renderClassCards() {
                try {
                    const { data, error } = await supabaseClient
                        .from('classes')
                        .select('*')
                        .order('class_name');

                    if (error) throw error;

                    const container = document.getElementById('classesContainer');
                    container.innerHTML = '';

                    // 按年级分组
                    const grades = {
                        '七年级': data.filter(c => c.class_name.startsWith('七')),
                        '八年级': data.filter(c => c.class_name.startsWith('八')),
                        '九年级': data.filter(c => c.class_name.startsWith('九'))
                    };

                    for (const [gradeName, classes] of Object.entries(grades)) {
                        if (classes.length === 0) continue;

                        const gradeSection = document.createElement('div');
                        gradeSection.className = 'grade-section';
                        gradeSection.innerHTML = `
                            <h3 class="grade-title">${gradeName}</h3>
                            <div class="classes-grid" id="${gradeName}Grid"></div>
                        `;

                        container.appendChild(gradeSection);

                        const grid = document.getElementById(gradeName + 'Grid');
                        classes.forEach(cls => {
                            const card = document.createElement('div');
                            card.className = 'class-card';
                            card.innerHTML = `
                                <div class="class-name">${cls.class_name}</div>
                            `;
                            card.onclick = () => selectClass(cls.class_name);
                            grid.appendChild(card);
                        });
                    }

                } catch (error) {
                    console.error('渲染班级卡片失败:', error);
                }
            }

            // 选择班级
            function selectClass(className) {
                selectedClassForQuery = className;
                document.getElementById('queryPageTitle').textContent = `${className} - 巡查记录查询`;
                document.getElementById('filterClass').value = className;
                showPage('queryPage');
            }

            // 初始化查询页
            function initializeQueryPage() {
                if (selectedClassForQuery) {
                    // 自动查询该班级的记录
                    setTimeout(searchRecords, 100);
                }
            }

            // 初始化填写页
            function initializeRecordPage() {
                if (!currentUser) {
                    showLoginModal('recordPage');
                    return;
                }
            }

            // 搜索记录
            async function searchRecords() {
                try {
                    const filters = {
                        startDate: document.getElementById('filterStartDate').value,
                        endDate: document.getElementById('filterEndDate').value,
                        className: document.getElementById('filterClass').value,
                        weekday: document.getElementById('filterWeekday').value,
                        period: document.getElementById('filterPeriod').value,
                        subject: document.getElementById('filterSubject').value,
                        teacher: document.getElementById('filterTeacher').value,
                        inspector: document.getElementById('filterInspector').value,
                        arrivalStatus: document.getElementById('filterArrivalStatus').value
                    };

                    let query = supabaseClient.from('inspections').select('*');

                    // 应用筛选条件
                    if (filters.startDate) query = query.gte('inspection_date', filters.startDate);
                    if (filters.endDate) query = query.lte('inspection_date', filters.endDate);
                    if (filters.className) query = query.eq('class_name', filters.className);
                    if (filters.weekday) query = query.eq('week_day', filters.weekday);
                    if (filters.period) query = query.eq('period', parseInt(filters.period));
                    if (filters.subject) query = query.eq('subject', filters.subject);
                    if (filters.teacher) query = query.eq('teacher_name', filters.teacher);
                    if (filters.inspector) query = query.eq('inspector_name', filters.inspector);
                    if (filters.arrivalStatus) query = query.eq('arrival_status', filters.arrivalStatus);

                    query = query.order('inspection_date', { ascending: false });

                    const { data, error } = await query;

                    if (error) throw error;

                    currentExportData = data || [];
                    renderResultsTable(data || []);

                } catch (error) {
                    console.error('搜索失败:', error);
                    alert('搜索失败: ' + error.message);
                }
            }

            // 渲染结果表格
            function renderResultsTable(data) {
                const tbody = document.getElementById('resultsBody');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="11" style="text-align: center; padding: 40px; color: #7f8c8d;">
                                <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 15px; display: block; opacity: 0.5;"></i>
                                暂无巡查记录
                            </td>
                        </tr>
                    `;
                    document.getElementById('btnExport').style.display = 'none';
                    return;
                }

                document.getElementById('btnExport').style.display = 'inline-block';

                data.forEach(record => {
                    const row = document.createElement('tr');
                    
                    // 确定状态徽章
                    let statusBadge = '';
                    if (record.arrival_status === '按时到岗') {
                        statusBadge = '<span class="badge badge-success">按时到岗</span>';
                    } else if (record.arrival_status === '迟到') {
                        statusBadge = '<span class="badge badge-warning">迟到</span>';
                    } else {
                        statusBadge = '<span class="badge badge-danger">未到岗</span>';
                    }

                    // 检查当前用户是否有编辑权限
                    const canEdit = currentUser && currentUser.name === record.inspector_name;

                    row.innerHTML = `
                        <td>${record.inspection_date}</td>
                        <td>${record.week_day}</td>
                        <td>${record.class_name}</td>
                        <td>第${record.period}节</td>
                        <td>${record.subject}</td>
                        <td>${record.teacher_name}</td>
                        <td>${statusBadge}</td>
                        <td>${record.student_status || ''}</td>
                        <td>${record.environment || ''}</td>
                        <td>${record.inspector_name}</td>
                        <td>
                            <div class="action-btns">
                                ${canEdit ? `
                                    <button class="btn" onclick="editRecord('${record.id}')" style="padding: 5px 10px; background: #3498db; color: white;">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn" onclick="deleteRecord('${record.id}')" style="padding: 5px 10px; background: #e74c3c; color: white;">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                ` : '<span style="color: #95a5a6;">无权限</span>'}
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            // 重置筛选条件
            function resetFilters() {
                document.getElementById('filterStartDate').value = '';
                document.getElementById('filterEndDate').value = '';
                document.getElementById('filterClass').value = selectedClassForQuery || '';
                document.getElementById('filterWeekday').value = '';
                document.getElementById('filterPeriod').value = '';
                document.getElementById('filterSubject').value = '';
                document.getElementById('filterTeacher').value = '';
                document.getElementById('filterInspector').value = '';
                document.getElementById('filterArrivalStatus').value = '';
            }

            // 加载课表
            async function loadSchedule() {
                const className = document.getElementById('recordClass').value;
                const weekday = document.getElementById('recordWeekday').value;
                const period = document.getElementById('recordPeriod').value;

                if (className && weekday && period) {
                    try {
                        const { data, error } = await supabaseClient
                            .from('schedule')
                            .select('*')
                            .eq('class_name', className)
                            .eq('week_day', weekday)
                            .eq('period', parseInt(period))
                            .single();

                        if (error && error.code !== 'PGRST116') throw error; // PGRST116表示没有找到记录

                        if (data) {
                            document.getElementById('recordSubject').value = data.subject || '';
                            document.getElementById('recordTeacher').value = data.teacher_name || '';
                        } else {
                            // 没有找到对应的课表记录
                            document.getElementById('recordSubject').value = '';
                            document.getElementById('recordTeacher').value = '';
                        }

                    } catch (error) {
                        console.error('加载课表失败:', error);
                    }
                }
            }

            // 提交记录
            async function submitRecord() {
                if (!currentUser) {
                    alert('请先登录');
                    showLoginModal('recordPage');
                    return;
                }

                const formData = {
                    inspection_date: document.getElementById('recordDate').value,
                    week_day: document.getElementById('recordWeekday').value,
                    class_name: document.getElementById('recordClass').value,
                    period: parseInt(document.getElementById('recordPeriod').value),
                    subject: document.getElementById('recordSubject').value,
                    teacher_name: document.getElementById('recordTeacher').value,
                    arrival_status: document.getElementById('recordArrivalStatus').value,
                    student_status: document.getElementById('recordStudentStatus').value,
                    environment: document.getElementById('recordEnvironment').value,
                    remarks: document.getElementById('recordRemarks').value,
                    inspector_name: currentUser.name
                };

                // 验证必填字段
                const required = ['inspection_date', 'week_day', 'class_name', 'period', 'subject', 'teacher_name', 'arrival_status'];
                for (const field of required) {
                    if (!formData[field]) {
                        alert('请填写所有必填字段');
                        return;
                    }
                }

                try {
                    if (editingRecordId) {
                        // 更新记录
                        const { error } = await supabaseClient
                            .from('inspections')
                            .update(formData)
                            .eq('id', editingRecordId);

                        if (error) throw error;
                        alert('记录更新成功！');
                        editingRecordId = null;
                    } else {
                        // 插入新记录
                        const { error } = await supabaseClient
                            .from('inspections')
                            .insert([formData]);

                        if (error) throw error;
                        alert('记录保存成功！');
                    }

                    // 重置表单
                    resetRecordForm();
                    
                    // 返回首页
                    showPage('homePage');

                } catch (error) {
                    console.error('保存失败:', error);
                    alert('保存失败: ' + error.message);
                }
            }

            // 编辑记录
            async function editRecord(recordId) {
                try {
                    const { data, error } = await supabaseClient
                        .from('inspections')
                        .select('*')
                        .eq('id', recordId)
                        .single();

                    if (error) throw error;

                    if (data) {
                        // 填充表单
                        document.getElementById('recordDate').value = data.inspection_date;
                        document.getElementById('recordWeekday').value = data.week_day;
                        document.getElementById('recordClass').value = data.class_name;
                        document.getElementById('recordPeriod').value = data.period.toString();
                        document.getElementById('recordSubject').value = data.subject;
                        document.getElementById('recordTeacher').value = data.teacher_name;
                        document.getElementById('recordArrivalStatus').value = data.arrival_status;
                        document.getElementById('recordStudentStatus').value = data.student_status || '';
                        document.getElementById('recordEnvironment').value = data.environment || '';
                        document.getElementById('recordRemarks').value = data.remarks || '';

                        editingRecordId = recordId;
                        showPage('recordPage');
                    }

                } catch (error) {
                    console.error('加载记录失败:', error);
                    alert('加载记录失败: ' + error.message);
                }
            }

            // 删除记录
            async function deleteRecord(recordId) {
                if (!confirm('确定要删除这条记录吗？此操作不可撤销。')) {
                    return;
                }

                try {
                    const { error } = await supabaseClient
                        .from('inspections')
                        .delete()
                        .eq('id', recordId);

                    if (error) throw error;

                    alert('记录删除成功！');
                    searchRecords(); // 刷新表格

                } catch (error) {
                    console.error('删除失败:', error);
                    alert('删除失败: ' + error.message);
                }
            }

            // 重置记录表单
            function resetRecordForm() {
                document.getElementById('inspectionForm').reset();
                document.getElementById('editingRecordId').value = '';
                editingRecordId = null;
                setDefaultDates();
            }

            // 显示导出弹窗
            function exportData() {
                if (currentExportData.length === 0) {
                    alert('没有数据可导出');
                    return;
                }
                document.getElementById('exportModal').classList.add('active');
            }

            // 关闭导出弹窗
            function closeExportModal() {
                document.getElementById('exportModal').classList.remove('active');
                document.getElementById('exportPassword').value = '';
            }

            // 确认导出
            function confirmExport() {
                const password = document.getElementById('exportPassword').value;
                
                if (password !== CONFIG.adminPassword) {
                    alert('管理员密码错误');
                    document.getElementById('exportPassword').value = '';
                    return;
                }

                // 创建CSV内容
                const headers = ['日期', '星期', '班级', '节次', '科目', '教师', '到岗情况', '学生状态', '教室环境', '巡查人', '备注'];
                const csvRows = [headers.join(',')];

                currentExportData.forEach(record => {
                    const row = [
                        record.inspection_date,
                        record.week_day,
                        record.class_name,
                        `第${record.period}节`,
                        record.subject,
                        record.teacher_name,
                        record.arrival_status,
                        `"${(record.student_status || '').replace(/"/g, '""')}"`,
                        `"${(record.environment || '').replace(/"/g, '""')}"`,
                        record.inspector_name,
                        `"${(record.remarks || '').replace(/"/g, '""')}"`
                    ];
                    csvRows.push(row.join(','));
                });

                const csvString = csvRows.join('\n');
                const blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `巡查记录_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                closeExportModal();
                alert('数据导出成功！');
            }

            // 页面加载完成后初始化
            document.addEventListener('DOMContentLoaded', initApp);

        })();
    </script>
</body>
