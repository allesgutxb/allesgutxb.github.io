<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金益学校教学巡查记录系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            line-height: 1.6;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #4a6491 100%);
            color: white;
            padding: 30px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 1024px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
        }
        
        .form-section, .records-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .section-header {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-header i {
            font-size: 1.5rem;
        }
        
        .section-content {
            padding: 30px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #3498db;
            background: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        
        textarea.form-control {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #27ae60 0%, #219653 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
            color: white;
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #7f8c8d 0%, #6c7b7d 100%);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        
        .btn-reset:hover {
            background: linear-gradient(135deg, #c0392b 0%, #a93226 100%);
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-group .btn {
            flex: 1;
        }
        
        .status-message {
            padding: 12px 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: flex;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: flex;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .table-container {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .records-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        
        .records-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e0e0e0;
            position: sticky;
            top: 0;
        }
        
        .records-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .records-table tbody tr:hover {
            background: #f8f9fa;
        }
        
        .records-table tbody tr:nth-child(even) {
            background: #fcfcfc;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .page-btn {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .page-btn.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 300;
            color: #2c3e50;
            margin: 10px 0;
        }
        
        .stat-label {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
            border-top: 1px solid #e0e0e0;
            margin-top: 30px;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .section-content {
                padding: 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
    <!-- 使用Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 页眉 -->
        <div class="header">
            <h1><i class="fas fa-chalkboard-teacher"></i> 金益学校教学巡查记录系统</h1>
            <p>规范教学巡查，提升教学质量，促进学校发展</p>
        </div>

        <!-- 统计信息 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalRecords">0</div>
                <div class="stat-label"><i class="fas fa-clipboard-list"></i> 巡查记录总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayRecords">0</div>
                <div class="stat-label"><i class="fas fa-calendar-day"></i> 今日记录</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalClasses">0</div>
                <div class="stat-label"><i class="fas fa-users"></i> 班级总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTeachers">0</div>
                <div class="stat-label"><i class="fas fa-chalkboard-teacher"></i> 教师总数</div>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="content-wrapper">
            <!-- 左侧：添加巡查记录 -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-plus-circle"></i> 新增巡查记录
                </div>
                <div class="section-content">
                    <div class="status-message" id="statusMessage"></div>
                    
                    <form id="inspectionForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="date"><i class="fas fa-calendar-alt"></i> 巡查日期 *</label>
                                <input type="date" id="date" name="date" class="form-control" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="week_day"><i class="fas fa-calendar-week"></i> 星期 *</label>
                                <select id="week_day" name="week_day" class="form-control" required>
                                    <option value="">请选择星期</option>
                                    <option value="星期一">星期一</option>
                                    <option value="星期二">星期二</option>
                                    <option value="星期三">星期三</option>
                                    <option value="星期四">星期四</option>
                                    <option value="星期五">星期五</option>
                                    <option value="星期六">星期六</option>
                                    <option value="星期日">星期日</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="class_name"><i class="fas fa-school"></i> 班级 *</label>
                                <select id="class_name" name="class_name" class="form-control" required>
                                    <option value="">请选择班级</option>
                                    <!-- 班级数据将通过JavaScript动态加载 -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="period"><i class="fas fa-clock"></i> 节次 *</label>
                                <select id="period" name="period" class="form-control" required>
                                    <option value="">请选择节次</option>
                                    <option value="1">第1节</option>
                                    <option value="2">第2节</option>
                                    <option value="3">第3节</option>
                                    <option value="4">第4节</option>
                                    <option value="5">第5节</option>
                                    <option value="6">第6节</option>
                                    <option value="7">第7节</option>
                                    <option value="8">第8节</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="subject"><i class="fas fa-book"></i> 科目 *</label>
                                <input type="text" id="subject" name="subject" class="form-control" placeholder="请输入科目名称" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="teacher_name"><i class="fas fa-user-tie"></i> 任课教师 *</label>
                                <select id="teacher_name" name="teacher_name" class="form-control" required>
                                    <option value="">请选择教师</option>
                                    <!-- 教师数据将通过JavaScript动态加载 -->
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="inspector"><i class="fas fa-user-check"></i> 巡查人 *</label>
                                <select id="inspector" name="inspector" class="form-control" required>
                                    <option value="">请选择巡查人</option>
                                    <!-- 巡查人数据将通过JavaScript动态加载 -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="arrival_status"><i class="fas fa-user-clock"></i> 到课状态 *</label>
                                <select id="arrival_status" name="arrival_status" class="form-control" required>
                                    <option value="">请选择状态</option>
                                    <option value="准时">准时</option>
                                    <option value="迟到">迟到</option>
                                    <option value="请假">请假</option>
                                    <option value="缺席">缺席</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="situation"><i class="fas fa-chalkboard"></i> 上课情况 *</label>
                            <textarea id="situation" name="situation" class="form-control" placeholder="请描述课堂情况、教学组织、师生互动等..." rows="3" required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="problem"><i class="fas fa-exclamation-triangle"></i> 存在问题</label>
                            <textarea id="problem" name="problem" class="form-control" placeholder="请描述发现的问题（如纪律、教学效果等）..." rows="2"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="suggestion"><i class="fas fa-lightbulb"></i> 改进建议</label>
                            <textarea id="suggestion" name="suggestion" class="form-control" placeholder="请提出改进建议..." rows="2"></textarea>
                        </div>
                        
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                <i class="fas fa-save"></i> 保存记录
                            </button>
                            <button type="button" class="btn btn-secondary" id="clearBtn">
                                <i class="fas fa-redo"></i> 清空表单
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 右侧：历史记录查询 -->
            <div class="records-section">
                <div class="section-header">
                    <i class="fas fa-history"></i> 巡查记录查询
                </div>
                <div class="section-content">
                    <!-- 过滤条件 -->
                    <div class="filter-section">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="filterDate"><i class="fas fa-calendar"></i> 日期</label>
                                <input type="date" id="filterDate" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="filterClass"><i class="fas fa-school"></i> 班级</label>
                                <select id="filterClass" class="form-control">
                                    <option value="">全部班级</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="filterTeacher"><i class="fas fa-user-tie"></i> 教师</label>
                                <select id="filterTeacher" class="form-control">
                                    <option value="">全部教师</option>
                                </select>
                            </div>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="btn btn-primary" id="searchBtn">
                                <i class="fas fa-search"></i> 查询记录
                            </button>
                            <button type="button" class="btn btn-secondary" id="resetFilterBtn">
                                <i class="fas fa-filter"></i> 重置筛选
                            </button>
                        </div>
                    </div>
                    
                    <!-- 记录表格 -->
                    <div class="table-container">
                        <table class="records-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>班级</th>
                                    <th>节次</th>
                                    <th>科目</th>
                                    <th>教师</th>
                                    <th>巡查人</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="recordsBody">
                                <tr>
                                    <td colspan="7" class="no-data">暂无巡查记录，请添加记录或查询</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="pagination" id="pagination">
                        <button class="page-btn" id="prevPage" disabled>上一页</button>
                        <span id="pageInfo">第 1 页，共 1 页</span>
                        <button class="page-btn" id="nextPage" disabled>下一页</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            <p>金益学校教学巡查记录系统 &copy; 2024 | 技术支持：教务处</p>
        </div>
    </div>

    <!-- 引入Supabase客户端库 -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        // 初始化Supabase客户端
        const supabaseUrl = 'https://dpyennxjaejstvbbjmbt.supabase.co';
        const supabaseKey = 'sb_publishable_v3N76dVRe9uxrmlj-DwbfA_FYAcD06R';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        // 全局变量
        let currentPage = 1;
        const pageSize = 10;
        let totalRecords = 0;
        let totalPages = 1;
        
        // DOM加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置默认日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            
            // 加载统计数据
            loadStatistics();
            
            // 加载下拉列表数据
            loadClasses();
            loadTeachers();
            loadInspectors();
            
            // 加载历史记录
            loadInspections();
            
            // 绑定表单提交事件
            document.getElementById('inspectionForm').addEventListener('submit', handleFormSubmit);
            
            // 绑定清空表单事件
            document.getElementById('clearBtn').addEventListener('click', clearForm);
            
            // 绑定查询事件
            document.getElementById('searchBtn').addEventListener('click', loadInspections);
            
            // 绑定重置筛选事件
            document.getElementById('resetFilterBtn').addEventListener('click', resetFilters);
            
            // 绑定分页事件
            document.getElementById('prevPage').addEventListener('click', () => changePage(-1));
            document.getElementById('nextPage').addEventListener('click', () => changePage(1));
            
            // 监听筛选条件变化
            document.getElementById('filterClass').addEventListener('change', loadInspections);
            document.getElementById('filterTeacher').addEventListener('change', loadInspections);
            document.getElementById('filterDate').addEventListener('change', loadInspections);
            
            // 自动填充星期
            document.getElementById('date').addEventListener('change', function() {
                const date = new Date(this.value);
                const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
                const weekday = weekdays[date.getDay()];
                document.getElementById('week_day').value = weekday;
            });
        });
        
        // 显示状态消息
        function showStatus(message, type = 'success') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            statusEl.style.display = 'flex';
            
            // 3秒后自动隐藏成功消息
            if (type === 'success') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }
        }
        
        // 加载统计数据
        async function loadStatistics() {
            try {
                // 获取巡查记录总数
                const { count: totalCount, error: countError } = await supabase
                    .from('inspections')
                    .select('*', { count: 'exact', head: true });
                
                if (!countError) {
                    document.getElementById('totalRecords').textContent = totalCount || 0;
                }
                
                // 获取今日记录数
                const today = new Date().toISOString().split('T')[0];
                const { count: todayCount, error: todayError } = await supabase
                    .from('inspections')
                    .select('*', { count: 'exact', head: true })
                    .eq('date', today);
                
                if (!todayError) {
                    document.getElementById('todayRecords').textContent = todayCount || 0;
                }
                
                // 获取班级总数
                const { count: classCount, error: classError } = await supabase
                    .from('classes')
                    .select('*', { count: 'exact', head: true });
                
                if (!classError) {
                    document.getElementById('totalClasses').textContent = classCount || 0;
                }
                
                // 获取教师总数
                const { count: teacherCount, error: teacherError } = await supabase
                    .from('teachers')
                    .select('*', { count: 'exact', head: true });
                
                if (!teacherError) {
                    document.getElementById('totalTeachers').textContent = teacherCount || 0;
                }
                
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }
        
        // 加载班级数据
        async function loadClasses() {
            const classSelect = document.getElementById('class_name');
            const filterClassSelect = document.getElementById('filterClass');
            
            // 清空现有选项（保留第一个选项）
            while (classSelect.options.length > 1) {
                classSelect.remove(1);
            }
            while (filterClassSelect.options.length > 1) {
                filterClassSelect.remove(1);
            }
            
            try {
                const { data, error } = await supabase
                    .from('classes')
                    .select('class_name')
                    .order('class_name');
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    data.forEach(cls => {
                        const option = document.createElement('option');
                        option.value = cls.class_name;
                        option.textContent = cls.class_name;
                        classSelect.appendChild(option.cloneNode(true));
                        filterClassSelect.appendChild(option);
                    });
                } else {
                    console.warn('班级表中没有数据');
                }
            } catch (error) {
                console.error('加载班级数据失败:', error);
                showStatus('加载班级数据失败: ' + error.message, 'error');
            }
        }
        
        // 加载教师数据
        async function loadTeachers() {
            const teacherSelect = document.getElementById('teacher_name');
            const filterTeacherSelect = document.getElementById('filterTeacher');
            
            // 清空现有选项（保留第一个选项）
            while (teacherSelect.options.length > 1) {
                teacherSelect.remove(1);
            }
            while (filterTeacherSelect.options.length > 1) {
                filterTeacherSelect.remove(1);
            }
            
            try {
                const { data, error } = await supabase
                    .from('teachers')
                    .select('teacher_name')
                    .order('teacher_name');
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    data.forEach(teacher => {
                        const option = document.createElement('option');
                        option.value = teacher.teacher_name;
                        option.textContent = teacher.teacher_name;
                        teacherSelect.appendChild(option.cloneNode(true));
                        filterTeacherSelect.appendChild(option);
                    });
                } else {
                    console.warn('教师表中没有数据');
                }
            } catch (error) {
                console.error('加载教师数据失败:', error);
                showStatus('加载教师数据失败: ' + error.message, 'error');
            }
        }
        
        // 加载巡查人数据
        async function loadInspectors() {
            const inspectorSelect = document.getElementById('inspector');
            
            // 清空现有选项（保留第一个选项）
            while (inspectorSelect.options.length > 1) {
                inspectorSelect.remove(1);
            }
            
            try {
                const { data, error } = await supabase
                    .from('inspectors')
                    .select('inspector_name')
                    .order('inspector_name');
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    data.forEach(inspector => {
                        const option = document.createElement('option');
                        option.value = inspector.inspector_name;
                        option.textContent = inspector.inspector_name;
                        inspectorSelect.appendChild(option);
                    });
                } else {
                    console.warn('巡查人表中没有数据');
                }
            } catch (error) {
                console.error('加载巡查人数据失败:', error);
                showStatus('加载巡查人数据失败: ' + error.message, 'error');
            }
        }
        
        // 处理表单提交
        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            
            // 显示加载状态
            submitBtn.innerHTML = '<span class="loading"></span> 保存中...';
            submitBtn.disabled = true;
            
            try {
                // 获取表单数据
                const formData = {
                    date: document.getElementById('date').value,
                    week_day: document.getElementById('week_day').value,
                    class_name: document.getElementById('class_name').value,
                    period: parseInt(document.getElementById('period').value),
                    subject: document.getElementById('subject').value,
                    teacher_name: document.getElementById('teacher_name').value,
                    inspector: document.getElementById('inspector').value,
                    arrival_status: document.getElementById('arrival_status').value,
                    situation: document.getElementById('situation').value,
                    problem: document.getElementById('problem').value || null,
                    suggestion: document.getElementById('suggestion').value || null,
                    created_at: new Date().toISOString()
                };
                
                // 验证必填字段
                if (!formData.date || !formData.week_day || !formData.class_name || 
                    !formData.period || !formData.subject || !formData.teacher_name || 
                    !formData.inspector || !formData.arrival_status || !formData.situation) {
                    throw new Error('请填写所有必填字段！');
                }
                
                // 插入数据到Supabase
                const { data, error } = await supabase
                    .from('inspections')
                    .insert([formData])
                    .select();
                
                if (error) throw error;
                
                // 显示成功消息
                showStatus('巡查记录保存成功！', 'success');
                
                // 清空表单
                clearForm();
                
                // 重新加载巡查记录和统计数据
                loadInspections();
                loadStatistics();
                
            } catch (error) {
                console.error('保存记录失败:', error);
                showStatus('保存失败: ' + error.message, 'error');
            } finally {
                // 恢复按钮状态
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }
        
        // 清空表单
        function clearForm() {
            document.getElementById('inspectionForm').reset();
            
            // 重置日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            
            // 清除星期
            document.getElementById('week_day').value = '';
            
            // 触发日期变化事件以自动设置星期
            const dateInput = document.getElementById('date');
            const event = new Event('change');
            dateInput.dispatchEvent(event);
        }
        
        // 加载巡查记录
        async function loadInspections() {
            const recordsBody = document.getElementById('recordsBody');
            recordsBody.innerHTML = '<tr><td colspan="7" class="no-data">加载中...</td></tr>';
            
            try {
                // 获取筛选条件
                const filterDate = document.getElementById('filterDate').value;
                const filterClass = document.getElementById('filterClass').value;
                const filterTeacher = document.getElementById('filterTeacher').value;
                
                // 构建查询
                let query = supabase
                    .from('inspections')
                    .select('*', { count: 'exact' });
                
                // 应用筛选条件
                if (filterDate) {
                    query = query.eq('date', filterDate);
                }
                
                if (filterClass) {
                    query = query.eq('class_name', filterClass);
                }
                
                if (filterTeacher) {
                    query = query.eq('teacher_name', filterTeacher);
                }
                
                // 应用分页
                const from = (currentPage - 1) * pageSize;
                const to = from + pageSize - 1;
                query = query.range(from, to);
                
                // 按日期和节次排序
                query = query.order('date', { ascending: false }).order('period', { ascending: true });
                
                const { data, error, count } = await query;
                
                if (error) throw error;
                
                // 更新分页信息
                totalRecords = count || 0;
                totalPages = Math.ceil(totalRecords / pageSize) || 1;
                
                updatePagination();
                
                // 渲染数据
                if (data && data.length > 0) {
                    recordsBody.innerHTML = '';
                    
                    data.forEach(record => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${record.date}</td>
                            <td>${record.class_name || ''}</td>
                            <td>第${record.period || ''}节</td>
                            <td>${record.subject || ''}</td>
                            <td>${record.teacher_name || ''}</td>
                            <td>${record.inspector || ''}</td>
                            <td>
                                <span class="status-badge ${record.arrival_status === '准时' ? 'status-on-time' : 'status-late'}">
                                    ${record.arrival_status || ''}
                                </span>
                            </td>
                        `;
                        recordsBody.appendChild(row);
                    });
                } else {
                    recordsBody.innerHTML = '<tr><td colspan="7" class="no-data">暂无巡查记录</td></tr>';
                }
            } catch (error) {
                console.error('加载巡查记录失败:', error);
                recordsBody.innerHTML = `<tr><td colspan="7" class="no-data">加载失败: ${error.message}</td></tr>`;
            }
        }
        
        // 更新分页控件
        function updatePagination() {
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const pageInfo = document.getElementById('pageInfo');
            
            // 更新按钮状态
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
            
            // 更新页码信息
            pageInfo.textContent = `第 ${currentPage} 页，共 ${totalPages} 页`;
        }
        
        // 切换页面
        function changePage(delta) {
            const newPage = currentPage + delta;
            
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                loadInspections();
            }
        }
        
        // 重置筛选条件
        function resetFilters() {
            document.getElementById('filterDate').value = '';
            document.getElementById('filterClass').value = '';
            document.getElementById('filterTeacher').value = '';
            currentPage = 1;
            loadInspections();
        }
        
        // 添加CSS样式
        const style = document.createElement('style');
        style.textContent = `
            .status-badge {
                display: inline-block;
                padding: 4px 8px;
                border-radius: 12px;
                font-size: 0.85rem;
                font-weight: 500;
            }
            
            .status-on-time {
                background-color: #d4edda;
                color: #155724;
            }
            
            .status-late {
                background-color: #f8d7da;
                color: #721c24;
            }
            
            .status-absent {
                background-color: #fff3cd;
                color: #856404;
            }
            
            .status-leave {
                background-color: #d1ecf1;
                color: #0c5460;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
