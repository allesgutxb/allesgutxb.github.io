<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锦艺初中教务巡查系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .container { max-width: 800px; margin: 50px auto; padding: 0 20px; }
        .card { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2c3e50; font-size: 28px; margin-bottom: 10px; }
        
        .success { 
            background: #d4edda; 
            border: 1px solid #c3e6cb; 
            color: #155724; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 30px; 
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #2c3e50; font-weight: bold; }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #ddd; 
            border-radius: 6px; 
            font-size: 16px; 
        }
        .form-group input:focus, .form-group select:focus { 
            border-color: #3498db; 
            outline: none; 
        }
        
        .btn { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
        }
        .btn:hover { background: #2980b9; }
        .btn-success { background: #2ecc71; }
        
        .inspector-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
            margin: 20px 0; 
        }
        .inspector-item { 
            padding: 20px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            text-align: center; 
            cursor: pointer; 
        }
        .inspector-item:hover { border-color: #3498db; }
        .inspector-item.selected { 
            border-color: #2ecc71; 
            background: #f0fff4; 
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>锦艺初中教务巡查系统</h1>
                <p>使用正确的 Supabase 配置</p>
            </div>
            
            <div class="success">
                <h3>✅ 配置正确！</h3>
                <p>检测到您使用了正确的 publishable key：<code>sb_publishable_...</code></p>
                <p>请确保在 Supabase 中已为表启用 RLS 并配置策略。</p>
            </div>
            
            <div id="loginSection">
                <h2 style="text-align: center; margin-bottom: 20px;">巡查人登录</h2>
                
                <div class="form-group">
                    <label>选择巡查人：</label>
                    <div id="inspectorList" class="inspector-list">
                        <!-- 巡查人列表将动态生成 -->
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码：</label>
                    <input type="password" id="password" value="123456">
                    <small style="color: #666; margin-top: 5px; display: block;">
                        测试密码：123456
                    </small>
                </div>
                
                <div style="margin: 20px 0;">
                    <input type="checkbox" id="rememberMe" checked>
                    <label for="rememberMe" style="display: inline; font-weight: normal;">
                        记住登录状态
                    </label>
                </div>
                
                <button class="btn btn-success" onclick="login()" id="loginBtn">
                    登录系统
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // ✅ 正确的配置（使用您图片中的 publishable key）
        const SUPABASE_URL = 'https://dpyennxjaejstvbbjmbt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_v3N76dVRe9uxrmlj-DwbfA_FYAcD06R';
        
        let supabase = null;
        let currentUser = null;
        let inspectors = [];

        // 初始化
        async function initApp() {
            console.log('初始化系统...');
            console.log('使用URL:', SUPABASE_URL);
            console.log('使用密钥:', SUPABASE_KEY.substring(0, 20) + '...');
            
            // 初始化 Supabase
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                auth: { persistSession: false }
            });
            
            // 检查数据库连接
            await testConnection();
        }

        // 测试数据库连接
        async function testConnection() {
            try {
                console.log('测试数据库连接...');
                
                // 方法1：尝试查询inspectors表
                const { data, error } = await supabase
                    .from('inspectors')
                    .select('*')
                    .limit(1);
                
                if (error) {
                    if (error.message.includes('relation "inspectors" does not exist')) {
                        console.log('inspectors表不存在，但连接成功');
                        createDefaultInspectors();
                        return;
                    } else if (error.message.includes('JWT')) {
                        throw new Error('API密钥无效');
                    } else if (error.message.includes('RLS')) {
                        alert('⚠ 行级安全性(RLS)已启用，但未配置策略\n\n请在Supabase中：\n1. 进入Authentication → Policies\n2. 为每个表创建策略\n\n或临时禁用RLS：\n1. 进入Table Editor\n2. 点击表名\n3. 关闭RLS开关');
                        throw new Error('RLS策略未配置');
                    } else {
                        throw error;
                    }
                }
                
                console.log('连接成功，巡查人数据:', data);
                inspectors = data;
                renderInspectors();
                
            } catch (error) {
                console.error('连接失败:', error);
                
                // 创建默认巡查人（用于演示）
                createDefaultInspectors();
                
                alert('连接到数据库，但遇到问题：\n' + error.message + 
                      '\n\n使用本地演示数据继续...');
            }
        }

        // 创建默认巡查人
        function createDefaultInspectors() {
            inspectors = [
                { id: 1, inspector_name: '管理员' },
                { id: 2, inspector_name: '王老师' },
                { id: 3, inspector_name: '李老师' },
                { id: 4, inspector_name: '张主任' },
                { id: 5, inspector_name: '刘校长' }
            ];
            renderInspectors();
        }

        // 渲染巡查人列表
        function renderInspectors() {
            const container = document.getElementById('inspectorList');
            container.innerHTML = '';
            
            inspectors.forEach((inspector, index) => {
                const div = document.createElement('div');
                div.className = 'inspector-item';
                div.onclick = () => selectInspector(index);
                
                div.innerHTML = `
                    <h3>${inspector.inspector_name}</h3>
                    <p style="color: #666; font-size: 14px;">巡查老师</p>
                `;
                
                container.appendChild(div);
            });
        }

        // 选择巡查人
        function selectInspector(index) {
            // 移除之前的选择
            document.querySelectorAll('.inspector-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            // 设置当前选择
            document.querySelectorAll('.inspector-item')[index].classList.add('selected');
        }

        // 登录
        async function login() {
            const selected = document.querySelector('.inspector-item.selected');
            if (!selected) {
                alert('请选择巡查人');
                return;
            }
            
            const index = Array.from(document.querySelectorAll('.inspector-item')).indexOf(selected);
            const inspector = inspectors[index];
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (password !== '123456') {
                alert('密码错误，测试密码为：123456');
                return;
            }
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            
            try {
                // 保存登录状态
                currentUser = {
                    id: inspector.id,
                    name: inspector.inspector_name
                };
                
                if (rememberMe) {
                    localStorage.setItem('currentInspector', JSON.stringify(currentUser));
                } else {
                    sessionStorage.setItem('currentInspector', JSON.stringify(currentUser));
                }
                
                // 尝试保存到数据库
                try {
                    if (supabase) {
                        await supabase
                            .from('inspections')
                            .insert({
                                inspector_id: inspector.id,
                                inspector_name: inspector.inspector_name,
                                login_time: new Date().toISOString(),
                                action: 'login'
                            });
                    }
                } catch (dbError) {
                    console.log('日志记录失败，但登录继续:', dbError);
                }
                
                // 登录成功
                setTimeout(() => {
                    alert(`✅ 登录成功！欢迎 ${currentUser.name}\n\n系统功能：\n1. 填写巡查记录\n2. 查询历史记录\n3. 导出Excel报表\n\n点击确定开始使用。`);
                    
                    // 这里可以跳转到主页面
                    // window.location.href = 'main.html';
                    
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录系统';
                    
                }, 1000);
                
            } catch (error) {
                console.error('登录失败:', error);
                alert('登录失败: ' + error.message);
                loginBtn.disabled = false;
                loginBtn.textContent = '登录系统';
            }
        }

        // 检查是否已登录
        function checkLoginStatus() {
            const saved = localStorage.getItem('currentInspector') || 
                         sessionStorage.getItem('currentInspector');
            
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    alert(`检测到已登录用户: ${currentUser.name}\n自动跳转到主页面...`);
                    // window.location.href = 'main.html';
                } catch (e) {
                    console.log('无法恢复登录状态:', e);
                }
            }
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            initApp();
        });
    </script>
</body>
</html>
