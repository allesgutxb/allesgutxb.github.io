<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂巡查管理系统</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .home-page {
            padding: 60px 20px;
            text-align: center;
        }
        
        .home-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
        }
        
        .nav-btn {
            padding: 20px 50px;
            font-size: 1.2em;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 15px 25px;
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        .back-btn:hover {
            color: #764ba2;
        }
        
        /* 班级选择页面样式 */
        .class-select-page {
            padding: 30px;
        }
        
        .page-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f2f5;
        }
        
        .grade-section {
            margin-bottom: 40px;
        }
        
        .grade-title {
            color: #4b6cb7;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid #4b6cb7;
        }
        
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        
        .class-card {
            background: white;
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #e1e5e9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .class-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #4b6cb7;
        }
        
        .class-icon {
            width: 80px;
            height: 80px;
            background: #6a11cb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .class-icon i {
            color: white;
            font-size: 36px;
        }
        
        .class-name {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        /* 查询页面样式 */
        .query-page {
            padding: 30px;
        }
        
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .filter-buttons {
            grid-column: 1 / -1;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #495057;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
        }
        
        .btn-download {
            background: #28a745;
            color: white;
        }
        
        .btn-download:hover {
            background: #218838;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #e1e5e9;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e1e5e9;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        
        .edit-btn, .delete-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .edit-btn {
            background: #3498db;
            color: white;
        }
        
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .status-on-time {
            background: #d5f4e6;
            color: #27ae60;
        }
        
        .status-late {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-absent {
            background: #f8d7da;
            color: #721c24;
        }
        
        /* 表单页面样式 */
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        /* 消息提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
        }
        
        .toast.show {
            display: block;
        }
        
        .toast.success {
            border-left: 4px solid #28a745;
        }
        
        .toast.error {
            border-left: 4px solid #dc3545;
        }
        
        .toast.warning {
            border-left: 4px solid #ffc107;
        }
        
        /* 密码输入框样式 */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }
        
        .password-modal.show {
            display: flex;
        }
        
        .password-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }
        
        .password-box h3 {
            margin-bottom: 20px;
            color: #2c3e50;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .classes-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .filters {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
            
            .nav-btn {
                padding: 15px 30px;
                font-size: 1em;
            }
        }
    </style>
    <!-- 字体图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div class="header">
                <h1><i class="fas fa-chalkboard-teacher"></i> 课堂巡查管理系统</h1>
                <p>高效记录、便捷查询、智能统计</p>
            </div>
            
            <div class="home-page">
                <h2 style="color: #2c3e50; margin-bottom: 20px;">请选择操作</h2>
                <div class="home-buttons">
                    <button class="nav-btn" onclick="showPage('loginPage')">
                        <i class="fas fa-sign-in-alt"></i>
                        巡查人登录
                    </button>
                    <button class="nav-btn" onclick="showPage('classSelectPage')">
                        <i class="fas fa-search"></i>
                        查询巡查记录
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 巡查人登录页 -->
        <div id="loginPage" class="page">
            <button class="back-btn" onclick="showPage('homePage')">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
            
            <div class="form-container" style="max-width: 400px; margin: 50px auto;">
                <h2 style="text-align: center; margin-bottom: 30px; color: #2c3e50;">
                    <i class="fas fa-user-circle"></i> 巡查人登录
                </h2>
                <!-- 修复：将密码字段放在form标签内 -->
                <form id="loginForm" onsubmit="event.preventDefault(); loginInspector();">
                    <div class="form-group">
                        <label for="loginInspector"><i class="fas fa-user"></i> 选择巡查人</label>
                        <select id="loginInspector" class="form-control" required>
                            <option value="">请选择巡查人</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword"><i class="fas fa-lock"></i> 密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" class="form-control" required>
                    </div>
                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="submit" class="btn" style="flex: 1;">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="showPage('homePage')" style="flex: 1;">
                            <i class="fas fa-home"></i> 返回首页
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- 班级选择页面 -->
        <div id="classSelectPage" class="page">
            <button class="back-btn" onclick="showPage('homePage')">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
            
            <div class="class-select-page">
                <h2 class="page-title">
                    <i class="fas fa-users"></i> 请选择要查询的班级
                </h2>
                
                <!-- 七年级 -->
                <div class="grade-section">
                    <h3 class="grade-title">七年级</h3>
                    <div class="classes-grid" id="grade7">
                        <!-- 七年级班级卡片会在这里动态生成 -->
                    </div>
                </div>
                
                <!-- 八年级 -->
                <div class="grade-section">
                    <h3 class="grade-title">八年级</h3>
                    <div class="classes-grid" id="grade8">
                        <!-- 八年级班级卡片会在这里动态生成 -->
                    </div>
                </div>
                
                <!-- 九年级 -->
                <div class="grade-section">
                    <h3 class="grade-title">九年级</h3>
                    <div class="classes-grid" id="grade9">
                        <!-- 九年级班级卡片会在这里动态生成 -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 查询页面 -->
        <div id="queryPage" class="page">
            <button class="back-btn" onclick="showPage('classSelectPage')">
                <i class="fas fa-arrow-left"></i>
                返回班级选择
            </button>
            
            <div class="query-page">
                <h2 id="queryPageTitle" class="page-title">
                    <i class="fas fa-search"></i> 查询巡查记录
                </h2>
                
                <div class="filters">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> 开始日期</label>
                        <input type="date" id="filterStartDate">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> 结束日期</label>
                        <input type="date" id="filterEndDate">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-users"></i> 班级</label>
                        <select id="filterClass">
                            <option value="">全部班级</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-calendar-day"></i> 星期</label>
                        <select id="filterWeekday">
                            <option value="">全部星期</option>
                            <option value="星期一">星期一</option>
                            <option value="星期二">星期二</option>
                            <option value="星期三">星期三</option>
                            <option value="星期四">星期四</option>
                            <option value="星期五">星期五</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> 节次</label>
                        <select id="filterPeriod">
                            <option value="">全部节次</option>
                            <option value="1">第1节</option>
                            <option value="2">第2节</option>
                            <option value="3">第3节</option>
                            <option value="4">第4节</option>
                            <option value="5">第5节</option>
                            <option value="6">第6节</option>
                            <option value="7">第7节</option>
                            <option value="8">第8节</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-book"></i> 科目</label>
                        <select id="filterSubject">
                            <option value="">全部科目</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-chalkboard-teacher"></i> 任课教师</label>
                        <input type="text" id="filterTeacher" placeholder="输入教师姓名">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user-tie"></i> 巡查人</label>
                        <select id="filterInspector">
                            <option value="">全部巡查人</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user-check"></i> 到岗情况</label>
                        <select id="filterArrivalStatus">
                            <option value="">全部</option>
                            <option value="按时到岗">按时到岗</option>
                            <option value="迟到">迟到</option>
                            <option value="未到岗">未到岗</option>
                        </select>
                    </div>
                    
                    <div class="filter-buttons">
                        <button class="btn btn-primary" onclick="searchInspections()">
                            <i class="fas fa-search"></i> 查询
                        </button>
                        <button class="btn btn-secondary" onclick="resetFilters()">
                            <i class="fas fa-redo"></i> 重置筛选
                        </button>
                        <button class="btn btn-download" onclick="showPasswordModal()">
                            <i class="fas fa-download"></i> 下载数据
                        </button>
                    </div>
                </div>
                
                <div id="loading" style="text-align: center; padding: 40px; display: none;">
                    <div class="spinner" style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                    <p>正在加载数据...</p>
                </div>
                
                <div id="noData" style="text-align: center; padding: 40px; color: #6c757d; display: none;">
                    <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;"></i>
                    <p>暂无巡查记录</p>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>星期</th>
                                <th>班级</th>
                                <th>节次</th>
                                <th>科目</th>
                                <th>教师</th>
                                <th>到岗情况</th>
                                <th>学生状态</th>
                                <th>教室环境</th>
                                <th>巡查人</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTable">
                            <!-- 数据会动态加载到这里 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 填写记录页 -->
        <div id="recordPage" class="page">
            <button class="back-btn" onclick="showPage('homePage')">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
            
            <div class="form-container">
                <h2 class="page-title">
                    <i class="fas fa-file-alt"></i> 填写巡查记录
                </h2>
                
                <form id="inspectionForm" onsubmit="event.preventDefault(); submitInspection();">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="recordDate"><i class="fas fa-calendar"></i> 巡查日期</label>
                            <input type="date" id="recordDate" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="recordWeekday"><i class="fas fa-calendar-day"></i> 星期</label>
                            <select id="recordWeekday" class="form-control" required>
                                <option value="">请选择星期</option>
                                <option value="星期一">星期一</option>
                                <option value="星期二">星期二</option>
                                <option value="星期三">星期三</option>
                                <option value="星期四">星期四</option>
                                <option value="星期五">星期五</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="recordClass"><i class="fas fa-users"></i> 班级</label>
                            <select id="recordClass" class="form-control" required onchange="loadSchedule()">
                                <option value="">请选择班级</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="recordPeriod"><i class="fas fa-clock"></i> 节次</label>
                            <select id="recordPeriod" class="form-control" required onchange="loadSchedule()">
                                <option value="">请选择节次</option>
                                <option value="1">第1节</option>
                                <option value="2">第2节</option>
                                <option value="3">第3节</option>
                                <option value="4">第4节</option>
                                <option value="5">第5节</option>
                                <option value="6">第6节</option>
                                <option value="7">第7节</option>
                                <option value="8">第8节</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="recordSubject"><i class="fas fa-book"></i> 科目</label>
                            <select id="recordSubject" class="form-control" required>
                                <option value="">请选择科目</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="recordTeacher"><i class="fas fa-chalkboard-teacher"></i> 任课教师</label>
                            <select id="recordTeacher" class="form-control" required>
                                <option value="">请选择教师</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="recordArrivalStatus"><i class="fas fa-user-check"></i> 到岗情况</label>
                            <select id="recordArrivalStatus" class="form-control" required>
                                <option value="">请选择到岗情况</option>
                                <option value="按时到岗">按时到岗</option>
                                <option value="迟到">迟到</option>
                                <option value="未到岗">未到岗</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="recordInspector"><i class="fas fa-user-tie"></i> 巡查人</label>
                            <select id="recordInspector" class="form-control" required>
                                <option value="">请选择巡查人</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="recordStudentStatus"><i class="fas fa-graduation-cap"></i> 学生状态</label>
                            <textarea id="recordStudentStatus" class="form-control" rows="3" placeholder="描述学生听课状态、纪律等"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="recordEnvironment"><i class="fas fa-school"></i> 教室环境</label>
                            <textarea id="recordEnvironment" class="form-control" rows="2" placeholder="描述教室环境情况"></textarea>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="recordRemarks"><i class="fas fa-sticky-note"></i> 备注</label>
                        <textarea id="recordRemarks" class="form-control" rows="2" placeholder="其他需要记录的事项"></textarea>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="submit" class="btn btn-primary" id="submitBtn" style="flex: 1;">
