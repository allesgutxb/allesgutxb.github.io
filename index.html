<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校教务巡查系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 样式部分与之前提供的“完全隔离解决方案”完全相同，为节省篇幅，此处假设已包含 -->
    <!-- 注意：实际使用时，请确保此处有完整的CSS样式代码 -->
</head>
<body>
    <!-- HTML 结构部分与之前提供的“完全隔离解决方案”完全相同 -->
    <!-- 注意：实际使用时，请确保此处有完整的HTML结构代码 -->
    
    <!-- 【关键修复】先加载Supabase库 -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        // ==================== 【终极修复：正确的加载与初始化时序】 ====================
        // 等待页面DOM和Supabase库都完全加载后再执行初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 首先，定义所有工具函数和变量（不依赖外部库）
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            let mySupabaseClient = null;
            const SUPABASE_URL = 'https://dpyennxjaejstvbbjmbt.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_v3N76dVRe9uxrmlj-DwbfA_FYAcD06R';
            
            // 2. 检查并创建Supabase客户端
            function initializeSupabaseClient() {
                if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
                    console.error('错误：Supabase JS库未加载或加载失败。');
                    showToast('系统初始化失败：数据库连接库加载异常。', 'error');
                    return false;
                }
                
                try {
                    // 清理可能存在的旧客户端（防冲突）
                    if (window.mySchoolInspectionSysClient) {
                        console.log('清理旧的客户端实例。');
                    }
                    // 创建新的客户端实例
                    mySupabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    // 可选：存储在全局，便于调试
                    window.mySchoolInspectionSysClient = mySupabaseClient;
                    console.log('Supabase客户端创建成功。');
                    return true;
                } catch (error) {
                    console.error('创建Supabase客户端时发生错误:', error);
                    showToast('无法连接至数据库服务: ' + error.message, 'error');
                    return false;
                }
            }
            
            // 3. 页面管理函数
            function showPage(pageId) {
                document.getElementById('homePage').style.display = (pageId === 'homePage') ? 'block' : 'none';
                document.querySelectorAll('.main-content').forEach(page => page.classList.remove('active'));
                if (pageId !== 'homePage') {
                    document.getElementById(pageId).classList.add('active');
                }
                if (pageId === 'queryPage') {
                    // 确保客户端就绪后再搜索
                    if (mySupabaseClient) {
                        searchInspections();
                    }
                }
            }
            
            // 4. 工具函数：更新星期显示
            function updateWeekday() {
                const dateInput = document.getElementById('inspectionDate');
                const display = document.getElementById('weekdayDisplay');
                if (dateInput && dateInput.value) {
                    const date = new Date(dateInput.value);
                    // 使用已定义的weekdays变量
                    display.textContent = weekdays[date.getDay()];
                } else if (display) {
                    display.textContent = '';
                }
            }
            
            // 5. 工具函数：显示提示
            function showToast(message, type) {
                const existingToasts = document.querySelectorAll('.toast');
                existingToasts.forEach(toast => toast.remove());
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
            
            // 6. 主初始化函数
            function initializeApplication() {
                console.log('开始初始化教务巡查系统...');
                
                // 步骤A: 初始化Supabase客户端
                if (!initializeSupabaseClient()) {
                    // 如果客户端初始化失败，禁用相关功能
                    document.getElementById('inspectionForm').style.opacity = '0.5';
                    document.getElementById('inspectionForm').querySelector('button[type="submit"]').disabled = true;
                    document.getElementById('inspectionForm').querySelector('button[type="submit"]').innerHTML = '<i class="fas fa-exclamation-triangle"></i> 数据库未连接';
                    document.querySelector('.search-btn').disabled = true;
                    document.querySelector('.export-btn').disabled = true;
                    showToast('系统数据库连接异常，部分功能受限。', 'error');
                    // 即使数据库连接失败，也继续初始化UI，让用户至少能看到界面
                }
                
                // 步骤B: 设置默认日期和星期
                const today = new Date().toISOString().split('T')[0];
                const inspectionDateEl = document.getElementById('inspectionDate');
                const searchDateEl = document.getElementById('searchDate');
                if (inspectionDateEl) inspectionDateEl.value = today;
                if (searchDateEl) searchDateEl.value = today;
                
                // 确保日期输入框存在再绑定事件
                if (inspectionDateEl) {
                    inspectionDateEl.addEventListener('change', updateWeekday);
                }
                // 立即更新一次显示
                updateWeekday();
                
                // 步骤C: 加载静态数据（班级、巡查人）
                loadStaticData();
                
                // 步骤D: 绑定所有事件监听器
                bindEventListeners();
                
                // 步骤E: 初始加载查询页数据（如果客户端正常）
                if (mySupabaseClient) {
                    setTimeout(() => searchInspections(), 100); // 稍延迟执行
                }
                
                console.log('教务巡查系统初始化完成。');
                showToast('系统准备就绪。', 'success');
            }
            
            // 7. 加载静态数据
            function loadStaticData() {
                const classGroups = [
                    { title: "九年级", classes: ["九1班", "九2班", "九3班", "九4班", "九5班", "九6班"] },
                    { title: "八年级", classes: ["八1班", "八2班", "八3班", "八4班", "八5班", "八6班"] },
                    { title: "七年级", classes: ["七1班", "七2班", "七3班", "七4班", "七5班", "七6班"] }
                ];
                const allClasses = classGroups.flatMap(g => g.classes);
                const allInspectors = ['张主任', '李老师', '王督导', '赵老师', '刘老师'];
                
                // 填充班级选择器
                allClasses.forEach(className => {
                    ['classSelect', 'searchClass'].forEach(selectId => {
                        const selectEl = document.getElementById(selectId);
                        if (selectEl) {
                            const option = document.createElement('option');
                            option.value = className;
                            option.textContent = className;
                            selectEl.appendChild(option);
                        }
                    });
                });
                
                // 填充巡查人选择器
                allInspectors.forEach(name => {
                    ['inspectorSelect', 'searchInspector'].forEach(selectId => {
                        const selectEl = document.getElementById(selectId);
                        if (selectEl) {
                            const option = document.createElement('option');
                            option.value = name;
                            option.textContent = name;
                            selectEl.appendChild(option);
                        }
                    });
                });
            }
            
            // 8. 绑定事件监听器
            function bindEventListeners() {
                // 页面切换按钮
                const fillBtn = document.getElementById('fillBtn');
                const queryBtn = document.getElementById('queryBtn');
                const backFromFill = document.getElementById('backFromFill');
                const backFromQuery = document.getElementById('backFromQuery');
                
                if (fillBtn) fillBtn.addEventListener('click', () => showPage('fillPage'));
                if (queryBtn) queryBtn.addEventListener('click', () => showPage('queryPage'));
                if (backFromFill) backFromFill.addEventListener('click', () => showPage('homePage'));
                if (backFromQuery) backFromQuery.addEventListener('click', () => showPage('homePage'));
                
                // 搜索和下载按钮
                const searchBtn = document.getElementById('searchBtn');
                const downloadBtn = document.getElementById('downloadBtn');
                if (searchBtn) searchBtn.addEventListener('click', searchInspections);
                if (downloadBtn) downloadBtn.addEventListener('click', downloadData);
                
                // 表单提交
                const inspectionForm = document.getElementById('inspectionForm');
                if (inspectionForm) {
                    inspectionForm.addEventListener('submit', submitInspection);
                }
            }
            
            // 9. 核心业务函数（与数据库交互）
            async function submitInspection(e) {
                e.preventDefault();
                if (!mySupabaseClient) {
                    showToast('数据库未连接，无法提交记录。', 'error');
                    return;
                }
                
                const formData = {
                    inspection_date: document.getElementById('inspectionDate').value,
                    class_name: document.getElementById('classSelect').value,
                    period: parseInt(document.getElementById('periodSelect').value) || 1,
                    inspector: document.getElementById('inspectorSelect').value,
                    arrival_status: document.getElementById('arrivalStatus').value,
                    student_status: document.getElementById('studentStatus').value,
                    subject: document.getElementById('subjectInput').value || '',
                    teacher_name: document.getElementById('teacherInput').value || '',
                    environment: document.getElementById('environmentInput').value || '',
                    remarks: document.getElementById('remarksInput').value || ''
                };
                
                // 简单验证
                if (!formData.inspection_date || !formData.class_name || !formData.inspector || !formData.arrival_status) {
                    showToast('请填写所有必填项（带*号）。', 'error');
                    return;
                }
                
                try {
                    const { error } = await mySupabaseClient.from('inspections').insert([formData]);
                    if (error) throw error;
                    showToast('巡查记录提交成功！', 'success');
                    e.target.reset(); // 重置表单
                    updateWeekday();
                    showPage('queryPage'); // 跳转到查询页
                } catch (error) {
                    console.error('提交失败:', error);
                    showToast('提交失败: ' + (error.message || '未知错误'), 'error');
                }
            }
            
            async function searchInspections() {
                if (!mySupabaseClient) {
                    showToast('数据库未连接，无法搜索记录。', 'error');
                    return;
                }
                
                const searchDate = document.getElementById('searchDate').value;
                const searchClass = document.getElementById('searchClass').value;
                const searchInspector = document.getElementById('searchInspector').value;
                
                let query = mySupabaseClient.from('inspections').select('*').order('inspection_date', { ascending: false });
                if (searchDate) query = query.eq('inspection_date', searchDate);
                if (searchClass) query = query.eq('class_name', searchClass);
                if (searchInspector) query = query.eq('inspector', searchInspector);
                
                try {
                    const { data, error } = await query;
                    if (error) throw error;
                    displayInspections(data || []);
                } catch (error) {
                    console.error('搜索失败:', error);
                    showToast('搜索失败: ' + error.message, 'error');
                }
            }
            
            function displayInspections(records) {
                const tbody = document.getElementById('inspectionsBody');
                if (!tbody) return;
                
                if (!records || records.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px; color: #666;">
                                <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 15px; display: block; opacity: 0.5;"></i>
                                没有找到匹配的巡查记录
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                let html = '';
                records.forEach(record => {
                    let statusClass = 'status-ok';
                    if (record.arrival_status === '迟到') statusClass = 'status-late';
                    if (record.arrival_status === '旷课') statusClass = 'status-absent';
                    
                    html += `
                        <tr>
                            <td>${record.inspection_date}<br><small>${new Date(record.inspection_date).toLocaleDateString('zh-CN', {weekday: 'short'})}</small></td>
                            <td>${record.class_name}</td>
                            <td>第${record.period}节</td>
                            <td>${record.inspector}</td>
                            <td><span class="${statusClass}">${record.arrival_status}</span></td>
                            <td>${record.subject || '-'}<br><small>${record.teacher_name || ''}</small></td>
                            <td>${record.student_status || '-'}</td>
                            <td>
                                <div class="action-buttons-small">
                                    <button class="btn-edit" onclick="window.editRecord('${record.id}')">编辑</button>
                                    <button class="btn-delete" onclick="window.deleteRecord('${record.id}')">删除</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            }
            
            function downloadData() {
                const currentInspector = document.getElementById('inspectorSelect').value;
                if (!currentInspector) {
                    showToast('请先在填写页面选择巡查人身份。', 'error');
                    return;
                }
                
                const table = document.getElementById('inspectionsTable');
                if (!table) return;
                
                const rows = table.querySelectorAll('tr');
                let csv = [];
                
                // 表头
                const headerRow = [];
                rows[0].querySelectorAll('th').forEach(th => headerRow.push(`"${th.textContent.replace(/"/g, '""')}"`));
                csv.push(headerRow.join(','));
                
                // 数据行
                for (let i = 1; i < rows.length; i++) {
                    const rowData = [];
                    const cells = rows[i].querySelectorAll('td');
                    if (cells.length === 1 && cells[0].colSpan === 8) continue; // 跳过“无数据”行
                    cells.forEach(cell => {
                        if (!cell.querySelector('.btn-edit, .btn-delete')) {
                            let cellText = cell.textContent.replace(/\s+/g, ' ').trim();
                            if (cellText.includes(',') || cellText.includes('"')) {
                                cellText = '"' + cellText.replace(/"/g, '""') + '"';
                            }
                            rowData.push(cellText);
                        }
                    });
                    if (rowData.length > 0) csv.push(rowData.join(','));
                }
                
                const csvContent = csv.join('\n');
                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `巡查记录_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast('数据下载开始，请检查浏览器下载列表。', 'success');
            }
            
            // 10. 启动应用
            initializeApplication();
        });
    </script>
</body>
</html>
