<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂巡查管理系统</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        /* 入口页面样式 */
        .home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            min-height: 400px;
        }
        
        .home-buttons {
            display: flex;
            gap: 30px;
            margin-top: 40px;
        }
        
        .nav-btn {
            padding: 20px 50px;
            font-size: 1.2em;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        
        .nav-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .nav-btn i {
            font-size: 1.5em;
        }
        
        /* 表单页面样式 */
        .form-section {
            padding: 30px;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            flex: 1;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f2f5;
        }
        
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #495057;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
        }
        
        /* 查询页面样式 */
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .filter-buttons {
            grid-column: 1 / -1;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #e1e5e9;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e1e5e9;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .edit-btn {
            background: #3498db;
            color: white;
        }
        
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        
        .download-btn {
            background: #27ae60;
            color: white;
        }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .status-on-time {
            background: #d5f4e6;
            color: #27ae60;
        }
        
        .status-late {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-absent {
            background: #f8d7da;
            color: #721c24;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 消息提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            align-items: center;
            animation: slideIn 0.3s ease;
        }
        
        .toast.show {
            display: flex;
        }
        
        .toast.success {
            border-left: 4px solid #28a745;
        }
        
        .toast.error {
            border-left: 4px solid #dc3545;
        }
        
        .toast.warning {
            border-left: 4px solid #ffc107;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            color: #764ba2;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
            
            .filters {
                grid-template-columns: 1fr;
            }
            
            .nav-btn {
                padding: 15px 30px;
                font-size: 1em;
            }
            
            .table-container {
                font-size: 14px;
            }
            
            th, td {
                padding: 10px 5px;
            }
        }
    </style>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div class="header">
                <h1><i class="fas fa-chalkboard-teacher"></i> 课堂巡查管理系统</h1>
                <p>高效记录、便捷查询、智能统计</p>
            </div>
            
            <div class="home-page">
                <h2 style="color: #2c3e50; margin-bottom: 20px;">请选择操作</h2>
                <div class="home-buttons">
                    <button class="nav-btn" onclick="showPage('recordPage')">
                        <i class="fas fa-edit"></i>
                        填写巡查记录
                    </button>
                    <button class="nav-btn" onclick="showPage('queryPage')">
                        <i class="fas fa-search"></i>
                        查询巡查记录
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 填写记录页 -->
        <div id="recordPage" class="page">
            <button class="back-btn" onclick="showPage('homePage')">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
            
            <div class="form-section">
                <h2 style="color: #2c3e50; margin-bottom: 30px; padding-left: 20px;">
                    <i class="fas fa-file-alt"></i> 填写巡查记录
                </h2>
                
                <div class="form-container">
                    <form id="inspectionForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="inspectionDate"><i class="fas fa-calendar"></i> 巡查日期</label>
                                <input type="date" id="inspectionDate" required>
                            </div>
                            
                            <div class="form-group">
                                <label><i class="fas fa-calendar-day"></i> 星期</label>
                                <input type="text" id="weekdayDisplay" readonly style="background: #f8f9fa;">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="classSelect"><i class="fas fa-users"></i> 班级</label>
                                <select id="classSelect" required onchange="updateCourseInfo()">
                                    <option value="">请选择班级</option>
                                    <!-- 班级选项将从数据库动态加载 -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="periodSelect"><i class="fas fa-clock"></i> 节次</label>
                                <select id="periodSelect" required onchange="updateCourseInfo()">
                                    <option value="">请选择节次</option>
                                    <option value="1">第1节</option>
                                    <option value="2">第2节</option>
                                    <option value="3">第3节</option>
                                    <option value="4">第4节</option>
                                    <option value="5">第5节</option>
                                    <option value="6">第6节</option>
                                    <option value="7">第7节</option>
                                    <option value="8">第8节</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="subjectInput"><i class="fas fa-book"></i> 科目</label>
                                <input type="text" id="subjectInput" placeholder="自动填充科目" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="teacherInput"><i class="fas fa-chalkboard-teacher"></i> 任课教师</label>
                                <input type="text" id="teacherInput" placeholder="自动填充教师" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="arrivalStatus"><i class="fas fa-user-check"></i> 到岗情况</label>
                                <select id="arrivalStatus" required>
                                    <option value="">请选择到岗情况</option>
                                    <option value="按时到岗">按时到岗</option>
                                    <option value="迟到">迟到</option>
                                    <option value="旷课">旷课</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="inspectorSelect"><i class="fas fa-user-tie"></i> 巡查人</label>
                                <select id="inspectorSelect" required>
                                    <option value="">请选择巡查人</option>
                                    <!-- 巡查人选项将从数据库动态加载 -->
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="studentStatus"><i class="fas fa-graduation-cap"></i> 学生状态</label>
                                <textarea id="studentStatus" rows="3" placeholder="请输入学生状态..."></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label for="environment"><i class="fas fa-school"></i> 教室环境</label>
                                <textarea id="environment" rows="3" placeholder="请输入教室环境..."></textarea>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="remarksInput"><i class="fas fa-sticky-note"></i> 备注</label>
                            <textarea id="remarksInput" rows="3" placeholder="请输入备注信息..."></textarea>
                        </div>
                        
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                <i class="fas fa-paper-plane"></i> 提交记录
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="resetForm()">
                                <i class="fas fa-redo"></i> 重置表单
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <!-- 查询记录页 -->
        <div id="queryPage" class="page">
            <button class="back-btn" onclick="showPage('homePage')">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
            
            <div class="form-section">
                <h2 style="color: #2c3e50; margin-bottom: 30px; padding-left: 20px;">
                    <i class="fas fa-search"></i> 查询巡查记录
                </h2>
                
                <div class="filters">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> 开始日期</label>
                        <input type="date" id="filterStartDate">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> 结束日期</label>
                        <input type="date" id="filterEndDate">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-users"></i> 班级</label>
                        <select id="filterClass">
                            <option value="">全部班级</option>
                            <!-- 班级选项将从数据库动态加载 -->
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-calendar-day"></i> 星期</label>
                        <select id="filterWeekday">
                            <option value="">全部星期</option>
                            <option value="星期一">星期一</option>
                            <option value="星期二">星期二</option>
                            <option value="星期三">星期三</option>
                            <option value="星期四">星期四</option>
                            <option value="星期五">星期五</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> 节次</label>
                        <select id="filterPeriod">
                            <option value="">全部节次</option>
                            <option value="1">第1节</option>
                            <option value="2">第2节</option>
                            <option value="3">第3节</option>
                            <option value="4">第4节</option>
                            <option value="5">第5节</option>
                            <option value="6">第6节</option>
                            <option value="7">第7节</option>
                            <option value="8">第8节</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-book"></i> 科目</label>
                        <input type="text" id="filterSubject" placeholder="输入科目">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-chalkboard-teacher"></i> 任课教师</label>
                        <input type="text" id="filterTeacher" placeholder="输入教师姓名">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user-tie"></i> 巡查人</label>
                        <select id="filterInspector">
                            <option value="">全部巡查人</option>
                            <!-- 巡查人选项将从数据库动态加载 -->
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user-check"></i> 到岗情况</label>
                        <select id="filterArrivalStatus">
                            <option value="">全部</option>
                            <option value="按时到岗">按时到岗</option>
                            <option value="迟到">迟到</option>
                            <option value="旷课">旷课</option>
                        </select>
                    </div>
                    
                    <div class="filter-buttons">
                        <button class="btn btn-primary" onclick="searchRecords()">
                            <i class="fas fa-search"></i> 查询
                        </button>
                        <button class="btn btn-secondary" onclick="resetFilters()">
                            <i class="fas fa-redo"></i> 重置筛选
                        </button>
                        <button class="btn download-btn" onclick="exportToExcel()" id="downloadBtn" style="display: none;">
                            <i class="fas fa-download"></i> 下载数据
                        </button>
                    </div>
                </div>
                
                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>正在加载数据...</p>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>星期</th>
                                <th>班级</th>
                                <th>节次</th>
                                <th>科目</th>
                                <th>教师</th>
                                <th>到岗情况</th>
                                <th>巡查人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTable">
                            <!-- 数据将通过JavaScript动态加载 -->
                        </tbody>
                    </table>
                </div>
                
                <div id="noData" style="text-align: center; padding: 40px; color: #6c757d; display: none;">
                    <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;"></i>
                    <p>暂无巡查记录</p>
                </div>
            </div>
        </div>
        
        <!-- 消息提示 -->
        <div id="toast" class="toast">
            <span id="toastMessage"></span>
        </div>
    </div>

    <script>
        // 全局变量
        let editingRecordId = null;
        let currentData = [];
        let isAdmin = true; // 默认为管理员，实际应该根据登录状态判断
        
        // 星期映射
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        
        // 模拟的巡查人数据（实际应从数据库获取）
        const inspectors = ['白文娟', '杨丽平', '段延普', '吴子璇', '赵峥峥', '郑胜楠', '古冬苹', '赵桃玲', '秦庆员'];
        
        // 模拟的班级数据（实际应从数据库获取）
        const classes = [
            '七1班', '七2班', '七3班', '七4班', '七5班', '七6班',
            '八1班', '八2班', '八3班', '八4班', '八5班', '八6班',
            '九1班', '九2班', '九3班', '九4班', '九5班', '九6班'
        ];
        
        // 模拟的课程表数据（实际应从数据库获取）
        const scheduleData = [
            { class_name: '八6班', week_day: '星期一', period: 1, subject: '语文', teacher_name: '王老师' },
            { class_name: '八6班', week_day: '星期一', period: 2, subject: '数学', teacher_name: '李老师' },
            { class_name: '八6班', week_day: '星期二', period: 1, subject: '英语', teacher_name: '张老师' },
            { class_name: '八6班', week_day: '星期二', period: 2, subject: '物理', teacher_name: '刘老师' },
            { class_name: '八1班', week_day: '星期一', period: 1, subject: '语文', teacher_name: '王老师' },
            { class_name: '八1班', week_day: '星期一', period: 2, subject: '数学', teacher_name: '赵老师' },
            { class_name: '八1班', week_day: '星期二', period: 1, subject: '英语', teacher_name: '张老师' },
            { class_name: '八1班', week_day: '星期二', period: 2, subject: '物理', teacher_name: '陈老师' }
        ];
        
        // 初始化函数
        async function initApp() {
            setDefaultDates();
            loadClassOptions();
            loadInspectorOptions();
            
            // 设置日期变化监听
            document.getElementById('inspectionDate').addEventListener('change', updateWeekday);
            
            // 初始计算星期
            updateWeekday();
        }
        
        // 设置默认日期
        function setDefaultDates() {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            const todayStr = today.toISOString().split('T')[0];
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            
            document.getElementById('inspectionDate').value = todayStr;
            document.getElementById('filterStartDate').value = yesterdayStr;
            document.getElementById('filterEndDate').value = todayStr;
        }
        
        // 加载班级选项
        function loadClassOptions() {
            const classSelect = document.getElementById('classSelect');
            const filterClass = document.getElementById('filterClass');
            
            // 清空现有选项
            classSelect.innerHTML = '<option value="">请选择班级</option>';
            filterClass.innerHTML = '<option value="">全部班级</option>';
            
            // 添加班级选项
            classes.forEach(className => {
                const option1 = document.createElement('option');
                option1.value = className;
                option1.textContent = className;
                classSelect.appendChild(option1);
                
                const option2 = document.createElement('option');
                option2.value = className;
                option2.textContent = className;
                filterClass.appendChild(option2);
            });
        }
        
        // 加载巡查人选项
        function loadInspectorOptions() {
            const inspectorSelect = document.getElementById('inspectorSelect');
            const filterInspector = document.getElementById('filterInspector');
            
            // 清空现有选项
            inspectorSelect.innerHTML = '<option value="">请选择巡查人</option>';
            filterInspector.innerHTML = '<option value="">全部巡查人</option>';
            
            // 添加巡查人选项
            inspectors.forEach(inspector => {
                const option1 = document.createElement('option');
                option1.value = inspector;
                option1.textContent = inspector;
                inspectorSelect.appendChild(option1);
                
                const option2 = document.createElement('option');
                option2.value = inspector;
                option2.textContent = inspector;
                filterInspector.appendChild(option2);
            });
        }
        
        // 根据日期更新星期
        function updateWeekday() {
            const dateInput = document.getElementById('inspectionDate');
            const weekdayDisplay = document.getElementById('weekdayDisplay');
            
            if (dateInput.value) {
                const date = new Date(dateInput.value);
                const weekday = weekdays[date.getDay()];
                weekdayDisplay.value = weekday;
                
                // 更新课程信息
                updateCourseInfo();
            } else {
                weekdayDisplay.value = '';
            }
        }
        
        // 更新课程信息
        function updateCourseInfo() {
            const classSelect = document.getElementById('classSelect').value;
            const periodSelect = document.getElementById('periodSelect').value;
            const weekday = document.getElementById('weekdayDisplay').value;
            const subjectInput = document.getElementById('subjectInput');
            const teacherInput = document.getElementById('teacherInput');
            
            if (classSelect && periodSelect && weekday) {
                // 查找匹配的课程
                const matchedCourse = scheduleData.find(course => 
                    course.class_name === classSelect && 
                    course.week_day === weekday && 
                    course.period == periodSelect
                );
                
                if (matchedCourse) {
                    subjectInput.value = matchedCourse.subject;
                    teacherInput.value = matchedCourse.teacher_name;
                } else {
                    subjectInput.value = '未找到课程';
                    teacherInput.value = '未安排';
                }
            } else {
                subjectInput.value = '';
                teacherInput.value = '';
            }
        }
        
        // 显示页面
        function showPage(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // 显示目标页面
            document.getElementById(pageId).classList.add('active');
            
            // 如果是查询页面，加载数据
            if (pageId === 'queryPage') {
                searchRecords();
            }
        }
        
        // 提交表单
        async function submitInspection(e) {
            e.preventDefault();
            
            // 验证必填字段
            const requiredFields = ['inspectionDate', 'classSelect', 'periodSelect', 'arrivalStatus', 'subjectInput', 'teacherInput', 'inspectorSelect'];
            for (const fieldId of requiredFields) {
                const field = document.getElementById(fieldId);
                if (!field.value.trim()) {
                    showToast(`请填写${field.previousElementSibling.textContent.trim()}`, 'error');
                    field.focus();
                    return;
                }
            }
            
            // 收集表单数据
            const formData = {
                inspection_date: document.getElementById('inspectionDate').value,
                week_day: document.getElementById('weekdayDisplay').value,
                class_name: document.getElementById('classSelect').value,
                period: parseInt(document.getElementById('periodSelect').value),
                subject: document.getElementById('subjectInput').value,
                teacher_name: document.getElementById('teacherInput').value,
                arrival_status: document.getElementById('arrivalStatus').value,
                student_status: document.getElementById('studentStatus').value || '',
                environment: document.getElementById('environment').value || '',
                inspector: document.getElementById('inspectorSelect').value,
                remarks: document.getElementById('remarksInput').value || '',
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
            
            try {
                // 这里应该调用实际的API保存数据
                // 由于是演示，我们模拟保存操作
                console.log('保存数据:', formData);
                
                // 模拟API调用延迟
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // 保存到localStorage（演示用，实际应该保存到数据库）
                const records = JSON.parse(localStorage.getItem('inspection_records') || '[]');
                if (editingRecordId) {
                    // 更新记录
                    const index = records.findIndex(r => r.id === editingRecordId);
                    if (index !== -1) {
                        records[index] = { id: editingRecordId, ...formData };
                    }
                } else {
                    // 新增记录
                    const newRecord = {
                        id: Date.now().toString(),
                        ...formData
                    };
                    records.unshift(newRecord);
                }
                localStorage.setItem('inspection_records', JSON.stringify(records));
                
                showToast(editingRecordId ? '记录更新成功' : '记录保存成功', 'success');
                
                // 重置表单
                resetForm();
                
                // 跳转到查询页面
                setTimeout(() => {
                    showPage('queryPage');
                }, 1000);
                
            } catch (error) {
                console.error('保存失败:', error);
                showToast('保存失败: ' + error.message, 'error');
            }
        }
        
        // 重置表单
        function resetForm() {
            document.getElementById('inspectionForm').reset();
            setDefaultDates();
            updateWeekday();
            
            // 重置编辑状态
            editingRecordId = null;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-paper-plane"></i> 提交记录';
        }
        
        // 搜索记录
        async function searchRecords() {
            const loadingDiv = document.getElementById('loading');
            const noDataDiv = document.getElementById('noData');
            const resultsTable = document.getElementById('resultsTable');
            const downloadBtn = document.getElementById('downloadBtn');
            
            // 显示加载中
            loadingDiv.style.display = 'block';
            noDataDiv.style.display = 'none';
            resultsTable.innerHTML = '';
            
            // 获取筛选条件
            const filters = {
                startDate: document.getElementById('filterStartDate').value,
                endDate: document.getElementById('filterEndDate').value,
                className: document.getElementById('filterClass').value,
                weekDay: document.getElementById('filterWeekday').value,
                period: document.getElementById('filterPeriod').value,
                subject: document.getElementById('filterSubject').value,
                teacher: document.getElementById('filterTeacher').value,
                inspector: document.getElementById('filterInspector').value,
                arrivalStatus: document.getElementById('filterArrivalStatus').value
            };
            
            try {
                // 模拟API调用延迟
                await new Promise(resolve => setTimeout(resolve, 500));
                
                // 从localStorage获取数据（演示用）
                let records = JSON.parse(localStorage.getItem('inspection_records') || '[]');
                
                // 应用筛选条件
                records = records.filter(record => {
                    if (filters.startDate && record.inspection_date < filters.startDate) return false;
                    if (filters.endDate && record.inspection_date > filters.endDate) return false;
                    if (filters.className && record.class_name !== filters.className) return false;
                    if (filters.weekDay && record.week_day !== filters.weekDay) return false;
                    if (filters.period && record.period != filters.period) return false;
                    if (filters.subject && !record.subject.includes(filters.subject)) return false;
                    if (filters.teacher && !record.teacher_name.includes(filters.teacher)) return false;
                    if (filters.inspector && record.inspector !== filters.inspector) return false;
                    if (filters.arrivalStatus && record.arrival_status !== filters.arrivalStatus) return false;
                    return true;
                });
                
                // 保存当前数据用于导出
                currentData = records;
                
                // 显示/隐藏下载按钮
                if (isAdmin && records.length > 0) {
                    downloadBtn.style.display = 'inline-block';
                } else {
                    downloadBtn.style.display = 'none';
                }
                
                // 渲染结果
                if (records.length === 0) {
                    loadingDiv.style.display = 'none';
                    noDataDiv.style.display = 'block';
                    return;
                }
                
                let html = '';
                records.forEach(record => {
                    const statusClass = record.arrival_status === '按时到岗' ? 'status-on-time' :
                                      record.arrival_status === '迟到' ? 'status-late' : 'status-absent';
                    
                    html += `
                        <tr>
                            <td>${record.inspection_date}</td>
                            <td>${record.week_day}</td>
                            <td>${record.class_name}</td>
                            <td>第${record.period}节</td>
                            <td>${record.subject}</td>
                            <td>${record.teacher_name}</td>
                            <td><span class="status-badge ${statusClass}">${record.arrival_status}</span></td>
                            <td>${record.inspector}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="action-btn edit-btn" onclick="editRecord('${record.id}')">
                                        <i class="fas fa-edit"></i> 编辑
                                    </button>
                                    <button class="action-btn delete-btn" onclick="deleteRecord('${record.id}')">
                                        <i class="fas fa-trash"></i> 删除
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                
                resultsTable.innerHTML = html;
                loadingDiv.style.display = 'none';
                
            } catch (error) {
                console.error('查询失败:', error);
                showToast('查询失败: ' + error.message, 'error');
                loadingDiv.style.display = 'none';
            }
        }
        
        // 编辑记录
        function editRecord(recordId) {
            const records = JSON.parse(localStorage.getItem('inspection_records') || '[]');
            const record = records.find(r => r.id === recordId);
            
            if (record) {
                // 填充表单
                document.getElementById('inspectionDate').value = record.inspection_date;
                updateWeekday(); // 这会自动设置星期
                
                // 注意：由于课程表查询依赖班级、星期、节次，我们需要先设置这些值
                document.getElementById('classSelect').value = record.class_name;
                document.getElementById('periodSelect').value = record.period.toString();
                
                // 等待一下让updateWeekday完成
                setTimeout(() => {
                    // 设置其他字段
                    document.getElementById('subjectInput').value = record.subject;
                    document.getElementById('teacherInput').value = record.teacher_name;
                    document.getElementById('arrivalStatus').value = record.arrival_status;
                    document.getElementById('studentStatus').value = record.student_status || '';
                    document.getElementById('environment').value = record.environment || '';
                    document.getElementById('inspectorSelect').value = record.inspector;
                    document.getElementById('remarksInput').value = record.remarks || '';
                    
                    // 设置编辑状态
                    editingRecordId = recordId;
                    document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> 更新记录';
                    
                    // 跳转到填写页面
                    showPage('recordPage');
                    
                    showToast('记录已加载到表单中', 'success');
                }, 100);
            }
        }
        
        // 删除记录
        async function deleteRecord(recordId) {
            if (!confirm('确定要删除这条记录吗？此操作不可撤销。')) {
                return;
            }
            
            try {
                // 模拟API调用延迟
                await new Promise(resolve => setTimeout(resolve, 500));
                
                // 从localStorage删除（演示用）
                let records = JSON.parse(localStorage.getItem('inspection_records') || '[]');
                records = records.filter(r => r.id !== recordId);
                localStorage.setItem('inspection_records', JSON.stringify(records));
                
                showToast('记录删除成功', 'success');
                
                // 刷新表格
                searchRecords();
                
            } catch (error) {
                console.error('删除失败:', error);
                showToast('删除失败: ' + error.message, 'error');
            }
        }
        
        // 重置筛选条件
        function resetFilters() {
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            document.getElementById('filterClass').value = '';
            document.getElementById('filterWeekday').value = '';
            document.getElementById('filterPeriod').value = '';
            document.getElementById('filterSubject').value = '';
            document.getElementById('filterTeacher').value = '';
            document.getElementById('filterInspector').value = '';
            document.getElementById('filterArrivalStatus').value = '';
            
            // 重新查询
            searchRecords();
        }
        
        // 导出到Excel
        function exportToExcel() {
            if (currentData.length === 0) {
                showToast('没有数据可导出', 'warning');
                return;
            }
            
            // 创建CSV内容
            const headers = ['日期', '星期', '班级', '节次', '科目', '教师', '到岗情况', '学生状态', '教室环境', '巡查人', '备注'];
            const csvRows = [];
            
            // 添加表头
            csvRows.push(headers.join(','));
            
            // 添加数据行
            currentData.forEach(record => {
                const row = [
                    record.inspection_date,
                    record.week_day,
                    record.class_name,
                    `第${record.period}节`,
                    record.subject,
                    record.teacher_name,
                    record.arrival_status,
                    record.student_status || '',
                    record.environment || '',
                    record.inspector,
                    record.remarks || ''
                ];
                
                // 处理特殊字符
                const escapedRow = row.map(cell => {
                    if (cell === null || cell === undefined) return '';
                    const cellStr = String(cell);
                    if (cellStr.includes(',') || cellStr.includes('"') || cellStr.includes('\n')) {
                        return '"' + cellStr.replace(/"/g, '""') + '"';
                    }
                    return cellStr;
                });
                
                csvRows.push(escapedRow.join(','));
            });
            
            const csvString = csvRows.join('\n');
            
            // 创建下载链接
            const blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `巡查记录_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('数据导出成功', 'success');
        }
        
        // 显示消息提示
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            // 3秒后自动隐藏
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置表单提交事件
            document.getElementById('inspectionForm').addEventListener('submit', submitInspection);
            
            // 设置默认巡查人
            document.getElementById('inspectorSelect').value = '白文娟';
            
            // 初始化应用
            initApp();
            
            // 模拟一些测试数据
            if (!localStorage.getItem('inspection_records')) {
                const sampleData = [
                    {
                        id: '1',
                        inspection_date: '2026-03-24',
                        week_day: '星期二',
                        class_name: '八6班',
                        period: 1,
                        subject: '语文',
                        teacher_name: '王老师',
                        arrival_status: '按时到岗',
                        student_status: '学生状态良好',
                        environment: '教室整洁',
                        inspector: '白文娟',
                        remarks: '课堂秩序良好',
                        created_at: '2026-03-24T10:00:00Z',
                        updated_at: '2026-03-24T10:00:00Z'
                    }
                ];
                localStorage.setItem('inspection_records', JSON.stringify(sampleData));
            }
        });
    </script>
