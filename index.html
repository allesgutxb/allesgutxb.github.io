<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校教务巡查系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 样式部分保持不变，确保界面美观与功能 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header h1 { color: #2c3e50; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .main-content { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; margin-top: 25px; }
        .form-section, .table-section { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-primary { background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        .search-btn, .export-btn { background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%); color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; font-weight: 600; }
        .action-buttons { display: flex; gap: 5px; }
        .btn-edit, .btn-delete { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; color: white; }
        .btn-edit { background: #2196F3; }
        .btn-delete { background: #f44336; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chalkboard-teacher"></i> 学校教务巡查系统</h1>
            <div class="stats">
                <div class="stat-card"><i class="fas fa-school"></i><div class="number" id="classCount">0</div><div class="label">班级总数</div></div>
                <div class="stat-card"><i class="fas fa-users"></i><div class="number" id="teacherCount">0</div><div class="label">教师人数</div></div>
                <div class="stat-card"><i class="fas fa-clipboard-check"></i><div class="number" id="recordCount">0</div><div class="label">总记录</div></div>
                <div class="stat-card"><i class="fas fa-calendar-day"></i><div class="number" id="todayCount">0</div><div class="label">今日记录</div></div>
            </div>
        </div>

        <div class="main-content">
            <!-- 左侧：填写记录表单 -->
            <div class="form-section">
                <h2><i class="fas fa-edit"></i> 填写巡查记录</h2>
                <form id="inspectionForm">
                    <div class="row">
                        <div class="form-group">
                            <label for="inspectionDate">巡查日期 *</label>
                            <input type="date" id="inspectionDate" required onchange="updateWeekday()">
                            <div id="weekdayDisplay" style="font-size:14px; color:#666; margin-top:5px;"></div>
                        </div>
                        <div class="form-group">
                            <label for="classSelect">班级 *</label>
                            <select id="classSelect" required>
                                <option value="">请选择班级</option>
                                <!-- 班级选项将由JavaScript动态加载 -->
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label for="periodSelect">节次 *</label>
                            <select id="periodSelect" required>
                                <option value="">请选择节次</option>
                                <option value="1">第一节</option><option value="2">第二节</option>
                                <option value="3">第三节</option><option value="4">第四节</option>
                                <option value="5">第五节</option><option value="6">第六节</option>
                                <option value="7">第七节</option><option value="8">第八节</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="inspectorName">巡查人 *</label>
                            <select id="inspectorName" required>
                                <option value="">请选择巡查人</option>
                                <!-- 巡查人选项将由JavaScript动态加载 -->
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label for="arrivalTime">教师到岗情况 *</label>
                            <select id="arrivalTime" required>
                                <option value="">请选择</option>
                                <option value="按时到岗">按时到岗</option>
                                <option value="迟到">迟到</option>
                                <option value="旷课">旷课</option>
                                <option value="学生课前状态异常">学生课前状态异常（需在备注中说明）</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="subject">科目</label>
                            <input type="text" id="subject" placeholder="请输入科目">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="teacherName">任课教师</label>
                        <input type="text" id="teacherName" placeholder="请输入任课教师姓名">
                    </div>
                    <div class="form-group">
                        <label for="classroomEnvironment">教室环境/学生状态备注</label>
                        <textarea id="classroomEnvironment" rows="2" placeholder="请描述教室环境或学生课前状态..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="remarks">其他备注</label>
                        <textarea id="remarks" rows="2" placeholder="其他需要说明的情况..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> 提交记录</button>
                </form>
            </div>

            <!-- 右侧：查询记录表格 -->
            <div class="table-section">
                <h2><i class="fas fa-search"></i> 查询巡查记录</h2>
                <div class="search-box">
                    <input type="date" id="searchDate" placeholder="按日期筛选">
                    <select id="searchClass">
                        <option value="">全部班级</option>
                    </select>
                    <select id="searchInspector">
                        <option value="">全部巡查人</option>
                    </select>
                    <button class="search-btn" onclick="loadInspections()"><i class="fas fa-search"></i> 搜索</button>
                    <button class="export-btn" onclick="downloadData()" id="downloadBtn"><i class="fas fa-download"></i> 下载</button>
                </div>
                <div style="overflow-x: auto;">
                    <table id="inspectionsTable">
                        <thead>
                            <tr>
                                <th>日期</th><th>班级</th><th>节次</th><th>巡查人</th>
                                <th>到岗情况</th><th>科目/教师</th><th>环境备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="inspectionsBody">
                            <!-- 数据行由JavaScript动态插入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入 Supabase 客户端库 -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        // ==================== 【核心修复区：Supabase 初始化】 ====================
        // 目标：使用一个独一无二的全局变量名，彻底避免与浏览器扩展或其他脚本冲突。
        (function() {
            // 1. 定义项目配置（！！！请务必替换为您自己项目的真实URL和密钥！！！）
            const SUPABASE_URL = 'https://dpyennxjaejstvbbjmbt.supabase.co'; // 替换为您的项目URL
            const SUPABASE_ANON_KEY = 'sb_publishable_v3N76dVRe9uxrmlj-DwbfA_FYAcD06R'; // 替换为您的匿名密钥

            // 2. 检查是否已存在我们的客户端，避免重复创建
            if (!window.__schoolInspectionDB) {
                // 使用一个极不可能冲突的全局变量名来存储客户端
                window.__schoolInspectionDB = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        })();
        // 3. 为业务代码创建一个局部常量引用
        const supabase = window.__schoolInspectionDB;
        // ==================== 初始化结束 ====================

        // 全局变量
        let allClasses = [];
        let allInspectors = [];

        // 页面加载初始化
        document.addEventListener('DOMContentLoaded', function() {
            initPage();
        });

        async function initPage() {
            // 设置默认日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inspectionDate').value = today;
            document.getElementById('searchDate').value = today;
            updateWeekday();

            // 加载初始数据
            await loadClasses();
            await loadInspectorList();
            await loadInspections(); // 加载初始的查询结果
            updateStatistics();
        }

        // 根据日期更新星期显示
        function updateWeekday() {
            const dateInput = document.getElementById('inspectionDate');
            const display = document.getElementById('weekdayDisplay');
            if (dateInput.value) {
                const date = new Date(dateInput.value);
                const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
                display.textContent = weekdays[date.getDay()];
            } else {
                display.textContent = '';
            }
        }

        // 加载班级列表
        async function loadClasses() {
            // 这里可以从数据库加载，或使用静态数据
            const classGroups = [
                { title: "九年级", classes: ["九1班", "九2班", "九3班", "九4班", "九5班", "九6班"] },
                { title: "八年级", classes: ["八1班", "八2班", "八3班", "八4班", "八5班", "八6班"] },
                { title: "七年级", classes: ["七1班", "七2班", "七3班", "七4班", "七5班", "七6班"] }
            ];
            allClasses = classGroups.flatMap(g => g.classes);
            const classSelect = document.getElementById('classSelect');
            const searchClassSelect = document.getElementById('searchClass');

            allClasses.forEach(className => {
                ['classSelect', 'searchClass'].forEach(selectId => {
                    const option = document.createElement('option');
                    option.value = className;
                    option.textContent = className;
                    document.getElementById(selectId).appendChild(option);
                });
            });
            document.getElementById('classCount').textContent = allClasses.length;
        }

        // 加载巡查人列表（从数据库）
        async function loadInspectorList() {
            try {
                const { data, error } = await supabase
                    .from('inspectors')
                    .select('inspector_name')
                    .order('inspector_name');
                if (error) throw error;
                allInspectors = data.map(i => i.inspector_name);
                const inspectorSelect = document.getElementById('inspectorName');
                const searchInspectorSelect = document.getElementById('searchInspector');

                allInspectors.forEach(name => {
                    [inspectorSelect, searchInspectorSelect].forEach(select => {
                        const option = document.createElement('option');
                        option.value = name;
                        option.textContent = name;
                        select.appendChild(option);
                    });
                });
                document.getElementById('teacherCount').textContent = allInspectors.length;
            } catch (error) {
                console.error('加载巡查人失败:', error);
                // 备用方案：使用示例数据
                const backupInspectors = ['张主任', '李老师', '王督导'];
                backupInspectors.forEach(name => {
                    ['inspectorName', 'searchInspector'].forEach(selectId => {
                        const option = document.createElement('option');
                        option.value = name;
                        option.textContent = name;
                        document.getElementById(selectId).appendChild(option);
                    });
                });
                document.getElementById('teacherCount').textContent = backupInspectors.length;
            }
        }

        // 提交表单
        document.getElementById('inspectionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = {
                inspection_date: document.getElementById('inspectionDate').value,
                class_name: document.getElementById('classSelect').value,
                period: document.getElementById('periodSelect').value,
                inspector: document.getElementById('inspectorName').value,
                arrival_time: document.getElementById('arrivalTime').value,
                subject: document.getElementById('subject').value,
                teacher_name: document.getElementById('teacherName').value,
                classroom_environment: document.getElementById('classroomEnvironment').value,
                remarks: document.getElementById('remarks').value
            };
            try {
                const { error } = await supabase.from('inspections').insert([formData]);
                if (error) throw error;
                alert('记录提交成功！');
                this.reset();
                updateWeekday();
                loadInspections(); // 刷新查询列表
                updateStatistics();
            } catch (error) {
                alert('提交失败: ' + error.message);
            }
        });

        // 加载并显示巡查记录
        async function loadInspections() {
            const searchDate = document.getElementById('searchDate').value;
            const searchClass = document.getElementById('searchClass').value;
            const searchInspector = document.getElementById('searchInspector').value;

            let query = supabase.from('inspections').select('*').order('inspection_date', { ascending: false });

            if (searchDate) query = query.eq('inspection_date', searchDate);
            if (searchClass) query = query.eq('class_name', searchClass);
            if (searchInspector) query = query.eq('inspector', searchInspector);

            try {
                const { data, error } = await query;
                if (error) throw error;
                displayInspections(data || []);
            } catch (error) {
                console.error('查询失败:', error);
                document.getElementById('inspectionsBody').innerHTML = `<tr><td colspan="8" style="text-align:center;padding:20px;">查询失败: ${error.message}</td></tr>`;
            }
        }

        function displayInspections(records) {
            const tbody = document.getElementById('inspectionsBody');
            tbody.innerHTML = '';
            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#666;">暂无巡查记录</td></tr>`;
                return;
            }
            records.forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.inspection_date}<br><small>${new Date(record.inspection_date).toLocaleDateString('zh-CN', {weekday: 'short'})}</small></td>
                    <td>${record.class_name}</td>
                    <td>第${record.period}节</td>
                    <td>${record.inspector}</td>
                    <td>${record.arrival_time || '-'}</td>
                    <td>${record.subject || '-'}<br><small>${record.teacher_name || ''}</small></td>
                    <td>${record.classroom_environment || '-'}</td>
                    <td class="action-buttons">
                        <button class="btn-edit" onclick="editRecord('${record.id}')">编辑</button>
                        <button class="btn-delete" onclick="deleteRecord('${record.id}')">删除</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            document.getElementById('recordCount').textContent = records.length;
        }

        // 更新统计信息
        async function updateStatistics() {
            try {
                const { count } = await supabase.from('inspections').select('*', { count: 'exact', head: true });
                document.getElementById('recordCount').textContent = count || 0;

                const today = new Date().toISOString().split('T')[0];
                const { count: todayCount } = await supabase.from('inspections').select('*', { count: 'exact', head: true }).eq('inspection_date', today);
                document.getElementById('todayCount').textContent = todayCount || 0;
            } catch (error) {
                console.error('更新统计失败:', error);
            }
        }

        // 下载数据为CSV
        function downloadData() {
            const currentInspector = document.getElementById('inspectorName').value;
            // 简单的权限检查：只有选择了巡查人才能下载（您可以根据业务需要强化此逻辑）
            if (!currentInspector || currentInspector === '请选择巡查人') {
                alert('请先在左侧表单中选择您的巡查人身份，以便验证下载权限。');
                return;
            }

            const table = document.getElementById('inspectionsTable');
            let csv = [];
            // 遍历所有行
            for (let row of table.rows) {
                let rowData = [];
                // 遍历所有单元格
                for (let cell of row.cells) {
                    // 避免包含操作按钮的文本
                    if (!cell.querySelector('.btn-edit, .btn-delete')) {
                        rowData.push(`"${cell.innerText.replace(/"/g, '""')}"`);
                    }
                }
                if (rowData.length > 0) {
                    csv.push(rowData.join(','));
                }
            }
            const csvContent = csv.join('\n');
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `巡查记录_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            alert('数据下载开始。如果浏览器没有自动保存，请检查浏览器的下载列表。');
        }

        // 编辑记录（示例函数，需完善）
        function editRecord(recordId) {
            alert('编辑功能需根据具体业务逻辑实现。记录ID: ' + recordId);
            // 您可以在此处打开一个模态框，加载该记录的数据并允许修改
        }

        // 删除记录
        async function deleteRecord(recordId) {
            if (!confirm('确定要删除这条记录吗？此操作不可撤销。')) return;
            try {
                const { error } = await supabase.from('inspections').delete().eq('id', recordId);
                if (error) throw error;
                alert('记录删除成功！');
                loadInspections(); // 刷新列表
                updateStatistics();
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
