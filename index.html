<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂巡查管理系统</title>
    <style>
        /* 保留之前的完整CSS样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: linear-gradient(90deg, #1a237e, #283593); color: white; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo i { font-size: 2.5rem; }
        h1 { font-size: 2rem; font-weight: 600; }
        .page { display: none; padding: 30px; }
        .page.active { display: block; }
        .home-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .home-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 30px; border-radius: 15px; font-size: 1.4rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 15px; transition: all 0.3s; }
        .home-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .grade-section { margin-bottom: 30px; }
        .grade-title { font-size: 1.8rem; color: #1a237e; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 3px solid #e0e0e0; }
        .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .class-card { background: white; border-radius: 12px; padding: 25px 20px; text-align: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 2px solid transparent; transition: all 0.3s; }
        .class-card:hover { border-color: #667eea; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .form-container { background: #f8f9fa; padding: 25px; border-radius: 15px; margin-top: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn { background: #4CAF50; color: white; border: none; padding: 14px 28px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: 600; transition: background 0.3s; }
        .btn:hover { background: #3d8b40; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .filters { background: #e9f7fe; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .table-container { overflow-x: auto; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid #eee; }
        thead { background: linear-gradient(90deg, #1a237e, #283593); color: white; }
        tbody tr:hover { background-color: #f9f9f9; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .status-ontime { background: #d5f4e6; color: #27ae60; }
        .status-late { background: #fff3cd; color: #856404; }
        .status-absent { background: #f8d7da; color: #721c24; }
        .action-btns { display: flex; gap: 10px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 顶部标题栏 -->
        <header>
            <div class="logo">
                <i class="fas fa-chalkboard-teacher"></i>
                <h1>课堂巡查管理系统</h1>
            </div>
            <div class="user-info" id="currentUserInfo">
                <span id="currentInspectorName">未选择巡查人</span>
            </div>
        </header>

        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div style="text-align: center; padding: 40px 20px;">
                <h2 style="color: #2c3e50; margin-bottom: 20px;">请选择操作</h2>
                <div class="home-buttons">
                    <button class="home-btn" onclick="showPage('loginPage')">
                        <i class="fas fa-sign-in-alt"></i>
                        巡查人登录
                    </button>
                    <button class="home-btn" onclick="showPage('classSelectPage')">
                        <i class="fas fa-search"></i>
                        查询巡查记录
                    </button>
                </div>
            </div>
        </div>

        <!-- 巡查人登录页 -->
        <div id="loginPage" class="page">
            <div class="form-container" style="max-width: 400px; margin: 50px auto;">
                <h2 style="text-align: center; margin-bottom: 30px; color: #2c3e50;">
                    <i class="fas fa-user-circle"></i> 巡查人登录
                </h2>
                <div class="form-group">
                    <label for="loginInspector"><i class="fas fa-user"></i> 选择巡查人</label>
                    <select id="loginInspector" class="form-control">
                        <option value="">请选择巡查人</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> 密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" class="form-control">
                </div>
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button class="btn" onclick="loginInspector()" style="flex: 1;">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                    <button class="btn btn-secondary" onclick="showPage('homePage')" style="flex: 1;">
                        <i class="fas fa-home"></i> 返回首页
                    </button>
                </div>
            </div>
        </div>

        <!-- 班级选择页面 -->
        <div id="classSelectPage" class="page">
            <div style="padding: 20px;">
                <h2 style="color: #2c3e50; margin-bottom: 30px; text-align: center;">
                    <i class="fas fa-users"></i> 请选择要查询的班级
                </h2>
                <div id="classesContainer"></div>
            </div>
        </div>

        <!-- 查询页面 -->
        <div id="queryPage" class="page">
            <div style="padding: 20px;">
                <h2 id="queryPageTitle" style="color: #2c3e50; margin-bottom: 20px;">
                    <i class="fas fa-search"></i> 巡查记录查询
                </h2>
                
                <!-- 筛选条件 -->
                <div class="filters">
                    <div class="filter-row">
                        <div class="form-group">
                            <label><i class="fas fa-calendar"></i> 开始日期</label>
                            <input type="date" id="filterStartDate" class="form-control">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-calendar"></i> 结束日期</label>
                            <input type="date" id="filterEndDate" class="form-control">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-users"></i> 班级</label>
                            <select id="filterClass" class="form-control">
                                <option value="">全部班级</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-row">
                        <div class="form-group">
                            <label><i class="fas fa-calendar-day"></i> 星期</label>
                            <select id="filterWeekday" class="form-control">
                                <option value="">全部星期</option>
                                <option value="星期一">星期一</option>
                                <option value="星期二">星期二</option>
                                <option value="星期三">星期三</option>
                                <option value="星期四">星期四</option>
                                <option value="星期五">星期五</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-clock"></i> 节次</label>
                            <select id="filterPeriod" class="form-control">
                                <option value="">全部节次</option>
                                <option value="1">第1节</option>
                                <option value="2">第2节</option>
                                <option value="3">第3节</option>
                                <option value="4">第4节</option>
                                <option value="5">第5节</option>
                                <option value="6">第6节</option>
                                <option value="7">第7节</option>
                                <option value="8">第8节</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-user-tie"></i> 巡查人</label>
                            <select id="filterInspector" class="form-control">
                                <option value="">全部巡查人</option>
                            </select>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 20px;">
                        <button class="btn" onclick="searchInspections()">
                            <i class="fas fa-search"></i> 查询
                        </button>
                        <button class="btn btn-secondary" onclick="resetFilters()">
                            <i class="fas fa-redo"></i> 重置
                        </button>
                        <button class="btn" onclick="showPage('recordPage')" id="addRecordBtn" style="display: none;">
                            <i class="fas fa-plus"></i> 添加记录
                        </button>
                    </div>
                </div>

                <!-- 加载动画 -->
                <div id="loading" style="text-align: center; padding: 40px; display: none;">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px;">正在加载数据...</p>
                </div>

                <!-- 无数据提示 -->
                <div id="noData" style="text-align: center; padding: 40px; display: none;">
                    <i class="fas fa-inbox" style="font-size: 60px; color: #ccc; margin-bottom: 20px;"></i>
                    <p style="color: #666;">暂无巡查记录</p>
                </div>

                <!-- 数据表格 -->
                <div class="table-container" id="resultsTable" style="display: none;">
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>星期</th>
                                <th>班级</th>
                                <th>节次</th>
                                <th>科目</th>
                                <th>教师</th>
                                <th>到岗情况</th>
                                <th>学生状态</th>
                                <th>巡查人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                            <!-- 数据动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 填写/编辑记录页 -->
        <div id="recordPage" class="page">
            <div class="form-container">
                <h2 id="recordFormTitle" style="color: #2c3e50; margin-bottom: 20px;">
                    <i class="fas fa-edit"></i> 填写巡查记录
                </h2>
                <form id="inspectionForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="recordDate"><i class="fas fa-calendar"></i> 巡查日期</label>
                            <input type="date" id="recordDate" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="recordWeekday"><i class="fas fa-calendar-day"></i> 星期</label>
                            <select id="recordWeekday" class="form-control" required>
                                <option value="">请选择星期</option>
                                <option value="星期一">星期一</option>
                                <option value="星期二">星期二</option>
                                <option value="星期三">星期三</option>
                                <option value="星期四">星期四</option>
                                <option value="星期五">星期五</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="recordClass"><i class="fas fa-users"></i> 班级</label>
                            <select id="recordClass" class="form-control" required onchange="loadSchedule()">
                                <option value="">请选择班级</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="recordPeriod"><i class="fas fa-clock"></i> 节次</label>
                            <select id="recordPeriod" class="form-control" required onchange="loadSchedule()">
                                <option value="">请选择节次</option>
                                <option value="1">第1节</option>
                                <option value="2">第2节</option>
                                <option value="3">第3节</option>
                                <option value="4">第4节</option>
                                <option value="5">第5节</option>
                                <option value="6">第6节</option>
                                <option value="7">第7节</option>
                                <option value="8">第8节</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="recordSubject"><i class="fas fa-book"></i> 科目</label>
                            <select id="recordSubject" class="form-control" required>
                                <option value="">请选择科目</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="recordTeacher"><i class="fas fa-chalkboard-teacher"></i> 任课教师</label>
                            <select id="recordTeacher" class="form-control" required>
                                <option value="">请选择教师</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="recordArrivalStatus"><i class="fas fa-user-check"></i> 到岗情况</label>
                            <select id="recordArrivalStatus" class="form-control" required>
                                <option value="">请选择到岗情况</option>
                                <option value="按时到岗">按时到岗</option>
                                <option value="迟到">迟到</option>
                                <option value="未到岗">未到岗</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="recordInspector"><i class="fas fa-user-tie"></i> 巡查人</label>
                            <select id="recordInspector" class="form-control" required>
                                <option value="">请选择巡查人</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="recordStudentStatus"><i class="fas fa-users"></i> 学生状态</label>
                        <textarea id="recordStudentStatus" class="form-control" rows="3" placeholder="描述学生听课状态、纪律等"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="recordEnvironment"><i class="fas fa-school"></i> 教室环境</label>
                        <textarea id="recordEnvironment" class="form-control" rows="2" placeholder="描述教室环境情况"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="recordRemarks"><i class="fas fa-sticky-note"></i> 备注</label>
                        <textarea id="recordRemarks" class="form-control" rows="2" placeholder="其他需要记录的事项"></textarea>
                    </div>
                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="button" class="btn" onclick="submitInspection()" id="submitBtn" style="flex: 1;">
                            <i class="fas fa-save"></i> 保存记录
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="resetRecordForm()" style="flex: 1;">
                            <i class="fas fa-redo"></i> 重置
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="showPage('queryPage')" style="flex: 1;">
                            <i class="fas fa-times"></i> 取消
                        </button>
                    </div>
                    <input type="hidden" id="recordId">
                </form>
            </div>
        </div>
    </div>

    <!-- 密码验证模态框 -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px; color: #2c3e50;">
                <i class="fas fa-lock"></i> 请输入管理员密码
            </h3>
            <div class="form-group">
                <input type="password" id="adminPassword" class="form-control" placeholder="请输入管理员密码">
            </div>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn" onclick="downloadData()" style="flex: 1;">
                    <i class="fas fa-download"></i> 确认下载
                </button>
                <button class="btn btn-secondary" onclick="closePasswordModal()" style="flex: 1;">
                    <i class="fas fa-times"></i> 取消
                </button>
            </div>
        </div>
    </div>

    <!-- 引入Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Supabase配置
        const SUPABASE_URL = 'https://dpyennxjaejstvbbjmbt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRweWVubnhqYWVqc3R2YmJqbWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjcwNTYzMzcsImV4cCI6MjA0MjYzMjMzN30.v3N76dVRe9uxrmlj-DwbfA_FYAcD06R';
        
        // 初始化Supabase客户端
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 全局变量
        let currentInspector = null;
        let editingRecordId = null;
        let teachersData = [];
        let classesData = [];
        let inspectorsData = [];
        let scheduleData = [];
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', async function() {
            // 设置默认日期
            setDefaultDates();
            
            // 加载数据
            await loadInitialData();
            
            // 加载巡查人登录选项
            await loadInspectorLoginOptions();
            
            // 加载班级选项
            await loadClassOptions();
            
            // 加载教师选项
            await loadTeacherOptions();
            
            // 加载巡查人选项
            await loadInspectorOptions();
            
            // 检查本地存储的巡查人登录状态
            const savedInspector = localStorage.getItem('currentInspector');
            if (savedInspector) {
                currentInspector = JSON.parse(savedInspector);
                document.getElementById('currentInspectorName').textContent = currentInspector.name;
                document.getElementById('addRecordBtn').style.display = 'inline-block';
            }
        });
        
        // 设置默认日期
        function setDefaultDates() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('recordDate').value = today;
            
            // 查询页日期默认最近一周
            const oneWeekAgo = new Date();
            oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
            document.getElementById('filterStartDate').value = oneWeekAgo.toISOString().split('T')[0];
            document.getElementById('filterEndDate').value = today;
        }
        
        // 加载初始数据
        async function loadInitialData() {
            try {
                // 加载班级数据
                const { data: classes, error: classesError } = await supabase
                    .from('classes')
                    .select('*')
                    .order('class_name');
                    
                if (!classesError) {
                    classesData = classes;
                }
                
                // 加载教师数据
                const { data: teachers, error: teachersError } = await supabase
                    .from('teachers')
                    .select('*')
                    .order('teacher_name');
                    
                if (!teachersError) {
                    teachersData = teachers;
                }
                
                // 加载巡查人数据
                const { data: inspectors, error: inspectorsError } = await supabase
                    .from('inspectors')
                    .select('*')
                    .order('inspector_name');
                    
                if (!inspectorsError) {
                    inspectorsData = inspectors;
                }
                
                // 加载课程表数据
                const { data: schedule, error: scheduleError } = await supabase
                    .from('schedule')
                    .select('*');
                    
                if (!scheduleError) {
                    scheduleData = schedule;
                }
                
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('加载数据失败，请刷新页面重试');
            }
        }
        
        // 显示页面
        function showPage(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // 显示目标页面
            document.getElementById(pageId).classList.add('active');
            
            // 如果显示查询页，自动查询
            if (pageId === 'queryPage') {
                searchInspections();
            }
            
            // 如果显示班级选择页，渲染班级卡片
            if (pageId === 'classSelectPage') {
                renderClassCards();
            }
        }
        
        // 渲染班级卡片
        function renderClassCards() {
            const container = document.getElementById('classesContainer');
            container.innerHTML = '';
            
            // 按年级分组
            const grades = {
                '七年级': classesData.filter(c => c.class_name.startsWith('七')),
                '八年级': classesData.filter(c => c.class_name.startsWith('八')),
                '九年级': classesData.filter(c => c.class_name.startsWith('九'))
            };
            
            for (const [gradeName, classes] of Object.entries(grades)) {
                if (classes.length === 0) continue;
                
                const gradeSection = document.createElement('div');
                gradeSection.className = 'grade-section';
                gradeSection.innerHTML = `
                    <h3 class="grade-title">${gradeName}</h3>
                    <div class="class-grid" id="${gradeName.replace('年级', '')}Grid"></div>
                `;
                
                container.appendChild(gradeSection);
                
                const grid = document.getElementById(gradeName.replace('年级', '') + 'Grid');
                classes.forEach(cls => {
                    const card = document.createElement('div');
                    card.className = 'class-card';
                    card.innerHTML = `
                        <div style="font-size: 2.5rem; color: #4a6bdf; margin-bottom: 10px;">
                            <i class="fas fa-school"></i>
                        </div>
                        <div style="font-size: 1.5rem; font-weight: bold; color: #2c3e50;">
                            ${cls.class_name}
                        </div>
                    `;
                    card.onclick = () => selectClass(cls.class_name);
                    grid.appendChild(card);
                });
            }
        }
        
        // 选择班级
        function selectClass(className) {
            // 跳转到查询页
            showPage('queryPage');
            
            // 设置班级筛选条件
            document.getElementById('filterClass').value = className;
            
            // 自动查询
            setTimeout(() => {
                searchInspections();
            }, 100);
        }

                alert('请输入密码');

            }

        // 加载课程表
        function loadSchedule() {
            const className = document.getElementById('recordClass').value;
            const weekday = document.getElementById('recordWeekday').value;
            const period = document.getElementById('recordPeriod').value;
            const subjectSelect = document.getElementById('recordSubject');
            const teacherSelect = document.getElementById('recordTeacher');
            
            if (className && weekday && period) {
                // 查找匹配的课程
                const matchedSchedule = scheduleData.find(item => 
                    item.class_name === className && 
                    item.week_day === weekday && 
                    item.period == period
                );
                
                if (matchedSchedule) {
                    // 设置科目
                    subjectSelect.value = matchedSchedule.subject;
                    
                    // 查找教师
                    const matchedTeacher = teachersData.find(t => 
                        t.teacher_name === matchedSchedule.teacher_name
                    );
                    
                    if (matchedTeacher) {
                        teacherSelect.value = matchedTeacher.teacher_name;
                    }
                }
            }
        }
        
        // 搜索巡查记录
        async function searchInspections() {
            const loadingDiv = document.getElementById('loading');
            const noDataDiv = document.getElementById('noData');
            const resultsTable = document.getElementById('resultsTable');
            const resultsBody = document.getElementById('resultsBody');
            
            loadingDiv.style.display = 'block';
            noDataDiv.style.display = 'none';
            resultsTable.style.display = 'none';
            resultsBody.innerHTML = '';
            
            try {
                // 构建查询条件
                let query = supabase.from('inspections').select('*');
                
                // 应用筛选条件
                const startDate = document.getElementById('filterStartDate').value;
                const endDate = document.getElementById('filterEndDate').value;
                const className = document.getElementById('filterClass').value;
                const weekday = document.getElementById('filterWeekday').value;
                const period = document.getElementById('filterPeriod').value;
                const inspector = document.getElementById('filterInspector').value;
                
                if (startDate) {
                    query = query.gte('inspection_date', startDate);
                }
                if (endDate) {
                    query = query.lte('inspection_date', endDate);
                }
                if (className) {
                    query = query.eq('class_name', className);
                }
                if (weekday) {
                    query = query.eq('week_day', weekday);
                }
                if (period) {
                    query = query.eq('period', parseInt(period));
                }
                if (inspector) {
                    query = query.eq('inspector_name', inspector);
                }
                
                // 按日期降序排序
                query = query.order('inspection_date', { ascending: false });
                
                const { data, error } = await query;
                
                loadingDiv.style.display = 'none';
                
                if (error) {
                    throw error;
                }
                
                if (!data || data.length === 0) {
                    noDataDiv.style.display = 'block';
                    return;
                }
                
                // 显示数据
                data.forEach(record => {
                    const row = document.createElement('tr');
                    
                    // 根据到岗情况设置状态样式
                    let statusClass = '';
                    if (record.arrival_status === '按时到岗') {
                        statusClass = 'status-ontime';
                    } else if (record.arrival_status === '迟到') {
                        statusClass = 'status-late';
                    } else {
                        statusClass = 'status-absent';
                    }
                    
                    row.innerHTML = `
                        <td>${record.inspection_date}</td>
                        <td>${record.week_day}</td>
                        <td>${record.class_name}</td>
                        <td>第${record.period}节</td>
                        <td>${record.subject}</td>
                        <td>${record.teacher_name}</td>
                        <td><span class="status-badge ${statusClass}">${record.arrival_status}</span></td>
                        <td>${record.student_status || ''}</td>
                        <td>${record.inspector_name}</td>
                        <td>
                            <div class="action-btns">
                                <button onclick="editRecord('${record.id}')" class="btn" style="padding: 6px 12px; font-size: 14px;">
                                    <i class="fas fa-edit"></i> 编辑
                                </button>
                                <button onclick="deleteRecord('${record.id}')" class="btn btn-secondary" style="padding: 6px 12px; font-size: 14px;">
                                    <i class="fas fa-trash"></i> 删除
                                </button>
                            </div>
                        </td>
                    `;
                    resultsBody.appendChild(row);
                });
                
                resultsTable.style.display = 'block';
                
            } catch (error) {
                console.error('查询失败:', error);
                loadingDiv.style.display = 'none';
                alert('查询失败: ' + error.message);
            }
        }
        
        // 提交巡查记录
        async function submitInspection() {
            if (!currentInspector) {
                alert('请先登录巡查人');
                showPage('loginPage');
                return;
            }
            
            // 验证必填字段
            const requiredFields = ['recordDate', 'recordWeekday', 'recordClass', 'recordPeriod', 'recordSubject', 'recordTeacher', 'recordArrivalStatus'];
            for (const fieldId of requiredFields) {
                const field = document.getElementById(fieldId);
                if (!field.value) {
                    alert(`请填写${field.previousElementSibling.textContent}`);
                    field.focus();
                    return;
                }
            }
            
            try {
                const recordData = {
                    inspection_date: document.getElementById('recordDate').value,
                    week_day: document.getElementById('recordWeekday').value,
                    class_name: document.getElementById('recordClass').value,
                    period: parseInt(document.getElementById('recordPeriod').value),
                    subject: document.getElementById('recordSubject').value,
                    teacher_name: document.getElementById('recordTeacher').value,
                    arrival_status: document.getElementById('recordArrivalStatus').value,
                    student_status: document.getElementById('recordStudentStatus').value,
                    environment: document.getElementById('recordEnvironment').value,
                    remarks: document.getElementById('recordRemarks').value,
                    inspector_name: document.getElementById('recordInspector').value
                };
                
                if (editingRecordId) {
                    // 更新记录
                    const { error } = await supabase
                        .from('inspections')
                        .update(recordData)
                        .eq('id', editingRecordId);
                    
                    if (error) throw error;
                    alert('记录更新成功！');
                } else {
                    // 插入新记录
                    const { error } = await supabase
                        .from('inspections')
                        .insert([recordData]);
                    
                    if (error) throw error;
                    alert('记录保存成功！');
                }
                
                // 重置表单
                resetRecordForm();
                
                // 返回查询页
                showPage('queryPage');
                searchInspections();
                
            } catch (error) {
                console.error('保存失败:', error);
                alert('保存失败: ' + error.message);
            }
        }
        
        // 编辑记录
        async function editRecord(recordId) {
            try {
                const { data, error } = await supabase
                    .from('inspections')
                    .select('*')
                    .eq('id', recordId)
                    .single();
                
                if (error) throw error;
                
                if (data) {
                    // 填充表单
                    document.getElementById('recordId').value = data.id;
                    document.getElementById('recordDate').value = data.inspection_date;
                    document.getElementById('recordWeekday').value = data.week_day;
                    document.getElementById('recordClass').value = data.class_name;
                    document.getElementById('recordPeriod').value = data.period.toString();
                    document.getElementById('recordSubject').value = data.subject;
                    document.getElementById('recordTeacher').value = data.teacher_name;
                    document.getElementById('recordArrivalStatus').value = data.arrival_status;
                    document.getElementById('recordStudentStatus').value = data.student_status || '';
                    document.getElementById('recordEnvironment').value = data.environment || '';
                    document.getElementById('recordRemarks').value = data.remarks || '';
                    document.getElementById('recordInspector').value = data.inspector_name;
                    
                    editingRecordId = recordId;
                    document.getElementById('recordFormTitle').innerHTML = '<i class="fas fa-edit"></i> 编辑巡查记录';
                    document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> 更新记录';
                    
                    showPage('recordPage');
                }
            } catch (error) {
                console.error('加载记录失败:', error);
                alert('加载记录失败: ' + error.message);
            }
        }
        
        // 删除记录
        async function deleteRecord(recordId) {
            if (!confirm('确定要删除这条记录吗？')) {
                return;
            }
            
            try {
                const { error } = await supabase
                    .from('inspections')
                    .delete()
                    .eq('id', recordId);
                
                if (error) throw error;
                
                alert('记录删除成功！');
                searchInspections();
                
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败: ' + error.message);
            }
        }
        
        // 重置筛选条件
        function resetFilters() {
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            document.getElementById('filterClass').value = '';
            document.getElementById('filterWeekday').value = '';
            document.getElementById('filterPeriod').value = '';
            document.getElementById('filterInspector').value = '';
            
            searchInspections();
        }
        
        // 重置记录表单
        function resetRecordForm() {
            document.getElementById('inspectionForm').reset();
            editingRecordId = null;
            document.getElementById('recordFormTitle').innerHTML = '<i class="fas fa-edit"></i> 填写巡查记录';
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> 保存记录';
            setDefaultDates();
        }
        
        // 下载数据
        function showPasswordModal() {
            document.getElementById('passwordModal').classList.add('active');
        }
        
        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
            document.getElementById('adminPassword').value = '';
        }
        
        async function downloadData() {
            const password = document.getElementById('adminPassword').value;
            
            // 简单的密码验证
            if (password !== 'admin123') {
                alert('密码错误！');
                return;
            }
            
            try {
                // 获取所有数据
                const { data, error } = await supabase
                    .from('inspections')
                    .select('*')
                    .order('inspection_date', { ascending: false });
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    alert('没有数据可下载');
                    return;
                }
                
                // 转换为CSV
                const headers = ['日期', '星期', '班级', '节次', '科目', '教师', '到岗情况', '学生状态', '教室环境', '巡查人', '备注'];
                const csvRows = [];
                
                // 添加表头
                csvRows.push(headers.join(','));
                
                // 添加数据行
                data.forEach(record => {
                    const row = [
                        record.inspection_date,
                        record.week_day,
                        record.class_name,
                        `第${record.period}节`,
                        record.subject,
                        record.teacher_name,
                        record.arrival_status,
                        record.student_status || '',
                        record.environment || '',
                        record.inspector_name,
                        record.remarks || ''
                    ];
                    
                    // 处理特殊字符
                    const escapedRow = row.map(cell => {
                        if (cell === null || cell === undefined) return '';
                        const cellStr = String(cell);
                        if (cellStr.includes(',') || cellStr.includes('"') || cellStr.includes('\n')) {
                            return '"' + cellStr.replace(/"/g, '""') + '"';
                        }
                        return cellStr;
                    });
                    
                    csvRows.push(escapedRow.join(','));
                });
                
                const csvString = csvRows.join('\n');
                const blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `巡查记录_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                closePasswordModal();
                alert('数据下载成功！');
                
            } catch (error) {
                console.error('下载失败:', error);
                alert('下载失败: ' + error.message);
            }
        }
        
        // 初始化
        setDefaultDates();
        
    </script>
