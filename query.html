<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>查询巡课记录</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #f5f7fa; 
            padding: 10px;
            padding-top: 60px;
        }
        
        .top-header {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }
        .back-btn {
            padding: 8px 15px;
            background: #666;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .header { 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 { 
            color: #333; 
            margin-bottom: 5px; 
            font-size: 18px;
        }
        .subtitle {
            color: #666; 
            font-size: 12px;
        }
        
        .filter-container { 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .filter-grid { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 15px;
        }
        .filter-group { margin-bottom: 0; }
        .filter-group.full-width { grid-column: 1 / -1; }
        label { 
            display: block; 
            margin-bottom: 5px; 
            color: #555; 
            font-weight: 500; 
            font-size: 13px; 
        }
        input, select { 
            width: 100%; 
            padding: 8px 10px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            font-size: 13px; 
        }
        
        .btn-group { 
            display: flex; 
            gap: 8px; 
            margin-top: 15px; 
        }
        .btn { 
            flex: 1; 
            padding: 10px; 
            border: none; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.3s; 
        }
        .btn-query { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-reset { background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%); color: white; }
        .btn-download { background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%); color: white; }
        
        .table-container { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* 结果计数 */
        .result-count {
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }
        
        /* 表格样式 */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 1200px;
        }
        th { 
            background: #f8f9fa; 
            padding: 12px 8px; 
            text-align: left; 
            font-weight: 600; 
            color: #333; 
            border-bottom: 2px solid #e0e0e0; 
            font-size: 12px;
            white-space: nowrap;
        }
        td { 
            padding: 8px; 
            border-bottom: 1px solid #f0f0f0; 
            font-size: 12px;
            line-height: 1.4;
            vertical-align: top;
        }
        tr:hover { background: #f9f9f9; }
        
        .status-on-time { 
            color: #4CAF50; 
            font-weight: bold; 
            white-space: nowrap;
        }
        .status-late { 
            color: #FF9800; 
            font-weight: bold; 
            white-space: nowrap;
        }
        .status-absent { 
            color: #f44336; 
            font-weight: bold; 
            white-space: nowrap;
        }
        
        /* 文本换行设置 */
        .text-wrap { 
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.5;
        }
        
        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        .btn-action { 
            padding: 6px 10px;
            border: none; 
            border-radius: 5px;
            cursor: pointer; 
            font-size: 12px;
            white-space: nowrap;
        }
        .btn-detail { 
            background: #2196F3; 
            color: white; 
        }
        .btn-edit { 
            background: #FF9800; 
            color: white; 
        }
        .btn-delete { 
            background: #f44336; 
            color: white; 
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .filter-grid {
                grid-template-columns: 1fr;
            }
            
            .btn-action {
                padding: 5px 8px;
                font-size: 11px;
            }
            
            .action-buttons {
                flex-wrap: wrap;
            }
            
            /* 在手机上显示更紧凑 */
            th, td {
                padding: 6px 4px;
            }
            
            /* 在手机上隐藏某些列，或者调整显示 */
            .mobile-hide {
                display: none;
            }
        }
        
        /* 搜索下拉框样式 */
        .searchable-group {
            position: relative;
        }
        .searchable-group input {
            width: 100%;
            padding-right: 35px;
        }
        .search-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 14px;
            pointer-events: none;
        }
        
        /* 无数据样式 */
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        /* 修改记录弹窗样式 - 重新设计 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-form {
            padding: 20px;
        }
        
        .modal-form .form-group {
            margin-bottom: 15px;
        }
        
        .modal-form label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 13px;
        }
        
        .modal-form input,
        .modal-form select,
        .modal-form textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .modal-form textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-save,
        .btn-cancel {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .btn-save {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
        }
        
        .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="top-header">
        <a href="index.html" class="back-btn">← 返回</a>
    </div>
    
    <div class="header">
        <h2>🔍 查询巡课记录</h2>
        <p class="subtitle">支持多条件筛选查询 | 检查人可以修改/删除自己填写的记录</p>
    </div>
    
    <div class="filter-container">
        <div class="filter-grid">
            <div class="filter-group">
                <label>开始日期</label>
                <input type="date" id="filter_date_start">
            </div>
            <div class="filter-group">
                <label>结束日期</label>
                <input type="date" id="filter_date_end">
            </div>
            <div class="filter-group">
                <label>星期</label>
                <select id="filter_weekday">
                    <option value="">全部</option>
                    <option value="星期一">星期一</option>
                    <option value="星期二">星期二</option>
                    <option value="星期三">星期三</option>
                    <option value="星期四">星期四</option>
                    <option value="星期五">星期五</option>
                </select>
            </div>
            <div class="filter-group">
                <label>班级</label>
                <select id="filter_class">
                    <option value="">全部班级</option>
                </select>
            </div>
            <div class="filter-group">
                <label>节次</label>
                <select id="filter_period">
                    <option value="">全部节次</option>
                    <option value="1">第1节</option>
                    <option value="2">第2节</option>
                    <option value="3">第3节</option>
                    <option value="4">第4节</option>
                    <option value="5">第5节</option>
                    <option value="6">第6节</option>
                    <option value="7">第7节</option>
                    <option value="8">第8节</option>
                </select>
            </div>
            <div class="filter-group searchable-group">
                <label>任课老师</label>
                <input type="text" id="filter_teacher" list="filter_teacher_list" placeholder="输入名字搜索或选择">
                <datalist id="filter_teacher_list"></datalist>
                <div class="search-icon">🔍</div>
            </div>
            <div class="filter-group searchable-group">
                <label>跟班老师</label>
                <input type="text" id="filter_follow_teacher" list="filter_follow_teacher_list" placeholder="输入名字搜索或选择">
                <datalist id="filter_follow_teacher_list"></datalist>
                <div class="search-icon">🔍</div>
            </div>
            <div class="filter-group searchable-group full-width">
                <label>科目</label>
                <input type="text" id="filter_subject" list="filter_subject_list" placeholder="输入科目搜索或选择">
                <datalist id="filter_subject_list"></datalist>
                <div class="search-icon">🔍</div>
            </div>
            <div class="filter-group searchable-group full-width">
                <label>检查人</label>
                <input type="text" id="filter_inspector" list="filter_inspector_list" placeholder="输入名字搜索或选择">
                <datalist id="filter_inspector_list"></datalist>
                <div class="search-icon">🔍</div>
            </div>
            <div class="filter-group full-width">
                <label>到岗情况</label>
                <select id="filter_arrival">
                    <option value="">全部</option>
                    <option value="按时到达">按时到达</option>
                    <option value="迟到">迟到</option>
                    <option value="旷课">旷课</option>
                    <option value="其他">其他</option>
                </select>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-query" onclick="fetchData()">查询</button>
            <button class="btn btn-reset" onclick="resetFilters()">重置</button>
            <button class="btn btn-download" onclick="downloadDataWithPassword()">下载</button>
        </div>
    </div>
    
    <div class="table-container">
        <div class="result-count">
            查询结果：<span id="resultCount">0</span> 条记录
        </div>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>星期</th>
                        <th>班级</th>
                        <th>节次</th>
                        <th>科目</th>
                        <th>任课老师</th>
                        <th>检查人</th>
                        <th>跟班老师</th>
                        <th>到岗</th>
                        <th>学生状态</th>
                        <th>教室环境</th>
                        <th>查课记录</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    <tr><td colspan="13" class="no-data">点击"查询"按钮加载数据</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 修改记录弹窗 - 只在点击修改时显示 -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">✏️ 修改巡查记录</div>
                <button class="modal-close" onclick="closeEditModal()">×</button>
            </div>
            
            <form id="editForm" class="modal-form">
                <input type="hidden" id="edit_id">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                    <div class="form-group">
                        <label>巡查日期</label>
                        <input type="date" id="edit_date" required>
                    </div>
                    <div class="form-group">
                        <label>星期</label>
                        <input type="text" id="edit_week_day" readonly style="background: #f5f5f5;">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>节次</label>
                    <select id="edit_period" required>
                        <option value="">请选择节次</option>
                        <option value="1">第1节</option>
                        <option value="2">第2节</option>
                        <option value="3">第3节</option>
                        <option value="4">第4节</option>
                        <option value="5">第5节</option>
                        <option value="6">第6节</option>
                        <option value="7">第7节</option>
                        <option value="8">第8节</option>
                    </select>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                    <div class="form-group">
                        <label>科目</label>
                        <input type="text" id="edit_subject">
                    </div>
                    <div class="form-group">
                        <label>任课老师</label>
                        <input type="text" id="edit_teacher_name" list="edit_teacher_name_list">
                        <datalist id="edit_teacher_name_list"></datalist>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>跟班老师</label>
                    <input type="text" id="edit_follow_teacher" list="edit_follow_teacher_list" placeholder="输入名字搜索或选择">
                    <datalist id="edit_follow_teacher_list"></datalist>
                </div>
                
                <div class="form-group">
                    <label>教师到岗情况</label>
                    <select id="edit_arrival_status" required>
                        <option value="">请选择</option>
                        <option value="按时到达">按时到达</option>
                        <option value="迟到">迟到</option>
                        <option value="旷课">旷课</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>到岗时间补充</label>
                    <input type="text" id="edit_arrival_time" placeholder="若选'其他'，请填写具体时间">
                </div>
                
                <div class="form-group">
                    <label>学生课前状态</label>
                    <textarea id="edit_student_status" rows="2"></textarea>
                </div>
                
                <div class="form-group">
                    <label>教室环境</label>
                    <textarea id="edit_environment" rows="2"></textarea>
                </div>
                
                <div class="form-group">
                    <label>查课记录</label>
                    <textarea id="edit_problem" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label>整改建议</label>
                    <textarea id="edit_suggestion" rows="3"></textarea>
                </div>
                
                <div class="modal-buttons">
                    <button type="button" class="btn-save" onclick="updateRecord()">保存</button>
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let supabaseClient = null;
        let allData = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            initPage();
        });
        
        async function initPage() {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - 7);
            document.getElementById('filter_date_start').value = startDate.toISOString().split('T')[0];
            document.getElementById('filter_date_end').value = endDate.toISOString().split('T')[0];
            
            const supabaseUrl = 'https://dpyennxjaejstvbbjmbt.supabase.co';
            const supabaseKey = 'sb_publishable_v3N76dVRe9uxrmlj-DwbfA_FYAcD06R';
            supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
            
            await Promise.all([
                loadFilterClasses(),
                loadFilterSubjects(),
                loadFilterTeachers(),
                loadFilterFollowTeachers(),
                loadFilterInspectors(),
                loadFollowTeachersForEdit(),
                loadTeachersForEditDatalist()
            ]);
            
            document.getElementById('edit_date').addEventListener('change', function() {
                calculateWeekDayForEdit(this.value);
            });
            
            // 点击模态框外部关闭
            document.getElementById('editModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeEditModal();
                }
            });
            
            await fetchData();
        }
        
        function calculateWeekDayForEdit(dateString) {
            try {
                const dateObj = new Date(dateString);
                const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
                const weekDay = weekDays[dateObj.getDay()];
                document.getElementById('edit_week_day').value = weekDay;
            } catch (error) {
                console.error("计算星期失败:", error);
            }
        }
        
        async function loadFollowTeachersForEdit() {
            try {
                const { data, error } = await supabaseClient
                    .from('teachers')
                    .select('teacher_name')
                    .order('teacher_name');
                    
                if (!error && data) {
                    const datalist = document.getElementById('edit_follow_teacher_list');
                    data.forEach(teacher => {
                        const option = new Option(teacher.teacher_name, teacher.teacher_name);
                        datalist.appendChild(option);
                    });
                }
            } catch (error) {
                console.error("加载编辑用跟班老师列表失败:", error);
            }
        }
        
        async function loadTeachersForEditDatalist() {
            try {
                const { data, error } = await supabaseClient
                    .from('teachers')
                    .select('teacher_name')
                    .order('teacher_name');
                    
                if (!error && data) {
                    const datalist = document.getElementById('edit_teacher_name_list');
                    data.forEach(teacher => {
                        const option = new Option(teacher.teacher_name, teacher.teacher_name);
                        datalist.appendChild(option);
                    });
                }
            } catch (error) {
                console.error("加载编辑用任课老师列表失败:", error);
            }
        }
        
        async function loadFilterClasses() {
            try {
                const { data, error } = await supabaseClient
                    .from('classes')
                    .select('class_name')
                    .order('class_name');
                    
                if (!error && data) {
                    const select = document.getElementById('filter_class');
                    data.forEach(cls => {
                        const option = new Option(cls.class_name, cls.class_name);
                        select.add(option);
                    });
                }
            } catch (error) {
                console.error("加载班级筛选失败:", error);
            }
        }
        
        async function loadFilterSubjects() {
            try {
                const { data, error } = await supabaseClient
                    .from('inspections')
                    .select('subject')
                    .not('subject', 'is', null);
                    
                if (!error && data) {
                    const uniqueSubjects = [...new Set(data.map(item => item.subject).filter(s => s))];
                    const datalist = document.getElementById('filter_subject_list');
                    uniqueSubjects.sort().forEach(subject => {
                        const option = new Option(subject, subject);
                        datalist.appendChild(option);
                    });
                }
            } catch (error) {
                console.error("加载科目筛选失败:", error);
            }
        }
        
        async function loadFilterTeachers() {
            try {
                const { data, error } = await supabaseClient
                    .from('teachers')
                    .select('teacher_name')
                    .order('teacher_name');
                    
                if (!error && data) {
                    const datalist = document.getElementById('filter_teacher_list');
                    data.forEach(teacher => {
                        const option = new Option(teacher.teacher_name, teacher.teacher_name);
                        datalist.appendChild(option);
                    });
                } else {
                    const { data: inspectionsData, error: inspectionsError } = await supabaseClient
                        .from('inspections')
                        .select('teacher_name')
                        .not('teacher_name', 'is', null)
                        .order('teacher_name');
                        
                    if (!inspectionsError && inspectionsData && inspectionsData.length > 0) {
                        const uniqueTeachers = [...new Set(inspectionsData.map(item => item.teacher_name).filter(t => t))];
                        const datalist = document.getElementById('filter_teacher_list');
                        uniqueTeachers.sort().forEach(teacher => {
                            const option = new Option(teacher, teacher);
                            datalist.appendChild(option);
                        });
                    }
                }
            } catch (error) {
                console.error("加载老师筛选失败:", error);
            }
        }
        
        async function loadFilterFollowTeachers() {
            try {
                const { data, error } = await supabaseClient
                    .from('teachers')
                    .select('teacher_name')
                    .order('teacher_name');
                    
                if (!error && data) {
                    const datalist = document.getElementById('filter_follow_teacher_list');
                    data.forEach(teacher => {
                        const option = new Option(teacher.teacher_name, teacher.teacher_name);
                        datalist.appendChild(option);
                    });
                } else {
                    const { data: inspectionsData, error: inspectionsError } = await supabaseClient
                        .from('inspections')
                        .select('follow_teacher')
                        .not('follow_teacher', 'is', null)
                        .order('follow_teacher');
                        
                    if (!inspectionsError && inspectionsData && inspectionsData.length > 0) {
                        const uniqueTeachers = [...new Set(inspectionsData.map(item => item.follow_teacher).filter(i => i))];
                        const datalist = document.getElementById('filter_follow_teacher_list');
                        uniqueTeachers.sort().forEach(teacher => {
                            const option = new Option(teacher, teacher);
                            datalist.appendChild(option);
                        });
                    }
                }
            } catch (error) {
                console.error("加载跟班老师筛选失败:", error);
            }
        }
        
        async function loadFilterInspectors() {
            try {
                const { data, error } = await supabaseClient
                    .from('inspectors')
                    .select('inspector_name')
                    .order('inspector_name');
                    
                if (!error && data) {
                    const datalist = document.getElementById('filter_inspector_list');
                    data.forEach(insp => {
                        const option = new Option(insp.inspector_name, insp.inspector_name);
                        datalist.appendChild(option);
                    });
                } else {
                    const { data: inspectionsData, error: inspectionsError } = await supabaseClient
                        .from('inspections')
                        .select('inspector')
                        .not('inspector', 'is', null)
                        .order('inspector');
                        
                    if (!inspectionsError && inspectionsData && inspectionsData.length > 0) {
                        const uniqueInspectors = [...new Set(inspectionsData.map(item => item.inspector).filter(i => i))];
                        const datalist = document.getElementById('filter_inspector_list');
                        uniqueInspectors.sort().forEach(inspector => {
                            const option = new Option(inspector, inspector);
                            datalist.appendChild(option);
                        });
                    }
                }
            } catch (error) {
                console.error("加载检查人筛选失败:", error);
            }
        }
        
        async function fetchData() {
            if (!supabaseClient) {
                alert('系统正在初始化，请稍后重试');
                return;
            }
            
            const startDate = document.getElementById('filter_date_start').value;
            const endDate = document.getElementById('filter_date_end').value;
            
            const filters = {
                week_day: document.getElementById('filter_weekday').value || null,
                class_name: document.getElementById('filter_class').value || null,
                period: document.getElementById('filter_period').value || null,
                teacher_name: document.getElementById('filter_teacher').value || null,
                follow_teacher: document.getElementById('filter_follow_teacher').value || null,
                subject: document.getElementById('filter_subject').value || null,
                inspector: document.getElementById('filter_inspector').value || null,
                arrival_status: document.getElementById('filter_arrival').value || null
            };
            
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '<tr><td colspan="13" class="no-data">正在查询...</td></tr>';
            
            try {
                let query = supabaseClient
                    .from('inspections')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (startDate) query = query.gte('date', startDate);
                if (endDate) query = query.lte('date', endDate);
                
                Object.keys(filters).forEach(key => {
                    if (filters[key]) {
                        query = query.eq(key, filters[key]);
                    }
                });
                
                const { data, error } = await query;
                
                if (error) {
                    console.error("查询失败:", error);
                    throw error;
                }
                
                allData = data || [];
                renderTable(allData);
                document.getElementById('resultCount').textContent = allData.length;
                
            } catch (error) {
                console.error("查询失败:", error);
                tbody.innerHTML = `<tr><td colspan="13" class="no-data">查询失败: ${error.message}</td></tr>`;
            }
        }
        
        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('resultBody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="13" class="no-data">没有找到匹配的记录</td></tr>';
                return;
            }
            
            let html = '';
            data.forEach(record => {
                let statusClass = '';
                if (record.arrival_status === '按时到达') statusClass = 'status-on-time';
                if (record.arrival_status === '迟到') statusClass = 'status-late';
                if (record.arrival_status === '旷课') statusClass = 'status-absent';
                if (record.arrival_status === '其他') statusClass = 'status-absent';
                
                html += `
                    <tr>
                        <td>${record.date || ''}</td>
                        <td>${record.week_day || ''}</td>
                        <td>${record.class_name || ''}</td>
                        <td>${record.period ? '第' + record.period + '节' : ''}</td>
                        <td>${record.subject || ''}</td>
                        <td>${record.teacher_name || ''}</td>
                        <td>${record.inspector || ''}</td>
                        <td>${record.follow_teacher || ''}</td>
                        <td class="${statusClass}">${record.arrival_status || ''}</td>
                        <td title="${record.student_status || ''}" class="text-wrap">${record.student_status || ''}</td>
                        <td title="${record.environment || ''}" class="text-wrap">${record.environment || ''}</td>
                        <td title="${record.problem || ''}" class="text-wrap">${record.problem || ''}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-action btn-detail" onclick="viewDetail(${record.id})">详情</button>
                                <button class="btn-action btn-edit" onclick="showEditModal(${record.id})">修改</button>
                                <button class="btn-action btn-delete" onclick="deleteRecord(${record.id})">删除</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }
        
        // 查看详情
        function viewDetail(recordId) {
            const record = allData.find(r => r.id === recordId);
            if (!record) return;
            
            let detailText = `📅 日期：${record.date}\n`;
            detailText += `📅 星期：${record.week_day}\n`;
            detailText += `🏫 班级：${record.class_name}\n`;
            detailText += `⏰ 节次：第${record.period}节\n`;
            detailText += `📚 科目：${record.subject}\n`;
            detailText += `👨‍🏫 任课老师：${record.teacher_name}\n`;
            detailText += `🧑‍🏫 跟班老师：${record.follow_teacher || '无'}\n`;
            detailText += `👤 检查人：${record.inspector}\n`;
            detailText += `✅ 到岗情况：${record.arrival_status}\n`;
            if (record.arrival_time) detailText += `⏱️ 到岗时间：${record.arrival_time}\n`;
            if (record.student_status) detailText += `📖 学生状态：${record.student_status}\n`;
            if (record.environment) detailText += `🏫 教室环境：${record.environment}\n`;
            if (record.problem) detailText += `📝 查课记录：${record.problem}\n`;
            if (record.suggestion) detailText += `💡 整改建议：${record.suggestion}\n`;
            
            alert(detailText);
        }
        
        // 显示修改模态框
        function showEditModal(recordId) {
            const record = allData.find(r => r.id === recordId);
            if (!record) {
                alert('未找到记录');
                return;
            }
            
            const password = prompt('请输入修改密码：');
            if (password !== '123') {
                alert('密码错误，无法修改记录！');
                return;
            }
            
            // 填充表单数据
            document.getElementById('edit_id').value = record.id;
            document.getElementById('edit_date').value = record.date || '';
            document.getElementById('edit_week_day').value = record.week_day || '';
            document.getElementById('edit_period').value = record.period || '';
            document.getElementById('edit_subject').value = record.subject || '';
            document.getElementById('edit_teacher_name').value = record.teacher_name || '';
            document.getElementById('edit_follow_teacher').value = record.follow_teacher || '';
            document.getElementById('edit_arrival_status').value = record.arrival_status || '';
            document.getElementById('edit_arrival_time').value = record.arrival_time || '';
            document.getElementById('edit_student_status').value = record.student_status || '';
            document.getElementById('edit_environment').value = record.environment || '';
            document.getElementById('edit_problem').value = record.problem || '';
            document.getElementById('edit_suggestion').value = record.suggestion || '';
            
            // 显示模态框
            document.getElementById('editModal').style.display = 'flex';
        }
        
        // 关闭修改模态框
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        // 更新记录
        async function updateRecord() {
            const recordId = document.getElementById('edit_id').value;
            if (!recordId) {
                alert('记录ID不存在');
                return;
            }
            
            const formData = {
                date: document.getElementById('edit_date').value,
                week_day: document.getElementById('edit_week_day').value,
                period: document.getElementById('edit_period').value,
                subject: document.getElementById('edit_subject').value,
                teacher_name: document.getElementById('edit_teacher_name').value,
                follow_teacher: document.getElementById('edit_follow_teacher').value,
                arrival_status: document.getElementById('edit_arrival_status').value,
                arrival_time: document.getElementById('edit_arrival_time').value,
                student_status: document.getElementById('edit_student_status').value,
                environment: document.getElementById('edit_environment').value,
                problem: document.getElementById('edit_problem').value,
                suggestion: document.getElementById('edit_suggestion').value
            };
            
            if (!formData.date || !formData.week_day || !formData.period || !formData.arrival_status) {
                alert('请填写必填项：日期、星期、节次、到岗情况');
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('inspections')
                    .update(formData)
                    .eq('id', recordId);
                    
                if (error) throw error;
                
                alert('✅ 记录修改成功！');
                closeEditModal();
                
                await fetchData();
                
            } catch (error) {
                console.error("修改失败:", error);
                alert(`修改失败: ${error.message}`);
            }
        }
        
        // 删除记录
        async function deleteRecord(recordId) {
            const record = allData.find(r => r.id === recordId);
            if (!record) {
                alert('未找到记录');
                return;
            }
            
            const password = prompt('请输入删除密码：');
            if (password !== '123') {
                alert('密码错误，无法删除记录！');
                return;
            }
            
            const confirmDelete = confirm(`确定要删除这条记录吗？\n\n班级：${record.class_name}\n日期：${record.date}\n科目：${record.subject}\n检查人：${record.inspector}\n\n此操作不可撤销！`);
            if (!confirmDelete) {
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('inspections')
                    .delete()
                    .eq('id', recordId);
                    
                if (error) throw error;
                
                alert('✅ 记录删除成功！');
                
                await fetchData();
                
            } catch (error) {
                console.error("删除失败:", error);
                alert(`删除失败: ${error.message}`);
            }
        }
        
        // 重置筛选条件
        function resetFilters() {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - 7);
            
            document.getElementById('filter_date_start').value = startDate.toISOString().split('T')[0];
            document.getElementById('filter_date_end').value = endDate.toISOString().split('T')[0];
            document.getElementById('filter_weekday').value = '';
            document.getElementById('filter_class').value = '';
            document.getElementById('filter_period').value = '';
            document.getElementById('filter_teacher').value = '';
            document.getElementById('filter_follow_teacher').value = '';
            document.getElementById('filter_subject').value = '';
            document.getElementById('filter_inspector').value = '';
            document.getElementById('filter_arrival').value = '';
            
            allData = [];
            document.getElementById('resultBody').innerHTML = '<tr><td colspan="13" class="no-data">点击"查询"按钮加载数据</td></tr>';
            document.getElementById('resultCount').textContent = '0';
        }
        
        // 下载数据（带密码验证）
        function downloadDataWithPassword() {
            const password = prompt('请输入下载密码：');
            if (password !== 'admin') {
                alert('密码错误，无法下载数据！');
                return;
            }
            downloadData();
        }
        
        // 实际下载数据函数
        function downloadData() {
            if (allData.length === 0) {
                alert('没有数据可下载');
                return;
            }
            
            const headers = ['日期','星期','班级','节次','科目','任课老师','跟班老师','检查人','到岗情况','到岗时间','学生状态','教室环境','查课记录','整改建议'];
            const csvRows = [
                headers.join(','),
                ...allData.map(record => [
                    record.date,
                    record.week_day,
                    `"${record.class_name}"`,
                    record.period,
                    `"${record.subject || ''}"`,
                    `"${record.teacher_name || ''}"`,
                    `"${record.follow_teacher || ''}"`,
                    `"${record.inspector || ''}"`,
                    `"${record.arrival_status || ''}"`,
                    `"${record.arrival_time || ''}"`,
                    `"${(record.student_status || '').replace(/"/g, '""')}"`,
                    `"${(record.environment || '').replace(/"/g, '""')}"`,
                    `"${(record.problem || '').replace(/"/g, '""')}"`,
                    `"${(record.suggestion || '').replace(/"/g, '""')}"`
                ].join(','))
            ];
            
            const csvContent = 'data:text/csv;charset=utf-8,\uFEFF' + csvRows.join('\n');
            const link = document.createElement('a');
            link.setAttribute('href', encodeURI(csvContent));
            link.setAttribute('download', `巡课记录_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
