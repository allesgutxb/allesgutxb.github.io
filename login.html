<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 巡课系统</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 登录系统</h2>
        <p class="subtitle">密码统一设置为：<strong>123</strong></p>
        
        <div class="input-group">
            <label>登录密码</label>
            <input type="password" id="password" placeholder="请输入密码" value="123">
        </div>
        
        <button class="login-btn" onclick="handleLogin()">登录系统</button>
        
        <a href="index.html" class="back-btn">← 返回首页</a>
    </div>

    <script>
        // 检查是否已登录
        if(localStorage.getItem('isLoggedIn') === 'true') {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            if(redirect === 'inspect') {
                window.location.href = 'inspect.html';
            } else {
                window.location.href = 'index.html';
            }
        }

        async function handleLogin() {
            const password = document.getElementById('password').value;
            
            // 固定密码验证
            if(password === '123') {
                localStorage.setItem('isLoggedIn', 'true');
                alert('登录成功！');
                
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                if(redirect === 'inspect') {
                    window.location.href = 'inspect.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert('密码错误！请使用密码：123');
            }
        }
    </script>
</body>
</html>
