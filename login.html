<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 巡课系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .password-hint {
            margin-top: 10px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 系统登录</h2>
        
        <div class="input-group">
            <label>请输入密码</label>
            <input type="password" id="password" placeholder="请输入登录密码" autocomplete="off">
        </div>
        
        <button class="login-btn" onclick="handleLogin()">登录</button>
        
        <div class="password-hint">
            提示：请联系管理员获取登录密码
        </div>
        
        <a href="index.html" class="back-btn">← 返回首页</a>
    </div>

    <script>
        // 检查是否已登录
        if(localStorage.getItem('isLoggedIn') === 'true') {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            if(redirect === 'inspect') {
                window.location.href = 'inspect.html';
            } else {
                window.location.href = 'index.html';
            }
        }

        function handleLogin() {
            const password = document.getElementById('password').value;
            
            // 固定密码验证（密码为123）
            if(password === '123') {
                localStorage.setItem('isLoggedIn', 'true');
                
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                if(redirect === 'inspect') {
                    window.location.href = 'inspect.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert('密码错误，请重试！');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
        
        // 按Enter键登录
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
        
        // 页面加载后自动聚焦到密码框
        window.onload = function() {
            document.getElementById('password').focus();
        };
    </script>
</body>
</html>
