<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Supabase 连接测试</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .success { color: green; }
        .error { color: red; font-weight: bold; }
        .warning { color: orange; }
    </style>
</head>
<body>
    <h2>Supabase 连接测试</h2>
    <div id="result">正在初始化测试...</div>

    <script>
        // 删除之前的重复声明，只保留这一个
        const supabaseUrl = 'https://dpyennxjaejstvbbjmbt.supabase.co';
        const supabaseKey = 'sb_publishable_v3N76dVRe9uxrmlj-DwbfA_FYAcD06R';
        
        // 注意：这里使用 window.supabase.createClient，而不是 supabase.createClient
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const resultDiv = document.getElementById('result');
        
        async function runAllTests() {
            let log = '';
            
            try {
                // 测试1: 基础连接
                log += '<p><b>1. 测试Supabase连接...</b></p>';
                log += '<p>✅ 客户端初始化成功</p>';
                
                // 测试2: 查询检查人表
                log += '<p><b>2. 查询检查人表 (inspectors)...</b></p>';
                const { data: inspectorData, error: inspectorError } = await supabase
                    .from('inspectors')
                    .select('inspector_name, id')
                    .order('inspector_name')
                    .limit(10);
                    
                if (inspectorError) {
                    log += `<p class="error">❌ 查询失败: ${inspectorError.message}</p>`;
                    log += `<p class="error">可能原因：RLS策略未设置，或表名/字段名不正确。</p>`;
                } else {
                    log += `<p class="success">✅ 查询成功！共找到 ${inspectorData.length} 条记录。</p>`;
                    if (inspectorData.length > 0) {
                        log += '<p>前几条数据：<ul>';
                        inspectorData.forEach(item => {
                            log += `<li>${item.id}: ${item.inspector_name}</li>`;
                        });
                        log += '</ul></p>';
                    } else {
                        log += '<p class="warning">⚠️ 表内无数据，这是导致下拉列表为空的直接原因。</p>';
                    }
                }
                
                // 测试3: 查询班级表
                log += '<p><b>3. 查询班级表 (classes)...</b></p>';
                const { data: classData, error: classError } = await supabase
                    .from('classes')
                    .select('class_name, id')
                    .order('class_name')
                    .limit(5);
                    
                if (classError) {
                    log += `<p class="error">❌ 查询失败: ${classError.message}</p>`;
                } else {
                    log += `<p class="success">✅ 查询成功！共找到 ${classData.length} 条记录。</p>`;
                }
                
                // 测试4: 查询课表
                log += '<p><b>4. 查询课表 (schedule)...</b></p>';
                const { data: scheduleData, error: scheduleError } = await supabase
                    .from('schedule')
                    .select('class_name, week_day, period, subject, teacher_name')
                    .limit(5);
                    
                if (scheduleError) {
                    log += `<p class="error">❌ 查询失败: ${scheduleError.message}</p>`;
                } else {
                    log += `<p class="success">✅ 查询成功！共找到 ${scheduleData.length} 条记录。</p>`;
                }
                
                // 测试5: 查询巡查记录
                log += '<p><b>5. 查询巡查记录 (inspections)...</b></p>';
                const { data: inspectionData, error: inspectionError } = await supabase
                    .from('inspections')
                    .select('id, date, class_name, inspector')
                    .order('date', { ascending: false })
                    .limit(5);
                    
                if (inspectionError) {
                    log += `<p class="error">❌ 查询失败: ${inspectionError.message}</p>`;
                } else {
                    log += `<p class="success">✅ 查询成功！共找到 ${inspectionData.length} 条记录。</p>`;
                }
                
            } catch (err) {
                log += `<p class="error">❌ 测试过程发生异常: ${err.message}</p>`;
                log += `<p class="error">堆栈: ${err.stack}</p>`;
            }
            
            resultDiv.innerHTML = log;
        }
        
        // 页面加载后运行测试
        window.onload = runAllTests;
    </script>
</body>
</html>
