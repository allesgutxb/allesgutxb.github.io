<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Supabase 连接测试</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Supabase 连接测试</h2>
    <div id="result">正在初始化测试...</div>

    <script>
        // 注意：这里使用了 var 而不是 const，避免重复声明问题
        var supabaseUrl = 'https://dpyennxjaejstvbbjmbt.supabase.co';
        var supabaseKey = 'sb_publishable_v3N76dVRe9uxrmlj-DwbfA_FYAcD06R';
        
        // 只创建一次 Supabase 客户端
        var supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        var resultDiv = document.getElementById('result');
        
        // 测试函数
        var runAllTests = async function() {
            var log = '<h3>测试结果：</h3>';
            
            try {
                // 测试1: 查询检查人表
                log += '<p><b>测试1: 查询检查人表 (inspectors)</b></p>';
                var { data: inspectorData, error: inspectorError } = await supabase
                    .from('inspectors')
                    .select('*')
                    .limit(5);
                    
                if (inspectorError) {
                    log += `<p class="error">❌ 失败: ${inspectorError.message}</p>`;
                } else {
                    log += `<p class="success">✅ 成功！找到 ${inspectorData.length} 条记录。</p>`;
                }
                
                // 测试2: 查询班级表
                log += '<p><b>测试2: 查询班级表 (classes)</b></p>';
                var { data: classData, error: classError } = await supabase
                    .from('classes')
                    .select('*')
                    .limit(5);
                    
                if (classError) {
                    log += `<p class="error">❌ 失败: ${classError.message}</p>`;
                } else {
                    log += `<p class="success">✅ 成功！找到 ${classData.length} 条记录。</p>`;
                }
                
                // 测试3: 查询巡查记录
                log += '<p><b>测试3: 查询巡查记录 (inspections)</b></p>';
                var { data: inspectionData, error: inspectionError } = await supabase
                    .from('inspections')
                    .select('*')
                    .limit(5);
                    
                if (inspectionError) {
                    log += `<p class="error">❌ 失败: ${inspectionError.message}</p>`;
                } else {
                    log += `<p class="success">✅ 成功！找到 ${inspectionData.length} 条记录。</p>`;
                }
                
            } catch (err) {
                log += `<p class="error">❌ 测试过程发生异常: ${err.message}</p>`;
            }
            
            resultDiv.innerHTML = log;
        };
        
        // 页面加载完成后运行测试
        window.addEventListener('load', runAllTests);
    </script>
</body>
</html>
